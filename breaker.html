  // ── levels ──

      for(var c=0;c<COLS;c++){
        var ch=(pat[r]&&pat[r][c])||'.';
        if(ch==='.') continue;
        var br={ x:fieldX()+c*(BRICK_W+BRICK_GAP), y:BRICK_TOP+r*(BRICK_H+BRICK_GAP),
          w:BRICK_W, h:BRICK_H, row:r, alive:true, hits:1,
          tough:false, granite:false, steel:false, tnt:false, bonus:false, power:false };

        else if(ch==='%') { br.granite=true; br.hits=3; }
        else if(ch==='X') { br.steel=true; br.hits=Infinity; }

  // ── balls ──
  function makeBall(stuck){ return { x:paddle.x, y:PADDLE_Y-BALL_R-1, vx:0, vy:0,
    squash:0, sqx:0, sqy:1, trail:[], stuck:!!stuck, offset:0 }; }
  function resetServe(){ balls=[ makeBall(true) ]; tongue=null; lasers=[]; }

  function launchAll(){
    var any=false;
    for(var i=0;i<balls.length;i++){ var b=balls[i]; if(b.stuck){
      var hit=Math.max(-0.8,Math.min(0.8, b.offset/(PADDLE_W/2)));
      var ang=-Math.PI/2 + hit*(Math.PI/3), sp=levelSpeed*speedMul;
      b.vx=Math.cos(ang)*sp; b.vy=Math.sin(ang)*sp; b.stuck=false; any=true;
    }}
    if(any){ game.state=STATE.PLAY; blip(560,0.05,'square'); }
  }
  function anyStuck(){ for(var i=0;i<balls.length;i++) if(balls[i].stuck) return true; return false; }
  function splitBalls(){
    var moving=balls.filter(function(b){ return !b.stuck; });
    if(moving.length===0){ launchAll(); moving=balls.filter(function(b){ return !b.stuck; }); }
    var add=[];
    for(var i=0;i<moving.length;i++){ var b=moving[i];
      for(var k=0;k<2;k++){ if(balls.length+add.length>=7) break;
        var ang=Math.atan2(b.vy,b.vx)+(k===0?0.42:-0.42), sp=levelSpeed*speedMul;
        add.push({ x:b.x, y:b.y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
          squash:0, sqx:0, sqy:1, trail:[], stuck:false, offset:0 }); } }
    balls=balls.concat(add); shake(4,2); blip(720,0.08,'triangle',0.06);
  }
  function rescaleBalls(){ for(var i=0;i<balls.length;i++){ var b=balls[i]; if(b.stuck) continue;
    var m=Math.hypot(b.vx,b.vy); if(m<0.001) continue; var sp=levelSpeed*speedMul;
    b.vx=b.vx/m*sp; b.vy=b.vy/m*sp; } }

  // ── flow ──
  function flash(f){ game.flashT=Math.max(game.flashT,f); }
  function shake(t,mag){ if(t>game.shakeT){ game.shakeT=t; game.shakeMag=mag; } }
  function clearEffects(){ for(var i=0;i<FXKEYS.length;i++) fx[FXKEYS[i]]=0; speedMul=1; prevSpeedMul=1; lasers=[]; }
  function resetCombo(){ game.combo=0; game.mult=1; }

  function saveHi(){ if(game.score>game.hi){ game.hi=game.score; try{ localStorage.setItem('nakfrg_breaker_hi',''+game.hi); }catch(e){} } }

  function startGame(){
    game.score=0; game.lives=3; game.level=0; levelSpeed=3.3;
    clearEffects(); resetCombo(); drops=[]; particles=[]; pendingBlasts=[];
    buildLevel(0); paddle.x=paddle.targetX=VW/2; resetServe();
    game.state=STATE.READY; game.paused=false; flash(8);
  }
  function nextLevel(){
    game.level++;
    if(game.level>=LEVELS.length){ game.state=STATE.WIN; saveHi(); flash(16); blip(880,0.2,'triangle',0.07); return; }
    levelSpeed=Math.min(5.8, 3.3+game.level*0.30);
    clearEffects(); resetCombo(); drops=[]; pendingBlasts=[]; buildLevel(game.level);
    paddle.x=paddle.targetX=VW/2; resetServe();
    game.state=STATE.READY; game.msgT=64; flash(10);
  }
  function levelCleared(){
    if(game.state!==STATE.PLAY) return;
    game.state=STATE.CLEAR; game.msgT=70; flash(12); blip(740,0.12,'triangle',0.07);
    setTimeout(function(){ if(game.state===STATE.CLEAR) nextLevel(); }, 1000);
  }
  function loseLife(){
    game.lives--; blip(200,0.25,'sawtooth',0.06); shake(7,4);
    clearEffects(); resetCombo(); drops=[];
    if(game.lives<=0){ game.state=STATE.OVER; saveHi(); flash(14); }

  }

  // ── particles / effects ──
  function spawnDust(x,y,n){ for(var i=0;i<n;i++){ var a=Math.random()*Math.PI*2, s=0.6+Math.random()*1.8;
    particles.push({ x:x,y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-0.4, life:18+Math.random()*14, max:32, size:1+(Math.random()<0.4?1:0) }); } }
  function updateParticles(){ for(var i=particles.length-1;i>=0;i--){ var p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.98; if(--p.life<=0) particles.splice(i,1); } }
  function impact(b,nx,ny){ b.squash=1; if(Math.abs(nx)>Math.abs(ny)){ b.sqx=0.65; b.sqy=1.3; } else { b.sqx=1.3; b.sqy=0.65; } }

  // ── power-up drops ──
  function spawnDrop(x,y,goodOnly){ var type = goodOnly
      ? GOOD_DROPS[(Math.random()*GOOD_DROPS.length)|0]
      : DROP_TABLE[(Math.random()*DROP_TABLE.length)|0];
    drops.push({ x:x, y:y, vy:1.05, type:type, t:0 }); }
  function activate(type){
    var meta=PWR[type];
    blip(meta.good?660:300, 0.09, meta.good?'square':'sawtooth', 0.06);
    if(type==='double'){ splitBalls(); }
    else if(type==='extralife'){ game.lives=Math.min(MAX_LIVES, game.lives+1); flash(8); }
    else {
      if(type==='bigpad') fx.shortpad=0; if(type==='shortpad') fx.bigpad=0;
      if(type==='slow') fx.fast=0;       if(type==='fast') fx.slow=0;
      if(type==='bigball') fx.shrink=0;   if(type==='shrink') fx.bigball=0;

    game.msgFx=meta.label; game.msgFxT=72; flash(5);
  }

  // ── brick destruction ──
  function detonate(cx,cy,r){ pendingBlasts.push({ x:cx, y:cy, r:r }); }
  function explodeOnce(cx,cy,r){
    shake(7,5); flash(5); blip(120,0.16,'sawtooth',0.07);
    for(var i=0;i<14;i++){ var a=Math.random()*Math.PI*2, s=1+Math.random()*3;
      particles.push({ x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:16+Math.random()*16, max:34, size:1+(Math.random()<0.5?1:0) }); }
    for(var j=0;j<game.bricks.length;j++){ var b=game.bricks[j];
      if(!b.alive||b.steel) continue;
      var bx=b.x+b.w/2, by=b.y+b.h/2, dx=bx-cx, dy=by-cy;
      if(dx*dx+dy*dy<=r*r) breakBrick(b);
    }
  }
  function runBlasts(){ var guard=0; while(pendingBlasts.length && guard++<120){ var p=pendingBlasts.shift(); explodeOnce(p.x,p.y,p.r); }
    if(game.remaining<=0 && game.state===STATE.PLAY) levelCleared(); }

  function breakBrick(b){
    if(!b.alive || b.steel) return;
    b.alive=false; game.remaining--;
    game.combo++; game.mult=Math.min(5, 1+Math.floor(game.combo/4));
    var base = 10 + b.row*2 + (b.tough?10:0) + (b.granite?15:0) + (b.tnt?20:0) + (b.bonus?50:0);
    game.score += base * game.mult;
    spawnDust(b.x+b.w/2, b.y+b.h/2, b.bonus?14:6);
    if(b.bonus) spawnDrop(b.x+b.w/2, b.y+b.h/2, true);
    else if(b.power) spawnDrop(b.x+b.w/2, b.y+b.h/2, false);

  function damageBrick(b){ b.hits--; if(b.hits<=0) breakBrick(b);
    else { game.score+=3; blip(300,0.03,'square',0.04); } }

  // ── physics ──
  function update(){
    game.flashT=Math.max(0,game.flashT-1);
    game.msgT=Math.max(0,game.msgT-1);
    game.msgFxT=Math.max(0,game.msgFxT-1);
    game.shakeT=Math.max(0,game.shakeT-1);
    updateParticles();
    if(tongue){ tongue.t--; if(tongue.t<=0) tongue=null; }

    if(game.paused) return;

    BALL_R = BALL_R_BASE * (fx.bigball>0?1.6:1) * (fx.shrink>0?0.6:1);
    PADDLE_W = PADDLE_W_BASE * (fx.bigpad>0?1.55:1) * (fx.shortpad>0?0.6:1);
    speedMul = (fx.slow>0?0.72:1) * (fx.fast>0?1.4:1);
    if(speedMul!==prevSpeedMul){ rescaleBalls(); prevSpeedMul=speedMul; }
    for(var i=0;i<FXKEYS.length;i++){ if(fx[FXKEYS[i]]>0) fx[FXKEYS[i]]--; }

    var target=paddle.targetX;
    if(pointerX!==null) target=pointerX;
    if(keys.left) target-=7; if(keys.right) target+=7;
    var half=PADDLE_W/2+WALL;
    paddle.targetX=Math.max(half,Math.min(VW-half,target));
    paddle.x+=(paddle.targetX-paddle.x)*0.55;

    for(i=0;i<balls.length;i++){ var b=balls[i];
      if(b.squash>0) b.squash=Math.max(0,b.squash-0.12);
      if(b.stuck){ b.x=Math.max(WALL+BALL_R,Math.min(VW-WALL-BALL_R, paddle.x+b.offset)); b.y=PADDLE_Y-BALL_R-1; } }

    // falling power-ups
    for(i=drops.length-1;i>=0;i--){ var d=drops[i]; d.y+=d.vy; d.t++;
      if(game.state===STATE.PLAY && d.y>=PADDLE_Y-6 && d.y<=PADDLE_Y+PADDLE_H+6 && Math.abs(d.x-paddle.x)<=PADDLE_W/2+7){
        activate(d.type); drops.splice(i,1); continue; }
      if(d.y>VH+10) drops.splice(i,1); }

    // laser bolts
    if(game.state===STATE.PLAY && fx.laser>0){ laserTick++; if(laserTick>=15){ laserTick=0;
      lasers.push({ x:paddle.x-PADDLE_W*0.32, y:PADDLE_Y }); lasers.push({ x:paddle.x+PADDLE_W*0.32, y:PADDLE_Y });
      blip(900,0.03,'square',0.04); } }
    for(i=lasers.length-1;i>=0;i--){ var lz=lasers[i]; lz.y-=6;
      if(lz.y<HUD_H){ lasers.splice(i,1); continue; }
      var hit=false;
      for(var bi=0;bi<game.bricks.length;bi++){ var br=game.bricks[bi]; if(!br.alive) continue;
        if(lz.x>=br.x && lz.x<=br.x+br.w && lz.y<=br.y+br.h && lz.y>=br.y-6){
          if(br.steel){ blip(240,0.03,'square',0.04); } else { damageBrick(br); }
          hit=true; break; } }
      if(hit) lasers.splice(i,1); }

    if(game.state!==STATE.PLAY){ runBlasts(); return; }

    for(i=0;i<balls.length;i++){ var bb=balls[i]; if(bb.stuck) continue;
      bb.trail.push({x:bb.x,y:bb.y}); if(bb.trail.length>7) bb.trail.shift();
      var sp=Math.hypot(bb.vx,bb.vy), steps=Math.max(1,Math.ceil(sp/(BALL_R*0.5)));
      for(var s=0;s<steps;s++){ bb.x+=bb.vx/steps; bb.y+=bb.vy/steps;

    runBlasts();

    for(i=balls.length-1;i>=0;i--){ if(balls[i].y-BALL_R>VH){ spawnDust(balls[i].x,VH-10,8); balls.splice(i,1); } }
    if(game.state===STATE.PLAY && balls.length===0) loseLife();
  }

  function collideWalls(b){
    if(b.x-BALL_R<WALL){ b.x=WALL+BALL_R; b.vx=Math.abs(b.vx); impact(b,1,0); blip(320,0.03,'square',0.04); }
    else if(b.x+BALL_R>VW-WALL){ b.x=VW-WALL-BALL_R; b.vx=-Math.abs(b.vx); impact(b,1,0); blip(320,0.03,'square',0.04); }
    if(b.y-BALL_R<HUD_H){ b.y=HUD_H+BALL_R; b.vy=Math.abs(b.vy); impact(b,0,1); blip(360,0.03,'square',0.04); }
  }
  function collideNet(b){
    if(fx.safety>0 && b.vy>0 && b.y+BALL_R>=NET_Y){ b.y=NET_Y-BALL_R; b.vy=-Math.abs(b.vy); impact(b,0,1); blip(420,0.04,'sine',0.05); }
  }
  function collidePaddle(b){
    if(b.vy<=0) return;
    var px0=paddle.x-PADDLE_W/2, py=PADDLE_Y;
    if(b.x+BALL_R>px0 && b.x-BALL_R<px0+PADDLE_W && b.y+BALL_R>py && b.y-BALL_R<py+PADDLE_H){
      b.y=py-BALL_R; resetCombo();
      if(fx.sticky>0){ b.stuck=true; b.offset=b.x-paddle.x; b.vx=0; b.vy=0; impact(b,0,1); blip(440,0.05,'sine'); return; }
      var hit=Math.max(-1,Math.min(1,(b.x-paddle.x)/(PADDLE_W/2)));
      var ang=-Math.PI/2 + hit*(Math.PI/3), sp=Math.max(levelSpeed*speedMul, Math.hypot(b.vx,b.vy));
      b.vx=Math.cos(ang)*sp; b.vy=Math.sin(ang)*sp; impact(b,0,1); blip(480,0.05,'square');
    }
  }
  function collideBricks(b){
    for(var i=0;i<game.bricks.length;i++){ var br=game.bricks[i]; if(!br.alive) continue;
      var nx=Math.max(br.x,Math.min(b.x,br.x+br.w)), ny=Math.max(br.y,Math.min(b.y,br.y+br.h));
      var dx=b.x-nx, dy=b.y-ny;
      if(dx*dx+dy*dy<=BALL_R*BALL_R){
        if(br.steel){ if(Math.abs(dx)>Math.abs(dy)){ b.vx=-b.vx; impact(b,1,0);} else { b.vy=-b.vy; impact(b,0,1);} blip(240,0.04,'square',0.05); return true; }
        var pierce=fx.pierce>0;
        if(!pierce){ if(Math.abs(dx)>Math.abs(dy)){ b.vx=-b.vx; impact(b,1,0);} else { b.vy=-b.vy; impact(b,0,1);} }
        tongue={ x:b.x, y:b.y, tx:br.x+br.w/2, ty:br.y+br.h/2, t:7 };
        blip(620+(7-br.row)*55, 0.05, 'square');
        if(pierce) breakBrick(br); else damageBrick(br);
        if(fx.bombball>0) detonate(br.x+br.w/2, br.y+br.h/2, BLAST_R*0.8);

      }
    }
    return false;
  }

  // ── rendering ──
  function px(v){ return Math.round(v); }
  function pad(n,w){ n=''+n; while(n.length<w) n='0'+n; return n; }
  function capsule(x,y,w,h){ var r=h/2; ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawFrame(){
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.strokeRect(px(WALL)+0.5, px(WALL)+0.5, VW-WALL*2-1, VH-WALL*2-1);
    ctx.beginPath(); ctx.moveTo(WALL,HUD_H+0.5); ctx.lineTo(VW-WALL,HUD_H+0.5); ctx.stroke();
  }
  function drawFrogHead(cx,cy,sc){ ctx.fillStyle='#fff'; var u=sc;
    ctx.fillRect(px(cx-4*u),px(cy-1*u),8*u,5*u);
    ctx.fillRect(px(cx-4*u),px(cy-3*u),2*u,2*u); ctx.fillRect(px(cx+2*u),px(cy-3*u),2*u,2*u);
    ctx.fillStyle='#000'; ctx.fillRect(px(cx-4*u),px(cy-3*u),1*u,1*u); ctx.fillRect(px(cx+3*u),px(cy-3*u),1*u,1*u); }
  function drawHUD(){
    ctx.fillStyle='#fff'; ctx.textBaseline='middle';
    ctx.font='10px ui-monospace, monospace'; ctx.textAlign='left';
    ctx.fillText('SC '+pad(game.score,5), WALL+5, HUD_H/2+1);
    ctx.textAlign='center';
    ctx.fillText('LV '+(game.level+1)+'/'+LEVELS.length, VW/2, HUD_H/2+1);
    var lx=VW-WALL-8; for(var i=0;i<game.lives;i++) drawFrogHead(lx-i*12, HUD_H/2, 0.85);
    if(game.mult>1){ ctx.textAlign='left'; ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(blinkT*0.18));
      ctx.font='9px ui-monospace, monospace'; ctx.fillText('x'+game.mult, WALL+62, HUD_H/2+1); ctx.globalAlpha=1; }
  }
  function drawBrick(b){
    var x=px(b.x)+0.5, y=px(b.y)+0.5, w=px(b.w)-1, h=px(b.h)-1, cx=b.x+b.w/2, cy=b.y+b.h/2;
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='#fff';
    if(b.steel){ ctx.beginPath(); ctx.moveTo(x+2,y+2); ctx.lineTo(x+w-2,y+h-2);
      ctx.moveTo(x+w-2,y+2); ctx.lineTo(x+2,y+h-2); ctx.stroke(); return; }
    if(b.granite){ var d=3-b.hits;
      if(d>=1){ ctx.beginPath(); ctx.moveTo(x+3,y+2); ctx.lineTo(x+5,y+h-2); ctx.stroke(); }
      if(d>=2){ ctx.beginPath(); ctx.moveTo(x+w-3,y+2); ctx.lineTo(x+w-6,y+h-2); ctx.stroke(); } }
    else if(b.tough && b.hits>1){ ctx.strokeRect(px(b.x)+2.5, px(b.y)+2.5, px(b.w)-5, px(b.h)-5); }
    if(b.tnt){ ctx.fillRect(px(cx)-1,px(cy)-1,3,3); ctx.fillRect(px(cx),px(cy)-4,1,3); ctx.fillRect(px(cx),px(cy)+2,1,3);
      ctx.fillRect(px(cx)-4,px(cy),3,1); ctx.fillRect(px(cx)+2,px(cy),3,1); }
    else if(b.bonus){ var s=2; ctx.fillRect(px(cx)-s,px(cy),s*2+1,1); ctx.fillRect(px(cx),px(cy)-s,1,s*2+1);
      ctx.fillRect(px(cx)-1,px(cy)-1,2,2); }
    else if(b.power){ ctx.strokeStyle='#fff'; capsule(px(cx-5)+0.5, px(cy-2.5)+0.5, 10, 5); ctx.stroke(); ctx.fillRect(px(cx),px(cy)-1,1,2); }
    else { ctx.fillRect(px(cx)-1,px(cy)-1,2,2); ctx.fillRect(px(cx)-4,px(cy)-2,2,1); ctx.fillRect(px(cx)+2,px(cy)-2,2,1); }
  }
  function drawBricks(){ for(var i=0;i<game.bricks.length;i++){ var b=game.bricks[i]; if(b.alive) drawBrick(b); } }
  function drawNet(){ if(fx.safety<=0) return;
    ctx.strokeStyle='rgba(255,255,255,'+(0.4+0.3*Math.abs(Math.sin(blinkT*0.15)))+')'; ctx.lineWidth=1;
    ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(WALL+2,NET_Y+0.5); ctx.lineTo(VW-WALL-2,NET_Y+0.5); ctx.stroke(); ctx.setLineDash([]); }
  function drawLasers(){ ctx.fillStyle='#fff'; for(var i=0;i<lasers.length;i++){ var l=lasers[i]; ctx.fillRect(px(l.x)-0,px(l.y)-6,2,7); } }
  function drawPaddle(){
    var x0=paddle.x-PADDLE_W/2;
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    capsule(px(x0)+0.5, px(PADDLE_Y)+0.5, PADDLE_W-1, PADDLE_H-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(paddle.x)+0.5, PADDLE_Y+1); ctx.lineTo(px(paddle.x)+0.5, PADDLE_Y+PADDLE_H-1); ctx.stroke();
    if(fx.laser>0){ ctx.fillStyle='#fff'; ctx.fillRect(px(paddle.x-PADDLE_W*0.32)-1,px(PADDLE_Y)-2,2,2); ctx.fillRect(px(paddle.x+PADDLE_W*0.32)-1,px(PADDLE_Y)-2,2,2); }
  }
  function drawOneBall(b){
    for(var i=0;i<b.trail.length;i++){ var t=b.trail[i];
      ctx.globalAlpha=(i/b.trail.length)*0.16; ctx.fillStyle='#fff'; ctx.fillRect(px(t.x)-1,px(t.y)-1,2,2); }
    ctx.globalAlpha=1;
    var sx=1+(b.sqx-1)*b.squash, sy=1+(b.sqy-1)*b.squash, unit=(BALL_R*2)/FROG_W;
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(sx,sy); ctx.fillStyle='#fff';
    var ox=-(FROG_W*unit)/2, oy=-(FROG_H*unit)/2;
    for(var r=0;r<FROG_H;r++) for(var c=0;c<FROG_W;c++)
      if(FROG[r][c]==='#') ctx.fillRect(Math.round(ox+c*unit),Math.round(oy+r*unit),Math.ceil(unit),Math.ceil(unit));
    ctx.restore();
  }
  function drawBalls(){
    if(tongue){ var k=tongue.t/7, ex=tongue.x+(tongue.tx-tongue.x)*(1-k), ey=tongue.y+(tongue.ty-tongue.y)*(1-k);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath();
      ctx.moveTo(px(tongue.x)+0.5,px(tongue.y)+0.5); ctx.lineTo(px(ex)+0.5,px(ey)+0.5); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.fillRect(px(ex)-1,px(ey)-1,2,2); }
    for(var i=0;i<balls.length;i++) drawOneBall(balls[i]);
  }
  function drawDrops(){
    for(var i=0;i<drops.length;i++){ var d=drops[i], meta=PWR[d.type];
      var w=20,h=12, x=d.x-w/2, y=d.y-h/2, bob=Math.sin(d.t*0.25)*0.6; ctx.lineWidth=1;
      if(meta.good){ ctx.strokeStyle='#fff'; capsule(px(x)+0.5,px(y+bob)+0.5,w-1,h-1); ctx.stroke(); ctx.fillStyle='#fff'; }
      else { ctx.fillStyle='#fff'; capsule(px(x)+0.5,px(y+bob)+0.5,w-1,h-1); ctx.fill(); ctx.fillStyle='#000'; }
      ctx.font='8px ui-monospace, monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(meta.tag, px(d.x), px(d.y+bob)+1); }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  function drawEffects(){
    var active=[]; for(var i=0;i<FXKEYS.length;i++){ var k=FXKEYS[i]; if(fx[k]>0) active.push(k); }
    if(active.length===0) return;
    var tw=22, gap=4, total=active.length*tw+(active.length-1)*gap, sx=VW/2-total/2, y=PADDLE_Y-18;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(i=0;i<active.length;i++){ var key=active[i], meta=PWR[key], x=sx+i*(tw+gap);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(px(x)+0.5,px(y)+0.5,tw-1,11);
      ctx.fillStyle='#fff'; ctx.font='8px ui-monospace, monospace'; ctx.fillText(meta.tag, px(x+tw/2), px(y+6));
      var frac=meta.dur>0?Math.max(0,Math.min(1,fx[key]/meta.dur)):1;
      ctx.fillRect(px(x)+1, px(y)+12, Math.round((tw-2)*frac), 1); }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  function drawParticles(){ ctx.fillStyle='#fff';
    for(var i=0;i<particles.length;i++){ var p=particles[i]; ctx.globalAlpha=Math.max(0,p.life/p.max);
      ctx.fillRect(px(p.x),px(p.y),p.size,p.size); } ctx.globalAlpha=1; }
  function drawBigFrog(cx,cy,unit,crown){ ctx.fillStyle='#fff';
    var ox=cx-(FROG_W*unit)/2, oy=cy-(FROG_H*unit)/2;
    for(var r=0;r<FROG_H;r++) for(var c=0;c<FROG_W;c++)
      if(FROG[r][c]==='#') ctx.fillRect(px(ox+c*unit),px(oy+r*unit),Math.ceil(unit),Math.ceil(unit));
    if(crown){ var cw2=FROG_W*unit*0.5, bx=cx-cw2/2, by=oy-unit*2.4;
      ctx.fillRect(px(bx),px(by),px(cw2),px(unit*1.4));
      ctx.fillRect(px(bx),px(by-unit*1.2),px(unit),px(unit*1.2));
      ctx.fillRect(px(cx-unit*0.5),px(by-unit*1.6),px(unit),px(unit*1.6));
      ctx.fillRect(px(bx+cw2-unit),px(by-unit*1.2),px(unit),px(unit*1.2)); }
  }
  var blinkT=0; function blink(){ return 0.35+0.45*(0.5+0.5*Math.sin(blinkT*0.09)); }

  function drawOverlay(){
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(WALL,HUD_H,VW-WALL*2,VH-HUD_H-WALL);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(game.state===STATE.TITLE){
      drawBigFrog(VW/2,VH*0.28,7,false);
      ctx.font='bold 22px ui-monospace, monospace'; ctx.fillText('FROG BREAKER', VW/2, VH*0.44);
      ctx.font='10px ui-monospace, monospace'; ctx.globalAlpha=0.6;
      ctx.fillText('10 levels . 13 power-ups', VW/2, VH*0.44+18);
      ctx.fillText('HI '+game.hi, VW/2, VH*0.44+32); ctx.globalAlpha=blink();
      ctx.font='11px ui-monospace, monospace'; ctx.fillText('click / tap / space to start', VW/2, VH*0.64);
      ctx.globalAlpha=0.4; ctx.font='9px ui-monospace, monospace';
      ctx.fillText('move: mouse . touch . arrows', VW/2, VH*0.64+16);
      ctx.fillText('P pause . M mute . catch capsules', VW/2, VH*0.64+30);
      ctx.globalAlpha=1;
    } else if(game.state===STATE.OVER){
      ctx.font='bold 20px ui-monospace, monospace'; ctx.fillText('GAME OVER', VW/2, VH*0.38);
      ctx.font='12px ui-monospace, monospace'; ctx.fillText('score  '+game.score, VW/2, VH*0.38+26);
      ctx.fillText('reached LV '+(game.level+1), VW/2, VH*0.38+44);
      ctx.globalAlpha=0.7; ctx.fillText('HI '+game.hi, VW/2, VH*0.38+62); ctx.globalAlpha=blink();
      ctx.font='11px ui-monospace, monospace'; ctx.fillText('click / tap / space to retry', VW/2, VH*0.64); ctx.globalAlpha=1;
    } else if(game.state===STATE.WIN){
      drawBigFrog(VW/2,VH*0.28,7,true);
      ctx.font='bold 22px ui-monospace, monospace'; ctx.fillText('YOU WIN!', VW/2, VH*0.46);
      ctx.font='12px ui-monospace, monospace'; ctx.fillText('all 10 ponds cleared', VW/2, VH*0.46+22);
      ctx.fillText('score  '+game.score, VW/2, VH*0.46+40);
      ctx.globalAlpha=0.7; ctx.fillText('HI '+game.hi, VW/2, VH*0.46+56); ctx.globalAlpha=blink();
      ctx.font='11px ui-monospace, monospace'; ctx.fillText('click / tap / space to play again', VW/2, VH*0.70); ctx.globalAlpha=1;
    }
  }
  function drawPaused(){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(WALL,HUD_H,VW-WALL*2,VH-HUD_H-WALL);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 18px ui-monospace, monospace'; ctx.fillText('PAUSED', VW/2, VH*0.46);
    ctx.globalAlpha=blink(); ctx.font='10px ui-monospace, monospace';
    ctx.fillText('P to resume', VW/2, VH*0.46+22); ctx.globalAlpha=1;
  }
  function drawMessage(){
    if(game.msgT>0){ ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.globalAlpha=Math.min(1,game.msgT/30); ctx.font='bold 15px ui-monospace, monospace';
      if(game.state===STATE.CLEAR) ctx.fillText('CLEARED', VW/2, VH*0.40);
      else { ctx.fillText('LEVEL '+(game.level+1), VW/2, VH*0.40);
        ctx.font='9px ui-monospace, monospace'; ctx.globalAlpha=Math.min(0.7,game.msgT/30);
        ctx.fillText(LV_NAMES[game.level]||'', VW/2, VH*0.40+18); }
      ctx.globalAlpha=1; }
    if(game.msgFxT>0){ ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.globalAlpha=Math.min(1,game.msgFxT/30); ctx.font='bold 12px ui-monospace, monospace';
      ctx.fillText(game.msgFx, VW/2, PADDLE_Y-34); ctx.globalAlpha=1; }
  }

  function render(){
    var ox=0, oy=0;
    if(game.shakeT>0 && !game.paused){ var m=game.shakeMag*(game.shakeT/12); ox=(Math.random()*2-1)*m; oy=(Math.random()*2-1)*m; }
    ctx.setTransform(scale*dpr,0,0,scale*dpr, ox*scale*dpr, oy*scale*dpr);
    ctx.clearRect(-4,-4,VW+8,VH+8); ctx.fillStyle='#000'; ctx.fillRect(-4,-4,VW+8,VH+8);
    drawFrame(); drawHUD(); drawBricks(); drawNet(); drawDrops(); drawLasers(); drawPaddle();
    if(game.state!==STATE.TITLE) drawBalls();
    drawEffects(); drawParticles(); drawMessage();
    if(game.paused && (game.state===STATE.PLAY||game.state===STATE.READY)) drawPaused();
    if(game.state===STATE.TITLE||game.state===STATE.OVER||game.state===STATE.WIN) drawOverlay();
    if(game.flashT>0){ ctx.fillStyle='rgba(255,255,255,'+(game.flashT/14*0.25)+')'; ctx.fillRect(0,0,VW,VH); }
  }

  // ── loop ──
  var last=performance.now(), acc=0, STEP=1000/60;
  function loop(now){ var dt=Math.min(100,now-last); last=now; acc+=dt; blinkT++;
    var guard=0; while(acc>=STEP && guard++<5){ update(); acc-=STEP; } render(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  // ── input ──
  function togglePause(){ if(game.state===STATE.PLAY||game.state===STATE.READY){ game.paused=!game.paused; } }
  function primaryAction(){ var a=audio(); if(a&&a.state==='suspended') a.resume();
    if(game.paused){ game.paused=false; return; }
    if(game.state===STATE.TITLE) startGame();
    else if(game.state===STATE.READY) launchAll();
    else if(game.state===STATE.PLAY){ if(anyStuck()) launchAll(); }
    else if(game.state===STATE.OVER||game.state===STATE.WIN) startGame();
  }
  canvas.addEventListener('pointerdown', function(e){ pointerX=toVirtualX(e.clientX);
    if(e.clientY!==undefined){ var r=canvas.getBoundingClientRect(); var vy=((e.clientY-r.top)/r.height)*VH; var vx=toVirtualX(e.clientX);
      if(vy<HUD_H && vx>VW-WALL-20){ setMute(!muted); return; } }
    primaryAction(); });
  window.addEventListener('pointermove', function(e){ if(e.pointerType==='mouse'&&e.buttons===0&&game.state===STATE.TITLE) return; pointerX=toVirtualX(e.clientX); });
  window.addEventListener('mousemove', function(e){ pointerX=toVirtualX(e.clientX); });
  window.addEventListener('keydown', function(e){
    if(e.code==='ArrowLeft'||e.code==='KeyA'){ keys.left=true; pointerX=null; }
    if(e.code==='ArrowRight'||e.code==='KeyD'){ keys.right=true; pointerX=null; }
    if(e.code==='Space'){ e.preventDefault(); primaryAction(); }
    if(e.code==='KeyM'){ setMute(!muted); }
    if(e.code==='KeyP'){ togglePause(); } });
  window.addEventListener('keyup', function(e){
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false; });
  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });

})();
</script>
</body>
</html>
