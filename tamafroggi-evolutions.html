<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAMAFROGGI — Evolution Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#fff; --dim:#9aa3ad; --faint:#2a2f36; --bg:#000;
         --rare:#8fd0ff; --apex:#ffd166; --gloom:#6b7480; }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--bg); color:var(--ink);
        font-family:"Press Start 2P", ui-monospace, monospace; line-height:1.7;
        -webkit-font-smoothing:none; image-rendering:pixelated; padding:26px 14px 60px; }
  .wrap{ max-width:1080px; margin:0 auto; }
  h1{ font-size:18px; letter-spacing:2px; margin:0 0 6px; }
  .sub{ font-size:8px; color:var(--dim); letter-spacing:1px; margin:0 0 26px; line-height:1.9; }
  .stage{ margin:0 0 30px; }
  .stage-h{ display:flex; align-items:center; gap:10px; margin:0 0 12px; }
  .stage-h .n{ font-size:11px; letter-spacing:2px; }
  .stage-h .meta{ font-size:7px; color:var(--dim); letter-spacing:1px; }
  .stage-h .rule{ flex:1; height:2px; background:var(--faint); }
  .row{ display:flex; flex-wrap:wrap; gap:12px; }
  .card{ border:2px solid var(--faint); padding:12px 12px 13px; width:172px; background:#050505;
         display:flex; flex-direction:column; align-items:center; text-align:center; }
  .card.rare{ border-color:var(--rare); }
  .card.apex{ border-color:var(--apex); box-shadow:0 0 0 1px var(--apex) inset; }
  canvas{ image-rendering:pixelated; margin:2px 0 8px; }
  .nm{ font-size:9px; letter-spacing:1px; margin:0 0 6px; }
  .card.rare .nm{ color:var(--rare); } .card.apex .nm{ color:var(--apex); }
  .req{ font-size:7px; color:var(--ink); line-height:1.8; min-height:26px; }
  .req b{ color:var(--dim); font-weight:400; }
  .bonus{ font-size:7px; color:var(--apex); margin-top:7px; line-height:1.8; }
  .bonus.none{ color:var(--gloom); }
  .trait{ font-size:7px; color:var(--dim); margin-top:6px; font-style:italic; line-height:1.7; }
  .tier-tag{ font-size:7px; letter-spacing:2px; padding:2px 6px; border:1px solid var(--faint); color:var(--dim); }
  .tier-tag.rare{ color:var(--rare); border-color:var(--rare); }
  .tier-tag.apex{ color:var(--apex); border-color:var(--apex); }
  .note{ font-size:7px; color:var(--dim); border:1px solid var(--faint); padding:11px 12px; margin:16px 0 0; line-height:2; }
  .note b{ color:var(--ink); }
  .arrowrow{ text-align:center; color:var(--faint); font-size:13px; margin:-12px 0 14px; letter-spacing:6px; }
</style></head><body><div class="wrap">
  <h1>TAMAFROGGI</h1>
  <div class="sub">EVOLUTION CHART · egg → baby → junior → adult<br>
  evolution is automatic with age; the FORM you become is decided by your stats at the moment you evolve.<br>
  each evolved form grants a permanent stat bonus (shown in gold). babies are a free prep stage.</div>
  <div id="root"></div>
  <div class="note" id="legend"></div>
</div>
<script>
var P={"SPR":{"padpole":["                ","     ######     ","   ##########   ","  ###  ##  ###  ","  ## #    # ##  ","  ##  ####  ## #","  ##########  ##","   ########  ## ","    ######  ##  ","      ##  ###   ","        ###     ","                ","                "],"hoplet":["                ","    ##    ##    ","   #  #  #  #   ","   # ## ## #    ","    ##    ##    ","    ########    ","   ##########   ","  ############  ","  ###      ###  ","  ##  ####  ##  ","   #  #  #  #   ","      #  #      ","                "],"chubbin":["                ","    ##    ##    ","   #  #  #  #   ","  ##############"," ## ##    ## ## "," ##  #    #  ## "," ############## "," ##  ####  ## # "," ###      ### # ","  ############  ","  ##        ##  ","  #          #  ","                "],"dewdrop":["                ","     ######     ","   ##########   ","  ### #### ###  ","  ## #    # ##  ","  ## #    # ##  ","  ### #### ###  ","  ############  ","  ##  ####  ##  ","   ##########   ","  ##  #  #  ##  ","  #   #  #   #  ","                "],"springer":["      ####      ","     #    #     ","    # ## # #    ","    #      #    ","     ##  ##     ","   ##########   ","  ###      ###  "," ###  ####  ### ","###  ##  ##  ###","##   ##  ##   ##"," ##        ##   ","  ###    ###    ","    ##  ##      "],"dartling":["                ","    ##    ##    ","   #  #  #  #   ","   # ###### #   ","    ##    ##    ","   ### ## ###   ","  ## #    # ##  ","  # ##    ## #  ","  ###  ##  ###  ","   #  #  #  #   ","   ## #  # ##   ","    #      #    ","                "],"bullhorn":["  #          #  ","  ##        ##  ","   ##      ##   ","    ########    ","   ##########   ","   ##  ##  ##   ","    ###  ###    ","################","### ######## ###","### ###  ### ###","   ##########   ","   ###    ###   ","  ####    ####  "],"toadsage":["                ","   ##########   ","  ############  ","  ### #### ###  ","  ## #    # ##  ","  #          #  ","  # ######## #  ","  ############  ","  # ## ## ## #  ","  ############  ","   ##########   ","   ##      ##   ","                "],"canopy":["    ##    ##    ","   #  #  #  #   ","   # #    # #   ","    ## #### ##  ","   ##########   ","  ### #### ###  "," ############## ","##  ########  ##","#    ######    #","##  ##    ##  ##"," # #        # # ","## #        # ##","#            # #"],"lotus":["       ##       ","   #   ##   #   ","  # #  ##  # #  ","  #  ######  #  "," ## ##    ## ## "," #  # #### #  # "," ## ##    ## ## ","  #  ######  #  ","   ########     ","  ############  "," ############## ","  #  #    #  #  ","   ###    ###   "],"egg_dewy":["      ####      ","    ########    ","   ##########   ","  ### #### ###  ","  ##### ######  "," ############## "," ### #### ##### "," ##### #### ### "," ############## ","  ### #### ###  ","  ###### #####  ","   ##########   ","    ########    "],"egg_mossy":["      ####      ","    ########    ","   ##########   ","  ############  ","  ## # # # ###  "," ############## "," ## # # # # ### "," ############## "," ## # # # # ### ","  ############  ","  ## # # # ###  ","   ##########   ","    ########    "],"egg_stony":["      ####      ","    ########    ","   #### #####   ","  #####  #####  ","  ####  ######  "," ######  ###### "," #####  ####### "," ######  ###### "," #####  ####### ","  #####  #####  ","  ##### ######  ","   #### #####   ","    ########    "],"sproutling":["     #    #     ","    ##    ##    ","   ###    ###   ","    ###  ###    ","      ####      ","    ########    ","   ##########   ","  ### #### ###  ","  ## #    # ##  ","  ##  ####  ##  ","   ##########   ","     ##  ##     ","    ##    ###   "],"pebblet":["                ","     ######     ","   ##########   ","  ############  "," ###  ####  ### "," ##  #    #  ## "," ##  #    #  ## "," ##   ####   ## "," ############## "," ############## ","  ############  ","  ##  ##  ##  # ","                "],"clover":["    #  ##  #    ","   ###  ###     ","  ## #  # ##    ","   ###  ###     ","     ####       ","   ########     ","  ##########    "," ### #### ###   "," ## #    # ##   "," ##  ####  ##   ","  ##########    ","   ##    ##     ","  ##      ##    "],"titan":["   #   ##   #   ","  ##   ##   ##  "," ############## "," ###  ####  ### ","   ####  ####   ","################","#######  #######","### ###  ### ###","### ######## ###","#### ###### ####","   ##########   ","  ####    ####  "," #####    ##### "],"trickster":["  #        #    ","  ##      ##    ","  ###    ###    ","   ########     ","  ##########    "," ### #### ###   "," #  ######  #   "," ## # ## # ##   "," #  ######  #   ","  ##########    ","   ##    ##     ","  ##      ##    "," ##        ##   "],"oracle":["    #  ##  #    ","     ####       ","    ##  ##      ","   ###  ###     ","   ## ## ##     ","  ###    ###    ","  ##  ##  ##    ","  ## #  # ##    ","  ##  ##  ##    ","   ## ## ##     ","    ######      ","    ##  ##      ","   ###  ###     "],"godfrog":["  #  #  #  #    ","  # ## ## #     ","   ######       ","  ## ## ## #    "," ###########    ","## ##  ## ##    ","##  ####  ##    ","## ###### ##    ","##  ####  ##    "," ##########     ","  ## ## ##      "," ###    ###     ","###      ###    "]},"FORM_NAMES":{"egg_dewy":"DEWY EGG","egg_mossy":"MOSSY EGG","egg_stony":"STONY EGG","padpole":"PADPOLE","sproutling":"SPROUTLING","pebblet":"PEBBLET","hoplet":"HOPLET","chubbin":"CHUBBIN","dewdrop":"DEWDROP","springer":"SPRINGER","dartling":"DARTLING","bullhorn":"BULLHORN","toadsage":"TOADSAGE","canopy":"CANOPY","lotus":"LOTUS","clover":"CLOVER","titan":"TITAN","trickster":"TRICKSTER","oracle":"ORACLE","godfrog":"GODFROG"},"FORM_TRAIT":{"padpole":"a fresh tadpole — everything to prove","sproutling":"a leafy sprout, growing toward the light","pebblet":"a little stone, slow but unbreakable","hoplet":"a scrappy brawler","dewdrop":"a budding mystic","chubbin":"a hardy, lucky lump","bullhorn":"raw muscle","dartling":"pure speed","canopy":"a living wall","toadsage":"a deep thinker","lotus":"serene spirit","clover":"fortune’s favourite","titan":"an unstoppable bruiser","trickster":"a lucky blur","oracle":"a font of magic","godfrog":"the apex — master of all","springer":"a jack of all trades"},"bonus":{"hoplet":"+4 STR  +3 DEX  +3 END","dewdrop":"+5 INT  +4 SPI","chubbin":"+5 END  +4 LCK","bullhorn":"+16 STR  +6 END","dartling":"+16 DEX  +5 LCK","canopy":"+18 END  +5 SPI","toadsage":"+16 INT  +6 SPI","lotus":"+18 SPI  +5 INT","clover":"+18 LCK  +5 DEX","titan":"+18 STR  +18 END","trickster":"+16 DEX  +16 LCK","oracle":"+18 INT  +18 SPI","godfrog":"+12 STR  +12 DEX  +12 END  +12 INT  +12 SPI  +12 LCK","springer":"+6 STR  +6 DEX  +6 END  +6 INT  +6 SPI  +6 LCK"},"DATA":{"eggs":[{"form":"egg_dewy","name":"DEWY EGG","to":"PADPOLE"},{"form":"egg_mossy","name":"MOSSY EGG","to":"SPROUTLING"},{"form":"egg_stony","name":"STONY EGG","to":"PEBBLET"}],"babies":[{"form":"padpole","req":"from a Dewy Egg"},{"form":"sproutling","req":"from a Mossy Egg"},{"form":"pebblet","req":"from a Stony Egg"}],"juniors":[{"form":"hoplet","req":"STR+DEX+END is your leading stat-group"},{"form":"dewdrop","req":"INT+SPI is your leading stat-group"},{"form":"chubbin","req":"LCK leads (luck-focused build)"}],"adults":[{"tier":"APEX","forms":[{"form":"godfrog","req":"every stat ≥ 22"}]},{"tier":"RARE","forms":[{"form":"titan","req":"STR ≥ 18 & END ≥ 18"},{"form":"trickster","req":"DEX ≥ 18 & LCK ≥ 16"},{"form":"oracle","req":"INT ≥ 18 & SPI ≥ 18"}]},{"tier":"COMMON","forms":[{"form":"bullhorn","req":"STR ≥ 10"},{"form":"dartling","req":"DEX ≥ 10"},{"form":"canopy","req":"END ≥ 10"},{"form":"toadsage","req":"INT ≥ 10"},{"form":"lotus","req":"SPI ≥ 10"},{"form":"clover","req":"LCK ≥ 10"}]},{"tier":"FALLBACK","forms":[{"form":"springer","req":"no requirement met"}]}]}};
function spriteCanvas(form, cell){
  cell=cell||7; var rows=P.SPR[form]||[]; var h=rows.length, w=(rows[0]||'').length;
  var cv=document.createElement('canvas'); cv.width=w*cell; cv.height=h*cell;
  var x=cv.getContext('2d'); x.fillStyle='#fff';
  for(var r=0;r<h;r++){ var line=rows[r]; for(var c=0;c<line.length;c++){ if(line[c]==='#') x.fillRect(c*cell,r*cell,cell,cell); } }
  return cv;
}
function card(form, reqText, opts){
  opts=opts||{}; var d=document.createElement('div'); d.className='card'+(opts.cls?' '+opts.cls:'');
  d.appendChild(spriteCanvas(form, opts.cell));
  var nm=document.createElement('div'); nm.className='nm'; nm.textContent=P.FORM_NAMES[form]||form; d.appendChild(nm);
  if(reqText){ var rq=document.createElement('div'); rq.className='req'; rq.innerHTML=reqText; d.appendChild(rq); }
  var bz=P.bonus[form];
  var bn=document.createElement('div'); bn.className='bonus'+(bz?'':' none'); bn.textContent=bz?('BONUS  '+bz):'no stat bonus'; d.appendChild(bn);
  var tr=document.createElement('div'); tr.className='trait'; tr.textContent=P.FORM_TRAIT[form]||''; if(tr.textContent) d.appendChild(tr);
  return d;
}
function stage(title, meta){ var s=document.createElement('div'); s.className='stage';
  var h=document.createElement('div'); h.className='stage-h';
  var n=document.createElement('div'); n.className='n'; n.textContent=title; h.appendChild(n);
  var m=document.createElement('div'); m.className='meta'; m.textContent=meta; h.appendChild(m);
  var ru=document.createElement('div'); ru.className='rule'; h.appendChild(ru);
  s.appendChild(h); var row=document.createElement('div'); row.className='row'; s.appendChild(row); s._row=row; return s;
}
function arrow(){ var a=document.createElement('div'); a.className='arrowrow'; a.textContent='▼ ▼ ▼'; return a; }
var root=document.getElementById('root');

// EGG
var se=stage('EGG','3 styles · hatches at age 0 (tap to speed it up)');
P.DATA.eggs.forEach(function(e){ se._row.appendChild(card(e.form, 'hatches into <b>'+e.to+'</b>', {cell:6})); });
root.appendChild(se); root.appendChild(arrow());

// BABY
var sb=stage('BABY','the prep stage · train freely, no penalties');
P.DATA.babies.forEach(function(b){ sb._row.appendChild(card(b.form, b.req, {cell:7})); });
root.appendChild(sb); root.appendChild(arrow());

// JUNIOR
var sj=stage('JUNIOR','baby → junior at age 4 · decided by your leading stats');
P.DATA.juniors.forEach(function(j){ sj._row.appendChild(card(j.form, j.req, {cell:7})); });
root.appendChild(sj); root.appendChild(arrow());

// ADULT
var sa=stage('ADULT','junior → adult at age 10 · checked apex → rare → common → fallback');
P.DATA.adults.forEach(function(group){
  group.forEach=group.forEach; // noop
});
P.DATA.adults.forEach(function(g){
  g.forms.forEach(function(a){
    var cls = g.tier==='APEX'?'apex': g.tier==='RARE'?'rare':'';
    var tagcls = g.tier==='APEX'?'apex': g.tier==='RARE'?'rare':'';
    var req = '<span class="tier-tag '+tagcls+'">'+g.tier+'</span><br>'+a.req;
    sa._row.appendChild(card(a.form, req, {cls:cls, cell:7}));
  });
});
root.appendChild(sa);

document.getElementById('legend').innerHTML =
  '<b>HOW ADULT FORMS ARE CHOSEN</b><br>'+
  'At age 10 your stats are checked from the top down: <b>APEX</b> (Godfrog) first, then <b>RARE</b> dual-stat forms, then <b>COMMON</b> single-stat forms, then the <b>FALLBACK</b> Springer if nothing qualifies.<br>'+
  'You take the highest tier you qualify for. If you meet several forms in that same tier (e.g. both Titan and Oracle), one of them is chosen at random — so a focused build funnels you toward a specific form, while a broad build leaves it to chance.';
</script></body></html>
