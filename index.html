  :root { --line:#fff; --dim:rgba(255,255,255,0.4); --faint:rgba(255,255,255,0.14); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%; background:#000; color:#fff;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    image-rendering: pixelated;
  }
  body { display:flex; flex-direction:column; align-items:center; padding:10px 12px 16px; }
  .pix { font-family:'Pixel', ui-monospace, monospace; -webkit-font-smoothing:none; font-smooth:never; }

  /* ── thick pixel buttons ── */
  .pixbtn {
    font-family:'Pixel', monospace; font-size:10px; line-height:1; letter-spacing:0;
    color:#fff; text-decoration:none; background:#000; cursor:pointer; text-transform:uppercase;
    padding:11px 12px 13px; border:0; position:relative;
    /* blocky stepped border made of solid box-shadows (thick pixels) */
    box-shadow:
      0 -4px 0 0 #fff, 0 4px 0 0 #fff, -4px 0 0 0 #fff, 4px 0 0 0 #fff,
      0 0 0 4px #fff,
      0 7px 0 0 rgba(255,255,255,0.25);  /* drop shadow block */
    transition: transform .04s;
  }
  @media (hover:hover) and (pointer:fine){
    .pixbtn:hover { background:#fff; color:#000; outline:none; }
  }
  .pixbtn:focus { outline:none; }
  .pixbtn.locked { opacity:0.3; cursor:not-allowed; }
  .pixbtn.locked:hover { background:#000; color:#fff; }
  .pixbtn:active { transform: translateY(3px);
    box-shadow: 0 -4px 0 0 #fff,0 4px 0 0 #fff,-4px 0 0 0 #fff,4px 0 0 0 #fff,0 0 0 4px #fff; }
  .pixbtn[disabled] { opacity:.28; pointer-events:none; }
  .pixbtn.alert { animation: pulse .7s steps(2) infinite; }
  @keyframes pulse { 50% { background:#fff; color:#000; } }

  #nav { display:flex; gap:14px; justify-content:center; margin-bottom:10px; }

  #app { width:100%; max-width:380px; }
  .title { text-align:center; font-size:14px; letter-spacing:1px; margin-bottom:8px; }

  #screen { position:relative; width:100%; height:280px; background:#000; overflow:hidden;
    box-shadow: 0 0 0 3px #fff; margin: 2px 0 12px; }
  #pet { display:block; width:100%; height:100%; image-rendering:pixelated; }
  #nameTag  { position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:11px; }
  #combatBar { position:absolute; top:7px; right:8px; z-index:5; display:none; gap:6px; }
  #combatBar.show { display:flex; }
  #combatBar .cbtn { font-family:'Pixel',monospace; font-size:8px; letter-spacing:1px; color:#fff; line-height:1;
    background:rgba(0,0,0,0.6); border:1.5px solid #fff; padding:3px 9px; cursor:pointer; text-transform:uppercase;
    -webkit-tap-highlight-color:transparent; }
  #combatBar .cbtn.on { background:#fff; color:#000; }
  #combatBar .cbtn:active { transform:translateY(1px); }

  #stats { margin:6px 0 2px; }
  .stat { display:flex; align-items:center; gap:8px; margin:5px 0; }
  .stat .lab { width:54px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  .track { flex:1; height:11px; position:relative; box-shadow:0 0 0 2px #fff; background:#000; }
  .seg { position:absolute; top:0; bottom:0; left:0; background:#fff; width:50%;
         transition:width .25s steps(10); }
  .track .val { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:7px; letter-spacing:1px; color:#fff; mix-blend-mode:difference; pointer-events:none; }
  .stat.low .seg { animation: blinkfill .6s steps(2) infinite; }
  @keyframes blinkfill { 50% { opacity:.25; } }

  #rpgRow { display:flex; flex-wrap:wrap; justify-content:space-between; gap:3px 8px;
            font-size:8px; letter-spacing:1px; color:var(--dim); margin:6px 0 2px; }
  #rpgRow span { white-space:nowrap; }
  #rpgRow b { color:#fff; font-weight:normal; }

  #questRow { display:flex; justify-content:space-between; align-items:center; gap:8px;
              font-size:8px; letter-spacing:1px; color:var(--dim); margin:8px 0 4px; }
  #questRow #questBiome { color:#fff; }
  #questRow #questProg { color:var(--dim); }
  #questRow #questAge { color:#fff; }

  #cycleRow { display:flex; align-items:center; gap:8px; margin:6px 0 2px; }

  function enemyAt(biome, stage, battle, isLast){
    var di=stageIndex(biome,stage), lvl=di + battle*0.10;
    var arche=ARCHE[(biome*7 + stage*3 + battle*5) % ARCHE.length];
    var sprite=arche + Math.min(3, Math.floor(biome/2));
    var atLast=!!isLast;                                 // the final wave of the stage (boss/elite)
    var biomeBoss=atLast && (stage===N_STAGES-1);        // the true boss of the biome
    var elite=atLast && !biomeBoss;                      // stage-end elites (stages 1-5)
    var boss=atLast, isFinal=atLast && biome===N_BIOMES-1 && stage===N_STAGES-1;
    var hp =Math.round(ENEMY_HP0  * Math.pow(ENEMY_HP_GROW,  lvl));
    var atk=Math.round(ENEMY_ATK0 * Math.pow(ENEMY_ATK_GROW, lvl));
    var def=Math.round(ENEMY_DEF0 * Math.pow(ENEMY_DEF_GROW, lvl));
    var crit=Math.min(0.35, 0.02 + lvl*0.006);
    var name=BIOME_ADJ[biome]+' '+ARCHE_NAME[arche], bspr=null, emech=null;
    if(elite){
      var di2=stageIndex(biome,stage);
      if(di2 < ELITE_MECH_START){          // Plains stages 1-2: plain stat-elite (gentle intro)
        hp=Math.round(hp*3.2); atk=Math.round(atk*1.25); crit+=0.05; name='Elite '+name;
      } else {                              // mechanic elite
        var m=ELITE_MECHS[(di2-ELITE_MECH_START)%ELITE_MECHS.length]; emech=m.id;
        hp=Math.round(hp*2.9); atk=Math.round(atk*1.18); crit+=0.05; name=m.title+' '+ARCHE_NAME[arche];
        if(emech==='phantom') hp=Math.round(hp*0.55);          // fragile but evasive
        else if(emech==='berserk') atk=Math.round(atk*0.88);   // starts gentle, ramps up
        else if(emech==='volatile') hp=Math.round(hp*0.9);
      }
      if(biome===0 && stage<=2){ hp=Math.round(hp*0.85); atk=Math.round(atk*0.85); }   // gentler Plains stage 1-3 elites (-15%)
    } else if(biomeBoss){ // the true biome boss — bigger, harder, themed, with a signature mechanic
      hp=Math.round(hp*4.6); atk=Math.round(atk*1.45); def=Math.round(def*1.18); crit+=0.09;

  // ── encounter list for a stage: a fixed number of WAVES. most are battles; a handful are
  //    in-battle events (boons / hazards) that COUNT as waves. the final wave is always the boss. ──
  function buildEncounters(biome, stage){
    var total=battlesFor(stage), arr=[], c=0;
    for(var w=1; w<=total; w++){
      if(w===total){ arr.push({t:'combat', n:c, boss:true}); c++; break; }   // final wave = the boss
      if(w%5===0)      arr.push({t:'pos'});                                   // a boon every 5th wave
      else if(w%9===0) arr.push({t:'neg'});                                  // a hazard every 9th wave
      else { arr.push({t:'combat', n:c, boss:false}); c++; }
    }
    return arr;
  }

  function bfMul(k){ var f=S.fight; return (f&&f.buffs&&f.buffs[k]!=null)?f.buffs[k]:1; }

  function healPet(frac){ S.stats.health=Math.min(maxHP(), S.stats.health+Math.round(maxHP()*frac)); }

  // capture what an event actually did (HP/mana deltas + which stage-buffs changed) into a readable list
  function describeEffect(bHP, bBuffs){
    var parts=[], f=S.fight; if(!f) return parts; var b=f.buffs;
    var dHP=Math.round((S.stats.health||0) - bHP); if(dHP) parts.push((dHP>0?'+':'')+dHP+' HP');
    function mul(k,lbl){ if(b[k]!==bBuffs[k]){ var p=Math.round((b[k]/bBuffs[k]-1)*100); if(p) parts.push(lbl+' '+(p>0?'+':'')+p+'%'); } }
    function add(k,lbl){ if(b[k]!==bBuffs[k]){ var p=Math.round((b[k]-bBuffs[k])*100); if(p) parts.push(lbl+' '+(p>0?'+':'')+p+'%'); } }
    function flat(k,lbl){ if(b[k]!==bBuffs[k]){ var d=Math.round(b[k]-bBuffs[k]); if(d) parts.push(lbl+' '+(d>0?'+':'')+d); } }
    mul('atk','ATK'); mul('hp','Max HP'); mul('def','DEF');
    add('crit','Crit'); add('dodge','Dodge'); add('haste','Atk Spd'); add('critMult','Crit DMG');
    add('lifesteal','Lifesteal'); add('combo','Combo'); add('reflect','Thorns'); add('execute','Execute'); add('bleed','Bleed'); add('sunder','Sunder');
    if(b.foeAtk!==bBuffs.foeAtk){ var fp=Math.round((1-b.foeAtk)*100); if(fp) parts.push('Foe DMG '+(fp>0?'-':'+')+Math.abs(fp)+'%'); }
    flat('shieldPer','Shield/fight'); flat('interHeal','Heal/fight');
    return parts;
  }

  function eventPool(kind, biome){
    biome=biome||0;
    return kind==='pos' ? GEN_POS.concat(BIOME_POS[biome]||[]) : GEN_NEG.concat(BIOME_NEG[biome]||[]);
  }
  function pickEvent(pool){ return pool[Math.floor(Math.random()*pool.length)]; }

  // ── pet derived combat stats (equipped items via ST, stage-buffs via bf*) ──
  function maxHP(){ return Math.round((60 + ST('end')*8) * bfMul('hp')); }
  function hpRegen(){ return 1 + Math.floor(ST('end')*0.12); }      // passive HP per cycle (END)
  function energyRegen(){ return 10 + Math.floor(ST('spi')/5); }  // passive energy per completed cycle: 10 base, +1 per 5 SPI
  function petATK(){ return Math.round((ST('str') + Math.floor(ST('dex')/4)) * bfMul('atk')); }
  function petDEF(){ return Math.round((Math.floor(ST('end')/4) + Math.floor(ST('dex')/8)) * bfMul('def')); }
  function petCritChance(){ return Math.min(0.85, ST('lck')*0.008 + equipEffect('crit') + bfAdd('crit')); }
  function petCritMult(){ return Math.min(5, 1.5 + ST('dex')*0.01 + equipEffect('critMult') + bfAdd('critMult')); }
  function petDodge(){ return Math.min(0.6, ST('lck')*0.005 + equipEffect('dodge') + bfAdd('dodge')); }
  // attack cadence: more DEX -> faster swings; haste items + buffs speed it further
  function petAtkInterval(){ return Math.max(260, Math.round((PET_ATK_BASE - ST('dex')*3) * (1-equipEffect('haste')-bfAdd('haste')))); }
  // mana grows with INT + SPI
  // rest: heal HP (END) or recover energy (SPI); the chosen stat sets amount + speed
  function restHeal(){ return 8 + Math.round(ST('end')*0.8); }
  function restEnergyGain(){ return 20 + Math.floor(ST('spi')/2); }   // energy per rest: 20 base, +1 per 2 SPI (160 SPI -> 100)
  function restDur(stat){ return Math.max(ACT_MIN_MS, ACT_DUR.rest - (S.rpg[stat||'end']||0)*ACT_STEP_MS); }

  function spellById(id){ for(var i=0;i<SPELLS.length;i++) if(SPELLS[i].id===id) return SPELLS[i]; return null; }

  function checkSpells(){    // call after stat gains; logs newly learned spells
    if(!S.spells) S.spells=[];
    var have={}; for(var i=0;i<S.spells.length;i++) have[S.spells[i]]=1;
    var now=learnableSpells();
    for(var j=0;j<now.length;j++) if(!have[now[j]]){
      S.spells.push(now[j]);
      var sp=spellById(now[j]);
      logEvent('\u2728 learned a spell: '+(sp?sp.name:now[j])+'!'); blip(900,0.1,'sine');
      // auto-slot into an empty loadout slot so new players see spells work
      if(S.loadout && S.loadout.indexOf(now[j])<0){ var es=S.loadout.indexOf(null); if(es>=0) S.loadout[es]=now[j]; }
    }
  }

    var f=S.fight; if(!f||!f.event||!f.event.choices) return;
    autoNoteEl=null; autoEventT=0;
    var ch=f.event.choices[i]; if(!ch) return;
    var bHP=S.stats.health, bBuffs=Object.assign({},f.buffs);
    ch.run(f);
    if(S.dead){ closeOverlay(); updateControls(); render(); return; }   // a choice ended the run (secret ending)
    var rep=describeEffect(bHP,bBuffs);
    f.event.result=rep; f.event.chosenLabel=ch.label;
    combatLog('\u2726 '+f.event.title+' \u2014 '+ch.label+(rep.length?'  ('+rep.join(', ')+')':''));
    logEvent('\u2726 '+f.event.title+': '+ch.label+(rep.length?' \u2014 '+rep.join(', '):'')+' (this run)');
    blip(900,0.1,'sine'); closeOverlay();
    f.state='eventbanner'; f.stateT=5000;   // linger on the result, then advance
    updateControls(); render();
  }

  function spellDamageScore(sp, r){
    switch(sp.type){
      case 'dmg': case 'risky': case 'weaken': return sp.pow(r);
      case 'multi':   return sp.pow(r)*(sp.hits||3);
      case 'execute': return sp.pow(r)*1.3;
      case 'drain':   return sp.pow(r)*1.05;
      case 'burn':    return sp.pow(r)*(sp.rounds||4)*0.85;   // spread out -> slightly discounted
      default:        return 0;   // heal / regen / shield are not offensive
    }
  }
  // map a spell to a cast-animation kind (a few have themed overrides via sp.vfx)
  function spellVfx(sp){
    if(sp.vfx) return sp.vfx;
    switch(sp.type){
      case 'multi':   return 'volley';
      case 'execute': return 'reap';
      case 'drain':   return 'drain';
      case 'burn':    return 'flames';
      case 'weaken':  return 'hex';
      case 'risky':   return 'blast';
      case 'heal':    return 'heal';
      case 'regen':   return 'regen';
      case 'shield':  return 'ward';
      default:        return 'bolt';   // single-target damage
    }
  }
  var CAST_MS=620;
  // per-spell cooldowns: INT+SPIRIT mastery + item haste shorten cooldowns (combined cap 80%)
  function spellCdr(){ return Math.min(0.55, (ST('int')+ST('spi'))/900); }
  // equipping more spells lengthens every cooldown (trade cast speed for utility): 1 spell \u00d71.0, 2 \u00d71.2, 3 \u00d71.4.
  // the Triumvirate relic removes this penalty \u2014 sling all three at full speed.
  function spellLoadCount(){ var n=0, ld=S.loadout||[]; for(var i=0;i<ld.length;i++) if(ld[i]) n++; return n; }
  function spellLoadFactor(){ if(equipEffect('triumvirate')>0) return 1; var n=spellLoadCount(); return n>=3?1.4 : (n===2?1.2 : 1.0); }
  function spellCd(sp){ var red=Math.min(0.80, spellCdr()+equipEffect('spellHaste')); return Math.max(420, Math.round((sp.cd||2200)*spellLoadFactor()*(1-red))); }
  // ── verbose, lighthearted combat narration ───────────────────────────────────
  function pickN(a){ return a[(Math.random()*a.length)|0]; }
  function narr(t,p,e,d){ return t.replace(/\{p\}/g,p).replace(/\{e\}/g,e).replace(/\{d\}/g,d); }
  var PET_HITS=[
    '{p} rears up and slams the ground, clobbering {e} for {d}!',
    '{p} bonks {e} right on the noggin \u2014 {d} damage.',
    '{p} cannonballs into {e} with a mighty *ribbit* ({d}).',
    '{p} unloads a flurry of tiny furious paws on {e} \u2014 {d}!',
    '{p} delivers a heroic headbutt to {e} for {d}.',
    '{p} chomps down on {e} with surprising gusto ({d}).',
    '{p} spin-kicks {e} like a pint-sized martial artist \u2014 {d}!',
    '{p} belly-flops onto {e} from a great height for {d}.',
    '{p} whacks {e} with the confidence of a creature thrice its size ({d}).',
    '{p} hops up and drop-kicks {e} square in the face \u2014 {d}!',
    '{p} lashes out with a sticky tongue, smacking {e} for {d}.'
  ];
  var PET_COMBO=[
    '\u21BB and AGAIN! {p} keeps wailing on {e} \u2014 {d}!',

  ];
  var PET_CRIT=[
    '\u2726 CRITICAL! {p} finds the soft spot and wallops {e} for {d}!',
    '\u2726 KAPOW! {p} hits {e} so hard its ancestors felt it \u2014 {d}!',
    '\u2726 CRIT! {p} channels pure frog fury into {e} ({d})!'
  ];
  var PET_SUPER=[
    '\u2742 SUPERCRIT!! {p} unleashes a legendary blow on {e} \u2014 {d}!!',
    '\u2742 the heavens part \u2014 {p} utterly demolishes {e} for {d}!!'
  ];
  // enemy attacks get biome-themed flavour: "{e} <phrase> {p} \u2014 {d}!"
  var FOE_FLAVOR={
    0:['kicks up a dust cloud and charges at','stampedes headlong into','snorts and barrels into','headbutts'],
    1:['lashes out with a thorny vine at','snarls and pounces on','flings a spray of bark at','tangles up'],
    2:['surges with a cold wave at','spits a jet of water at','crackles with eel-light and zaps','splashes hard into'],
    3:['hurls a jagged rock at','looms from the dark and swipes at','grinds its stony fists into','drops a boulder on'],
    4:['crackles with lightning and strikes','dives screaming out of the sky at','buffets a howling gust at','tail-whips'],
    5:['oozes shadow and lunges at','whispers something awful and claws at','drains the warmth right out of','engulfs'],
    6:['blazes with eldritch power at','unleashes a ribbon of pure force at','warps space to strike','smites']
  };
  var FOE_CRIT=[
    '\u2726 OUCH! {e} lands a critical hit on {p} \u2014 {d}!',
    '\u2726 {e} catches {p} napping for a nasty {d}!',
    '\u2726 CRIT! {e} clobbers {p} for {d} and looks far too smug about it.'
  ];
  var FOE_SPECIAL_HIT=[
    'the blast catches {p} square \u2014 {d}!',
    '{p} is hurled back by the impact for {d}!',
    '{p} eats the full force of it \u2014 {d}!'
  ];
  function petAtkLine(p,e,d,isCombo,crit,supr){
    if(supr) return narr(pickN(PET_SUPER),p,e,d);
    if(crit) return narr(pickN(PET_CRIT),p,e,d);
    if(isCombo) return narr(pickN(PET_COMBO),p,e,d);
    return narr(pickN(PET_HITS),p,e,d);
  }
  function foeAtkLine(f,p,e,d,crit,special){
    if(special) return narr('\u2737 '+pickN(FOE_SPECIAL_HIT),p,e,d);
    if(crit) return narr(pickN(FOE_CRIT),p,e,d);
    var fl=FOE_FLAVOR[f.biome]||FOE_FLAVOR[0];
    return e+' '+pickN(fl)+' '+p+' \u2014 '+d+'!';
  }
  // spell flavour, weaving the spell's name + caster + foe
  function spellHitLine(p,e,sp,d){
    var n=sp.name;
    switch(sp.type){
      case 'multi':   return '\u2728 {p} calls down {n} \u2014 {e} is battered for {d}!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
      case 'execute': return '\u2728 {p} swings {n} in a wide arc \u2014 {e} reels for {d}!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
      case 'weaken':  return '\u2728 {p} hexes {e} with {n} \u2014 {d}, and its strength wilts!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
      case 'drain':   return '\u2728 {p} siphons life from {e} with {n} \u2014 {d}!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
      case 'risky':   return '\u2728 {p} channels {n} \u2014 {e} is blasted for {d}, but the backlash bites!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
      default:
        if(sp.vfx==='holy') return '\u2728 {p} brings down {n} \u2014 holy light smites {e} for {d}!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
        if(sp.vfx==='nuke') return '\u2728 {p} unleashes {n} \u2014 a cataclysm engulfs {e} for {d}!!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
        return '\u2728 {p} hurls {n} at {e} \u2014 {d} damage!'.replace('{p}',p).replace('{n}',n).replace('{e}',e).replace('{d}',d);
    }
  }
  function doCast(sp, f){
    f.actions=(f.actions||0)+1;
    // kick off the visual cast: offensive spells lunge the pet forward; self-buffs glow in place
    var kind=spellVfx(sp), offensive=(['heal','regen','ward'].indexOf(kind)<0);
    f.castFx={ kind:kind, t:CAST_MS, dur:CAST_MS, big:(sp.id==='ascend'||sp.id==='cataclysm') };
    if(offensive){ f.lunge=1; } else { f.flashPet=Math.max(f.flashPet||0,6); }
    var r=effRpg(), e=f.enemy, ls=equipEffect('lifesteal');
    function healSelf(h){ var b=S.stats.health; S.stats.health=Math.min(maxHP(),S.stats.health+Math.round(h)); return S.stats.health-b; }
    function leech(d){ if(ls>0) healSelf(d*ls); }
    var pn=niceName();
    if(sp.type==='dmg'){ var d=sp.pow(r); e.hp-=d; f.flashEne=10; leech(d); combatLog(spellHitLine(pn,e.name,sp,d)); blip(840,0.06,'triangle'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='multi'){ var hits=sp.hits||3, tot=0; for(var hh=0;hh<hits;hh++){ var dd=sp.pow(r); if(Math.random()<petCritChance()) dd=Math.round(dd*petCritMult()); e.hp-=dd; tot+=dd; } f.flashEne=11; leech(tot); combatLog(spellHitLine(pn,e.name,sp,tot)+' (\u00d7'+hits+')'); blip(900,0.06,'triangle'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='execute'){ var ed=sp.pow(r), low=(e.hp/e.maxHp)<(sp.exec||0.30); if(low) ed*=2; ed=Math.round(ed); e.hp-=ed; f.flashEne=12; leech(ed); combatLog(spellHitLine(pn,e.name,sp,ed)+(low?' \u2620 EXECUTE!':'')); blip(760,0.07,'sawtooth'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='drain'){ var dr=sp.pow(r); e.hp-=dr; var got=healSelf(dr*(sp.leech||0.5)); f.flashEne=10; f.flashPet=6; combatLog(spellHitLine(pn,e.name,sp,dr)+' (+'+got+' HP back)'); blip(700,0.07,'sine'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='burn'){ f.burn={ dmg:sp.pow(r), rounds:sp.rounds||4 }; combatLog('\u2728 '+pn+' sets '+e.name+' ablaze with '+sp.name+' \u2014 it\u2019s burning! ('+f.burn.dmg+'/tick)'); blip(780,0.07,'sawtooth'); }
    else if(sp.type==='weaken'){ var wd=sp.pow(r); e.hp-=wd;
      if(e.hexAtk0==null) e.hexAtk0=e.atk;                                   // remember the foe's original attack
      if((e.hexN||0)<6){ e.hexN=(e.hexN||0)+1; e.atk=Math.max(1,Math.round(e.hexAtk0*(1-0.05*e.hexN))); }   // \u22125%/cast, caps at \u221230% after 6
      f.flashEne=8; combatLog(spellHitLine(pn,e.name,sp,wd)); blip(520,0.07,'sine'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='risky'){ var d2=sp.pow(r), s2=sp.self?sp.self(r):0; e.hp-=d2; S.stats.health=Math.max(1,S.stats.health-s2); f.flashEne=10; f.flashPet=6; combatLog(spellHitLine(pn,e.name,sp,d2)+' (\u2212'+s2+' self)'); blip(760,0.07,'sawtooth'); if(e.hp<=0){ winBattle(); } }
    else if(sp.type==='heal'){ var got2=healSelf(sp.pow(r)); f.flashPet=8; combatLog(got2>0 ? ('\u2728 '+pn+' casts '+sp.name+', knitting its wounds shut (+'+got2+' HP)!') : ('\u2728 '+pn+' casts '+sp.name+' \u2014 already in fine fettle!')); blip(560,0.08,'sine'); }
    else if(sp.type==='regen'){ f.regen={ amt:sp.pow(r), rounds:sp.rounds||4 }; combatLog('\u2728 '+pn+' weaves '+sp.name+' \u2014 a soft healing glow settles in (+'+f.regen.amt+'/tick).'); blip(600,0.08,'sine'); }
    else if(sp.type==='shield'){ var sv=(sp.pow(r)||1); f.shield=Math.max(f.shield||0, sv); combatLog('\u2728 '+pn+' raises '+sp.name+' \u2014 a shimmering ward holds (\u00d7'+f.shield+')!'); blip(620,0.07,'sine'); }   // top-up, never stacks past its value
    if(f.state==='fight' && f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b '+MAX_COMBAT_ACTIONS+' actions \u2014 the fight drags on, you lose the battle!'); loseBattle(false); }
    return true;
  }

  function interludeRegen(){
    // catch your breath between foes; SPI drives it (so casters can survive long gauntlets), with a small flat floor
    var hpGain=Math.floor(ST('spi')*0.9) + Math.floor(maxHP()*0.012) + Math.round(bfAdd('interHeal'));
    S.stats.health=Math.min(maxHP(), S.stats.health+hpGain);
  }
  function winBattle(){
    var f=S.fight, e=f.enemy;
    // Undying: the first time it would die, it rises again, enraged
    if(e.mech==='revenant' && !e.eRevived){
      e.eRevived=true; e.hp=Math.round(e.maxHp*0.45); e.atk=Math.round(e.atk*1.25); e.crit=Math.min(0.5,e.crit+0.06);
      f.flashEne=14; setProc(f,'angel'); f.fx={ type:'nova', t:850, dur:850 };
      combatLog('\u2620 '+e.name+' RISES AGAIN \u2014 enraged!'); blip(150,0.2,'sawtooth',0.07); return;
    }
    // Sovereign (final boss) ascends once at the kill, instead of dying, into a faster, shielded form
    if(e.mech==='sovereign' && !e.ascended){
      e.ascended=true; e.hp=Math.round(e.maxHp*0.5); e.atk=Math.round(e.atk*1.3); e.crit=Math.min(0.55,e.crit+0.08);
      e.shieldUp=true; e.shieldHits=8; f.flashEne=16; f.fx={ type:'laser', t:950, dur:950 };
      combatLog('\u2737 '+e.name+' ASCENDS \u2014 a final, terrible form!'); blip(120,0.26,'sawtooth',0.09); return;
    }
    // Volatile: detonates on death (capped so it cannot itself be the killing blow)
    if(e.mech==='volatile' && !e.detonated){
      e.detonated=true; var blast=Math.max(0, Math.min((S.stats.health||0)-1, Math.round(maxHP()*0.30)));
      if(blast>0){ S.stats.health-=blast; f.flashPet=14; f.fx={ type:'nova', t:900, dur:900 };
        combatLog('\u2737 '+e.name+' DETONATES \u2192 '+blast+'!'); blip(120,0.25,'sawtooth',0.08); }
    }
    e.hp=0; f.flashEne=12;
    combatLog('\u2620 '+e.name+' defeated!'); blip(900,0.08,'sine');
    rollDrop(e, f.biome, stageIndex(f.biome,f.stage)===(S.stageProg||0));
    interludeRegen();
    f.state='interlude'; f.stateT=INTER_BATTLE_MS;   // interlude -> goNext() advances the gauntlet
  }
  function loseBattle(died){ var f=S.fight; f.state='lost'; f.stateT=1300; f.died=died; }

  // a single enemy hit (normal or a boss special). mult scales damage; special hits bypass shield.
  function enemyStrike(mult, special){
    var f=S.fight, e=f.enemy; f.eneLunge=1;
    // Warden / submerged foe: no attack while its guard is up or it's beneath the surface (it's winding up)
    if(!special && (e.shieldUp || e.submerged)) return;
    if(!special && Math.random()<petDodge()){ f.flashPet=4; combatLog('~ '+niceName()+' dodged!'); blip(700,0.04,'sine'); return; }
    if(!special && f.shield>0){ f.shield--; combatLog(niceName()+' shields it!'); blip(520,0.05,'sine'); return; }
    // Frenzied: damage ramps with time alive
    if(e.mech==='berserk') mult*=(1+Math.min(1.6,(e.rage||0)/11000));
    var edmg=Math.max(Math.round(e.atk*0.38*mult), Math.round((e.atk-petDEF())*mult), 1);
    edmg=Math.max(1, Math.round(edmg*bfMul('foeAtk')));
    var ecrit=Math.random()<e.crit;
    if(ecrit) edmg=Math.round(edmg*ENE_CRIT_MULT);
    if((f.absorb||0)>0){ var soak=Math.min(edmg, f.absorb); edmg-=soak; f.absorb-=soak;   // Divine Thunder ward
      if(soak>0){ f.shieldFlash=8; if(edmg<=0){ combatLog(niceName()+'\u2019s ward absorbs it!'); blip(560,0.05,'sine'); return; } } }
    S.stats.health=Math.max(0, S.stats.health-edmg); f.flashPet=special?14:9;
    combatLog(foeAtkLine(f, niceName(), e.name, edmg, ecrit, special));
    blip(ecrit?170:240,0.05,'sawtooth');
    // ── elite/boss offensive mechanics (on a landed hit) ──
    if(edmg>0){
      if(e.mech==='vampire'){ var heal=Math.round(edmg*0.6); e.hp=Math.min(e.maxHp, e.hp+heal); f.flashEne=4; combatLog('\u2748 '+e.name+' drains '+heal); }
      if(e.mech==='curse'){ var vd=Math.max(1,Math.round(e.atk*0.18)); f.venom={ dmg:vd, rounds:4 }; f.curseAtk=Math.max(0.55,(f.curseAtk||1)*0.92); combatLog('\u2620 cursed \u2014 venom & weakness'); }
      if(e.mech==='siphon' && Math.random()<0.5){ f.silence=true; combatLog('\u2014 your spellcasting is SCRAMBLED \u2014 a cast fizzles'); }
    }
    var refl=equipEffect('reflect')+bfAdd('reflect');
    if(refl>0){ var rd=Math.max(1,Math.round(edmg*refl)); e.hp-=rd; f.flashEne=6; combatLog('\u21BA thorns \u2192 '+rd); if(e.hp<=0){ winBattle(); return; } }
    var cs=equipEffect('counterSpear');                // Thorn Seles Suffering
    if(cs>0 && edmg>0 && Math.random()<cs){ var sd=Math.max(1,Math.round(ST('end')*1.5)); e.hp-=sd; f.flashEne=8; setProc(f,'spear'); combatLog('\u2191 light spear \u2192 '+sd); blip(880,0.06,'square'); if(e.hp<=0){ winBattle(); return; } }
    if(S.stats.health<=0){
      var rev=hasReviveItem();
      if(rev && !f.revived){ f.revived=true; S.stats.health=Math.round(maxHP()*rev); f.flashPet=12;
        combatLog('\u2605 PHOENIX! revived at '+Math.round(rev*100)+'%'); blip(1100,0.18,'sine'); return; }
      loseBattle(false); return;   // defeat is no longer fatal \u2014 limp home at 1 HP
    }
  }
  // pick a boss special by biome for flavour
  function bossSpecial(f){
    var b=f.biome, types = b===6?['laser','nova']:b===4?['meteor','quake']:b===3?['quake','meteor']:b===5?['nova','laser']:b===2?['nova']:['meteor','laser'];
    if(f.enemy && f.enemy.isFinal) types=['meteor','laser','nova','quake'];
    var t=types[(f.specialN||0)%types.length]; f.specialN=(f.specialN||0)+1;
    var names={laser:'fires a searing beam!',meteor:'calls down a METEOR!',quake:'splits the ground!',nova:'erupts in a nova!'};
    combatLog('\u2737 '+f.enemy.name+' '+names[t]); blip(120,0.22,'sawtooth',0.08);
    f.fx={ type:t, t:950, dur:950 };

  }

  var DOT_TICK_MS = 650;   // bleed tick cadence
  function hasBleedCrit(){ var eq=S.equipped||[]; for(var i=0;i<eq.length;i++){ var it=itemById(eq[i]); if(it&&it.bleedCrit) return true; } return false; }
  // one player strike. returns true if the fight ended. applies vuln(+50%), execute, lifesteal, then refreshes bleed and rolls sunder.
  var PROC_MS = 540;
  function setProc(f, kind, n){ f.proc={ kind:kind, t:PROC_MS, dur:PROC_MS, n:n||1 }; }
  // legendary item procs that fire after a landed hit (Sword Qi, dagger fan, Ilar angel). mutates e.hp.
  function applyHitProcs(f, e){
    var base=Math.max(1, petATK()-e.def), atk=petATK(), sup=false;
    var spm=equipEffect('sparkMul');                  // Spirit Spark \u2014 every 5th action
    if(spm>0){ f.sparkN=(f.sparkN||0)+1; if(f.sparkN%5===0){ var kd=Math.max(1,Math.round(ST('spi')*spm)); e.hp-=kd; f.flashEne=7; setProc(f,'spark'); combatLog('\u2738 spark \u2192 '+kd); blip(960,0.05,'square'); } }
    var sq=equipEffect('swordQi');                    // Blood Shadow Ailoren
    if(sq>0 && Math.random()<sq){ var qd=Math.max(1,Math.round(base*1.5)); e.hp-=qd; f.flashEne=8; setProc(f,'swordqi'); combatLog('\u29C9 Sword Qi \u2192 '+qd); blip(840,0.05,'square'); }
    var dp=equipEffect('daggerProc');                 // Gale Elres Whisperer

    if(ap>0 && Math.random()<ap){ var ad=Math.max(1,Math.round(atk*5)); e.hp-=ad; f.flashEne=12; setProc(f,'angel'); combatLog('\u2733 Ilar Angel smites \u2192 '+ad+'!'); blip(1000,0.12,'sine'); }
  }
  function playerHit(f, e, isCombo){
    // Submerged foe (Marsh Leviathan): your blow finds only water until it surfaces
    if(e.submerged){
      f.lunge=0.5; combatLog('~ '+e.name+' is submerged \u2014 only ripples'); 
      if(++f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b the fight drags on \u2014 you lose!'); loseBattle(false); return true; }
      return false;
    }
    // Phantom: slips most physical blows (spells still land — they go through doCast)
    if(e.evade>0 && Math.random()<e.evade){
      f.eneLunge=0.4; combatLog('~ '+e.name+' flickers \u2014 miss!'); blip(620,0.04,'sine');
      if(++f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b the fight drags on \u2014 you lose!'); loseBattle(false); return true; }
      return false;
    }
    // Warden: an iron guard soaks hits until shattered (no HP gets through meanwhile)
    if(e.shieldUp){
      e.shieldHits=(e.shieldHits||0)-1; f.shieldFlash=6; f.flashEne=4; f.lunge=1; setProc(f,'spark');
      if(e.shieldHits<=0){ e.shieldUp=false; f.vuln=Math.max(f.vuln||0,3); combatLog('\u25C8 '+e.name+'\u2019s guard SHATTERS! +50% dmg'); blip(420,0.1,'sawtooth'); }
      else { combatLog('\u25A4 guard holds ('+e.shieldHits+')'); blip(540,0.04,'square'); }
      if(++f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b the fight drags on \u2014 you lose!'); loseBattle(false); return true; }
      return false;
    }
    var base=Math.max(1, petATK()-e.def), dmg=base, crit=Math.random()<petCritChance(), supr=false;
    if(crit){ dmg=Math.round(dmg*petCritMult());
      var sc=equipEffect('supercrit');                // Helos Warblade
      if(sc>0 && Math.random()<sc){ supr=true; dmg=Math.max(dmg, Math.round(base*3)); }
    }
    var vuln=false; if((f.vuln||0)>0){ dmg=Math.round(dmg*1.5); f.vuln--; vuln=true; }
    var exec=equipEffect('execute')+bfAdd('execute'); if(exec>0 && (e.hp/e.maxHp)<0.25){ dmg=Math.round(dmg*(1+exec)); }
    if((f.curseAtk||1)<1) dmg=Math.max(1, Math.round(dmg*f.curseAtk));   // Cursed: your strength is sapped
    // Bulwark / Stoneform: heavy armour caps a normal hit; crits & spells cut straight through
    if(e.mech==='bulwark' && !crit && !e.cracked){
      dmg=Math.min(dmg, Math.max(2, Math.round(petATK()*0.12)));
      e.armorHits=(e.armorHits||0)+1;
      if(e.armorHits>=(e.biomeBoss?16:12)){ e.cracked=true; f.vuln=Math.max(f.vuln||0,3); f.sunderFlash=12; combatLog('\u25C8 '+e.name+'\u2019s armour SHATTERS! +50% dmg'); blip(420,0.1,'sawtooth'); }
    }
    e.hp-=dmg; f.flashEne=9; f.lunge=1;
    var ls=equipEffect('lifesteal')+bfAdd('lifesteal'); if(ls>0){ S.stats.health=Math.min(maxHP(),S.stats.health+Math.round(dmg*ls)); }
    combatLog(petAtkLine(niceName(), e.name, dmg, isCombo, crit, supr)+(vuln?' \u25C8':''));
    blip(supr?1180:(crit?900:680),0.04,'square');
    var bl=equipEffect('bleed')+bfAdd('bleed');
    if(bl>0){ var bd=Math.max(1, Math.round(petATK()*bl*((crit&&hasBleedCrit())?2:1))); f.bleed={ dmg:bd, rounds:5 }; }
    var sun=equipEffect('sunder')+bfAdd('sunder');
    if(sun>0 && Math.random()<sun){ f.vuln=3; f.sunderFlash=12; combatLog('\u25C8 SUNDERED! +50% damage for 3 hits'); blip(420,0.08,'sawtooth'); }
    applyHitProcs(f, e);
    if(supr) setProc(f,'super');                      // supercrit visual takes priority
    if(e.hp<=0){ winBattle(); return true; }
    // Mirrored: a surviving foe reflects part of your blow back at you
    if(e.mech==='mirror' && dmg>0){
      var md=Math.max(1, Math.round(dmg*0.35)); S.stats.health=Math.max(0,S.stats.health-md); f.flashPet=7; setProc(f,'spear');
      combatLog('\u21BA '+e.name+' mirrors \u2192 '+md); blip(240,0.05,'sawtooth');
      if(S.stats.health<=0){ var rv=hasReviveItem(); if(rv&&!f.revived){ f.revived=true; S.stats.health=Math.round(maxHP()*rv); combatLog('\u2605 PHOENIX! revived'); } else { loseBattle(false); return true; } }
    }
    if(++f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b '+MAX_COMBAT_ACTIONS+' actions \u2014 the fight drags on, you lose the battle!'); loseBattle(false); return true; }
    return false;
  }

  function fightTick(dt){
    var f=S.fight; if(!f) return;
    if(f.flashPet>0) f.flashPet--; if(f.flashEne>0) f.flashEne--; if(f.shieldFlash>0) f.shieldFlash--;
    if(f.lunge>0) f.lunge-=dt/200; if(f.eneLunge>0) f.eneLunge-=dt/200;
    if(f.fx){ f.fx.t-=dt; if(f.fx.t<=0) f.fx=null; }
    if(f.castFx){ f.castFx.t-=dt; if(f.castFx.t<=0) f.castFx=null; }
    if(f.proc){ f.proc.t-=dt; if(f.proc.t<=0) f.proc=null; }
    f.scroll=(f.scroll||0)+dt;   // backdrop clock
    // approach: pet hops in, backdrop scrolls, enemy walks on from the right
    if(f.state==='approach'){
      f.approachT-=dt; f.eneEnter=Math.min(1,(f.eneEnter||0)+dt/APPROACH_MS); f.travelX=(f.travelX||0)+dt*0.5;
      if(f.approachT<=0){ f.state='fight'; f.eneEnter=1; }
      return;
    }
    if(f.state==='won' || f.state==='lost'){ f.stateT-=dt; if(f.stateT<=0) endFight(); return; }
    if(f.state==='interlude'){ f.stateT-=dt; if(f.stateT<=0) goNext(); return; }
    if(f.state==='eventbanner'){ f.stateT-=dt; if(f.stateT<=0){ f.event=null; goNext(); } return; }
    if(f.state==='event'){ return; }   // waiting for the player's choice (overlay open)
    var e=f.enemy; if(!e) return;
    // ── elite / boss mechanic ticks ──
    if(e.mech==='berserk') e.rage=(e.rage||0)+dt;                          // Frenzied: anger builds with time
    if(e.mech==='warden' && !e.shieldUp){ e.wardenT=(e.wardenT||0)+dt;     // Warden: raise an iron guard on a cycle
      if(e.wardenT>=5200){ e.wardenT=0; e.shieldUp=true; e.shieldHits=(e.biomeBoss?8:5); f.shieldFlash=8; combatLog('\u25A4 '+e.name+' raises an iron guard \u2014 break it!'); blip(360,0.08,'square'); } }
    if(e.mech==='regrow' && e.hp>0 && e.hp<e.maxHp){ e.regrowT=(e.regrowT||0)+dt;  // Elder Bramble: knits its wounds
      if(e.regrowT>=900){ e.regrowT-=900; e.hp=Math.min(e.maxHp, e.hp+Math.max(1,Math.round(e.maxHp*0.012))); f.flashEne=2; } }
    if(e.mech==='submerge'){                                                // Marsh Leviathan: dive, then surface hard
      e.subT=(e.subT||0)+dt;
      if(e.submerged){ if(e.subT>=2600){ e.submerged=false; e.subT=0; combatLog('\u2737 '+e.name+' SURFACES!'); f.fx={type:'nova',t:900,dur:900}; enemyStrike(1.7,true); if(f.state!=='fight') return; } }
      else if(e.subT>=6000){ e.submerged=true; e.subT=0; combatLog('~ '+e.name+' submerges beneath the marsh\u2026'); blip(300,0.1,'sine'); f.shieldFlash=6; }
    }
    if(f.venom && f.venom.rounds>0){                                        // Cursed: venom eats at the pet
      f.venomTick=(f.venomTick||0)+dt;
      if(f.venomTick>=DOT_TICK_MS){ f.venomTick-=DOT_TICK_MS; S.stats.health=Math.max(0,S.stats.health-f.venom.dmg); f.flashPet=5; f.venom.rounds--; combatLog('\u2620 venom \u2192 '+f.venom.dmg);
        if(f.venom.rounds<=0) f.venom=null;
        if(S.stats.health<=0){ var rvv=hasReviveItem(); if(rvv&&!f.revived){ f.revived=true; S.stats.health=Math.round(maxHP()*rvv); combatLog('\u2605 PHOENIX! revived'); } else { loseBattle(false); return; } } }
    }
    // our attack. items can combo (chain extra strikes), sunder (+50% dmg), execute (vs weak foes), bleed, lifesteal.
    f.petTick+=dt;
    if(f.petTick>=petAtkInterval()){
      f.petTick-=petAtkInterval();
      if(playerHit(f,e,false)) return;
      var comboCh=equipEffect('combo')+bfAdd('combo'), chains=0;
      while(comboCh>0 && chains<5 && Math.random()<comboCh){
        chains++; f.comboFlash=10;
        combatLog('\u21BB COMBO \u00d7'+chains+'!'); blip(1000+chains*60,0.04,'square');
        if(playerHit(f,e,true)) return;
      }
    }
    // bleed damage-over-time from items (ticks on its own cadence, no spells required)
    if(f.bleed && f.bleed.rounds>0){
      f.bleedTick=(f.bleedTick||0)+dt;
      if(f.bleedTick>=DOT_TICK_MS){
        f.bleedTick-=DOT_TICK_MS; e.hp-=f.bleed.dmg; f.flashEne=5; f.bleed.rounds--;
        combatLog('\u2248 bleed \u2192 '+f.bleed.dmg);
        if(f.bleed.rounds<=0) f.bleed=null;
        if(e.hp<=0){ winBattle(); return; }
      }
    }
    // ── spell burn / regen DoTs, each on its own steady cadence ──
    if(f.burn && f.burn.rounds>0){ f.burnTick=(f.burnTick||0)+dt;
      if(f.burnTick>=SPELL_DOT_MS){ f.burnTick-=SPELL_DOT_MS; e.hp-=f.burn.dmg; f.flashEne=6; f.burn.rounds--; combatLog('\u2235 burn \u2192 '+f.burn.dmg); if(f.burn.rounds<=0) f.burn=null; if(e.hp<=0){ winBattle(); return; } } }
    if(f.regen && f.regen.rounds>0){ f.regenTick=(f.regenTick||0)+dt;
      if(f.regenTick>=SPELL_DOT_MS){ f.regenTick-=SPELL_DOT_MS; var rgb=S.stats.health; S.stats.health=Math.min(maxHP(),S.stats.health+f.regen.amt); f.regen.rounds--; if(S.stats.health-rgb>0) combatLog('\u2235 regen +'+(S.stats.health-rgb)); if(f.regen.rounds<=0) f.regen=null; } }
    // ── per-spell cooldowns: every equipped slot charges on its OWN timer, casts the moment it fills ──
    var ld=S.loadout||[]; if(!f.cdT) f.cdT=[0,0,0];
    for(var ci=0; ci<3; ci++){ var cid=ld[ci], csp=cid&&spellById(cid); if(!csp){ f.cdT[ci]=0; continue; } var ecd=spellCd(csp); f.cdT[ci]=Math.min(ecd, (f.cdT[ci]||0)+dt); }
    for(var sj=0; sj<3; sj++){                                    // cast the lowest ready slot (one per tick)
      var sid=ld[sj]; if(!sid) continue; var sp=spellById(sid); if(!sp) continue;
      if((f.cdT[sj]||0) < spellCd(sp)) continue;                  // still charging
      if(f.silence){ f.silence=false; f.cdT[sj]=0; combatLog('\u2014 silenced! '+sp.name+' fizzles'); blip(220,0.06,'sawtooth'); break; }
      // no mana cost any more \u2014 a ready spell always fires, so cooldowns cycle (heals top you off, shields refresh)
      doCast(sp, f); f.cdT[sj]=0;
      if(f.state!=='fight') return;
      break;
    }
    // boss special attack (dramatic; every ~3.6s — the ascended Sovereign hammers faster)
    if(e.biomeBoss){
      var spInt=(e.mech==='sovereign' && e.ascended)?2200:3600;
      f.specialTick=(f.specialTick||0)+dt;
      if(f.specialTick>=spInt){ f.specialTick=0; bossSpecial(f); if(f.state!=='fight') return; }
    }
    // Divine Thunder Nashir: every ~3 turns, smite + raise a ward
    var tt=equipEffect('thunderTurn');
    if(tt>0){
      f.thunderTick=(f.thunderTick||0)+dt;
      if(f.thunderTick>=4800){ f.thunderTick-=4800;
        var td=Math.max(1, Math.round(ST('int')*3*tt)); e.hp-=td; f.flashEne=12; setProc(f,'thunder');
        f.absorb=(f.absorb||0)+Math.round(ST('int')*tt); f.shieldFlash=8;
        combatLog('\u26A1 Divine Thunder \u2192 '+td+'  (ward +'+Math.round(ST('int')*tt)+')'); blip(150,0.18,'sawtooth',0.07);
        if(e.hp<=0){ winBattle(); return; }
      }
    }
    // enemy normal attack (Frenzied foes strike faster the angrier they get)
    var eInt=ENE_ATK_BASE; if(e.mech==='berserk') eInt=Math.max(620, Math.round(ENE_ATK_BASE*(1-Math.min(0.45,(e.rage||0)/16000))));
    f.eneTick+=dt;
    if(f.eneTick>=eInt){ f.eneTick-=eInt; enemyStrike(1, false); if(f.state!=='fight') return; }
  }

  function endFight(){
    var f=S.fight; if(!f) return;
    if(f.state==='won'){
      var isFinal=(f.biome===N_BIOMES-1 && f.stage===N_STAGES-1);
      var frontier=(stageIndex(f.biome,f.stage)===(S.stageProg||0));
      logEvent('\u2605 cleared '+BIOMES[f.biome]+' Stage '+(f.stage+1));
      if(frontier){
        S.stageProg=Math.min(N_TOTAL, (S.stageProg||0)+1);
        // first-clear reward: rotate str\u2192dex\u2192end\u2192int\u2192spi\u2192lck per stage, points scale with biome (Plains 1 ... Citadel 7)
        var sk=RPG_KEYS[f.stage], pts=f.biome+1;
        bumpStat(sk, pts);
        logEvent('\u2728 first clear \u2014 +'+pts+' '+RPG_NAME[sk]+'!');
        setMessage('first clear! +'+pts+' '+RPG_NAME[sk]); blip(960,0.1,'triangle');
      }
      // clearing the Cavern (biome index 3) boss grants the Training Goblet (training gives more from now on)
      if(!S.goblet && f.biome===3 && f.stage===N_STAGES-1){
        S.goblet=true; react={type:'goblet', t:260}; flashT=22;
        setMessage('you found the TRAINING GOBLET!');
        logEvent('\u2728 found the TRAINING GOBLET \u2014 training now grants more stats!');
        blip(700,0.12,'triangle'); setTimeout(function(){blip(940,0.12,'triangle');},150); setTimeout(function(){blip(1180,0.18,'triangle');},320);
      }
      checkSpells();
      S.fight=null; S.mode='idle';
      if(isFinal){ endGame('win'); return; }
      blip(820,0.1,'sine'); save(); updateControls(); render();
    } else {
      // a defeat is never fatal now — note where & to what you fell, then limp home at 1 HP
      var foe=(f.enemy&&f.enemy.name) ? f.enemy.name : 'an unseen foe';
      var wv=(f.encIdx||0)+1, wt=f.wavesTotal||f.enc.length;
      var where=BIOMES[f.biome]+' Stage '+(f.stage+1)+', Wave '+wv+'/'+wt;
      S.fight=null; S.mode='idle';
      S.stats.health=1;   // limp home with 1 HP
      logEvent('\u2620 '+niceName()+' was defeated at '+where+' by '+foe+' \u2014 limped home at 1 HP.');
      setMessage('defeated \u2014 limped home at 1 HP'); blip(200,0.16,'sawtooth'); save(); updateControls(); render();
    }
  }

  function endGame(result){
    if(S.dead) return;
    S.ended = result;   // 'win' | 'age'
    S.dead = true; S.mode='idle'; S.modeAct=null; S.fight=null; S.critical=null;
    S.deadCause = result==='win' ? 'defeated the Void Sovereign' : 'old age';
    closeSub();
    if(result==='win'){ logEvent('\u2605\u2605 the VOID SOVEREIGN falls \u2014 YOU WIN! \u2605\u2605');
      blip(700,0.12); setTimeout(function(){blip(900,0.12);},120); setTimeout(function(){blip(1100,0.18);},240); }
    else { logEvent('\u231b '+niceName()+' grew old and passed on, the quest unfinished.');
      blip(200,0.3,'sawtooth',0.07); }
    updateAlert(); render(); save();
  }

  function checkEvolve(){
    if(S.stage==='egg' && S.age>=EGG_DUR){
      var baby = EGG_TO_BABY[S.eggStyle] || 'padpole';
      evolveTo('baby', baby, true);
      S.age=0;   // age clock starts at birth
      return;
    }
    if(S.stage==='baby' && S.age>=AGE_JUNIOR){
      evolveTo('junior', pickJunior());
    }
    if(S.stage==='junior' && S.age>=AGE_ADULT){
      evolveTo('adult', pickAdult());
    }
  }


  var flashT=0;
  function evolveTo(stage,form,hatched){
    S.stage=stage; S.form=form; flashT=22;
    blip(660,0.12,'triangle',0.07); setTimeout(function(){ blip(880,0.14,'triangle',0.07); },130);
    // apply this form's permanent stat bonus (skip for the egg->baby hatch)
    var bonus = (!hatched && FORM_BONUS[form]) ? FORM_BONUS[form] : null, bparts=[];
    if(bonus){
      if(!S.formBonus) S.formBonus={};
      for(var k in bonus){ S.rpg[k]=(S.rpg[k]||0)+bonus[k]; S.formBonus[k]=(S.formBonus[k]||0)+bonus[k]; bparts.push('+'+bonus[k]+' '+RPG_NAME[k]); }
      S.lastEvoBonus={ form:form, gains:bonus };
      // evolving is a milestone \u2014 top up to the (now larger) HP/mana pools
      S.stats.health=maxHP();
      if(typeof checkSpells==='function') checkSpells();   // new stats may unlock spells
    }
    if(hatched){
      setMessage('crack! the egg hatched into '+FORM_NAMES[form]);
      logEvent('the egg hatched into '+niceName()+'! hello!');
    } else {
      setMessage(FORM_NAMES[form]+'! it evolved');
      logEvent('\u2605 evolved into '+niceName()+(bparts.length?' \u2014 gained '+bparts.join(', ')+'!':'!'));
    }
    if(typeof updateControls==='function') updateControls();
    save(); render();
  }
  // ── death ──
  function die(cause){
    if(S.dead) return;
    S.dead=true; S.deadCause=cause||'unknown causes'; S.critical=null;
    S.busy=null; S.mode='idle'; S.modeAct=null; S.battle=null;
    if(!S.ended) S.ended='dead';
    closeSub();
    setMessage(niceName()+' has died');
    logEvent('\u2020 '+niceName()+' has died \u2014 '+S.deadCause+'.');
    blip(200,0.3,'sawtooth',0.07); setTimeout(function(){ blip(110,0.5,'sawtooth',0.07); },260);
    updateAlert(); render(); save();
  }

  // ── name helpers ──
  function niceName(){ var s=FORM_NAMES[S.form]||'Froggi'; return s.charAt(0)+s.slice(1).toLowerCase(); }
  function fillName(t){ return t.replace(/\{n\}/g, niceName()); }

  // ── event log ──
  function clockNow(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function escHtml(s){ return String(s).replace(/[&<>]/g,function(c){ return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;'; }); }
  function logEvent(msg){
    if(!S.log) S.log=[];
    S.logN=(S.logN||0)+1;
    S.log.unshift({ t:clockNow(), m:msg, seq:S.logN });
    if(S.log.length>LOG_MAX) S.log.length=LOG_MAX;
    renderLog();
  }
  // log scrolling: only stick to the newest line if the reader is already at the bottom
  // (so scrolling up to re-read mid-fight isn't yanked back), but always snap to newest when the
  // feed switches between the battle log and the home log.
  var logPinned=true;
  function logAtBottom(){ return (logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight) <= 10; }
  function pinLogBottom(){ logEl.scrollTop = logEl.scrollHeight; }
  function renderLog(){
    if(!logEl) return;
    var title=document.querySelector('.logTitle');
    var fightMode = !!(S.fight && S.fight.log);
    var modeChanged = (logEl.classList.contains('fight') !== fightMode);
    var stick = modeChanged || logAtBottom();   // decide BEFORE we replace the contents
    var prevTop = logEl.scrollTop;
    // when preserving the reader's spot, anchor to the entry they're looking at (by seq id) so that
    // pruning old lines off the top doesn't make the text creep underneath them
    var anchor=null;
    if(!stick && !modeChanged){
      var kids=logEl.children;
      for(var a=0;a<kids.length;a++){
        if(kids[a].offsetTop+kids[a].offsetHeight > prevTop){ anchor={ seq:kids[a].getAttribute('data-seq'), gap:kids[a].offsetTop-prevTop }; break; }
      }
    }
    // during a battle, the log section becomes the combat feed (keeps art clear)
    if(fightMode){
      if(title) title.textContent='BATTLE';
      logEl.classList.add('fight');
      var f=S.fight, lines=f.log;
      if(!lines.length){ logEl.innerHTML='<div class="logRow logEmpty">\u2694 engaging\u2026</div>'; }
      else {
        var base=(f.logN||lines.length)-lines.length, hb='';
        for(var j=0;j<lines.length;j++) hb+='<div class="logRow" data-seq="'+(base+j)+'">'+escHtml(lines[j])+'</div>';
        logEl.innerHTML=hb;
      }
    } else {
      if(title) title.textContent='LOG';
      logEl.classList.remove('fight');
      if(!S.log||!S.log.length){ logEl.innerHTML='<div class="logRow logEmpty">...all quiet for now...</div>'; }
      else {
        var h='';
        for(var i=S.log.length-1;i>=0;i--){ var sq=S.log[i].seq;
          h+='<div class="logRow"'+(sq!=null?' data-seq="'+sq+'"':'')+'><span class="logT">'+S.log[i].t+'</span>'+escHtml(S.log[i].m)+'</div>'; }
        logEl.innerHTML=h;
      }
    }
    if(stick){ logPinned=true; pinLogBottom(); }   // newest stays in view
    else {
      logPinned=false;
      var aEl = (anchor && anchor.seq!=null) ? logEl.querySelector('[data-seq="'+anchor.seq+'"]') : null;
      logEl.scrollTop = aEl ? (aEl.offsetTop - anchor.gap) : prevTop;   // hold the same entry steady
    }
  }

  // ── alert / critical UI ──
  function updateAlert(){
    if(!alertWrap) return;
    alertWrap.classList.remove('crit'); if(alertTime) alertTime.textContent='';
    updateControls();
  }

  function checkCritical(){
    if(S.dead||!S.critical) return;
    if(Date.now()>S.critical.deadline){
      var ev=S.critical.ev; S.critical=null; logEvent('\u23F1 too slow!'); applyQteResult(ev.to); updateAlert(); save();
    }
  }

  // format a list of [LABEL, delta] into "  (+12 FULL, -8 HP)"
  function deltaStr(changes){
    if(!changes) return '';
    var p=[]; for(var i=0;i<changes.length;i++){ var c=changes[i]; if(c[1]) p.push((c[1]>0?'+':'')+c[1]+' '+c[0]); }
    return p.length ? '  ('+p.join(', ')+')' : '';
  }
  function applyQteResult(r){
    r=r||{}; var s=S.stats, changes=[];
    if(r.win){ var heal=Math.round(maxHP()*0.08); s.health=hpClamp(s.health+heal); }
    if(r.hp){ s.health=hpClamp(s.health+r.hp); changes.push(['HP',r.hp]); }
    var enD=(r.full||0)+(r.energy||0); if(enD){ s.energy=clamp((s.energy||0)+enD); changes.push(['ENERGY',enD]); }
    if(r.stat){ for(var k in r.stat){ bumpStat(k, r.stat[k]); changes.push([RPG_NAME[k]||k.toUpperCase(), r.stat[k]]); } }
    var icon = r.die ? '\u2620 ' : (r.bad ? '\u2639 ' : ((r.good||r.win) ? '\u2728 ' : '\u2022 '));
    var msg = r.log ? fillName(r.log) : '';
    if(msg || changes.length) logEvent(icon+(msg||niceName())+deltaStr(changes));

  // ── random events ──

  function applyStatEvent(e){
    var s=S.stats, net=0, changes=[];
    var enD=(e.full||0)+(e.energy||0);   // food/energy events -> energy stat
    if(enD){ s.energy=clamp((s.energy||0)+enD); net+=enD; changes.push(['ENERGY',enD]); }
    if(e.health){ s.health=hpClamp(s.health+e.health); net+=e.health; changes.push(['HP',e.health]); }
    if(e.stat){ for(var k in e.stat){ bumpStat(k, e.stat[k]); net+=e.stat[k]; changes.push([RPG_NAME[k]||k.toUpperCase(), e.stat[k]]); } }
    var m=fillName(e.msg); setMessage(m); logEvent(m+deltaStr(changes));
    blip(net>=0?500:200,0.06,'triangle'); save();
  }

  function applyModEvent(e){
    var m=e.mod, mod={ cyc:m.cyc||3 };
    if(m.health) mod.health=m.health;
    var enD=(m.full||0)+(m.energy||0); if(enD) mod.energy=enD;
    S.mods.push(mod);
    var parts=[];
    if(mod.energy) parts.push((mod.energy>0?'+':'')+mod.energy+' ENERGY');
    if(m.health) parts.push((m.health>0?'+':'')+m.health+' HP');
    var tail = parts.length ? '  ('+parts.join(', ')+'/cycle \u00d7'+mod.cyc+')' : '';
    var t=fillName(e.msg); setMessage(t); logEvent(t+tail);
    blip(440,0.06,'triangle'); save();
  }

    var r=Math.random();

    if(r<0.50){ applyModEvent(MOD_EVENTS[(Math.random()*MOD_EVENTS.length)|0]); return; } // 20% \u2014 lingering modifier

    if(actx && actx.state==='suspended') actx.resume();
    var s=S.stats;
    // picker selections (buttons morphed into drills / rest options)
    if(kind && kind.indexOf('t:')===0){ trainOnce(kind.slice(2)); pickerMode='none'; renderActions(true); return; }
    if(kind==='r:heal'){ restOnce('heal'); pickerMode='none'; renderActions(true); return; }
    if(kind==='r:energy'){ restOnce('energy'); pickerMode='none'; renderActions(true); return; }
    if(kind==='back'){ pickerMode='none'; renderActions(true); return; }
    // open a picker on the buttons
    if(kind==='train'){ pickerMode='train'; renderActions(true); return; }
    if(kind==='rest'){ pickerMode='rest'; renderActions(true); return; }

    var openK = overlayEl.classList.contains('open') ? ovKind : null;

                 (kind==='inventory' && openK==='inventory');
    if(closes){ closeOverlay(); return; }
    if(kind==='explore'){
      if(S.stage==='baby'){ setMessage('too young to explore \u2014 grow up first'); return; }

    if(kind==='spells'){ openSpells(); return; }
    if(kind==='status'){ openStatus(); return; }
    if(kind==='inventory'){ openInventory(); return; }
    if(kind==='heal'){

      react={type:'rest',t:30}; blip(520,0.1,'sine'); setMessage('feeling a little better');

  // ── egg: rhythmic tapping to hatch (mash too fast and it shatters) ──
  var eggTapLast=0, eggCrack=0, eggWobble=0, eggPulse=0;
  function eggTap(){
    if(S.dead || S.stage!=='egg') return;
    if(actx && actx.state==='suspended') actx.resume();
    var now=performance.now();
    var dt = eggTapLast ? (now-eggTapLast) : 9999;
    eggTapLast=now; eggWobble=7;
    if(dt < EGG_TAP_SHATTER){ eggCrack = EGG_CRACK_MAX; }
    else if(dt < EGG_TAP_MIN){ eggCrack += 2; blip(240,0.06,'sawtooth'); }
    else if(dt < 340){ eggCrack += 1; blip(320,0.05,'sawtooth'); }
    else {
      S.age = Math.min(EGG_DUR, S.age + EGG_TAP_BOOST);   // good tap: speed up hatching
      eggCrack = Math.max(0, eggCrack-1);                  // careful spacing lets cracks settle
      eggPulse = 6; blip(560 + (S.age/EGG_DUR)*300, 0.05, 'square');
    }
    if(eggCrack >= EGG_CRACK_MAX){
      flashT=22; logEvent('\u2620 the egg cracked \u2014 you tapped too hard!');
      die('a shell cracked from impatient tapping'); render(); return;
    }
    if(S.age>=EGG_DUR){ checkEvolve(); }   // taps filled the meter -> hatch now
    save(); render();
  }
  function drawEggCracks(box){
    if(!eggCrack || !box) return;
    pctx.strokeStyle='#000'; pctx.lineWidth=2;
    var n=Math.min(EGG_CRACK_MAX, eggCrack);
    for(var i=0;i<n;i++){
      var sxp=box.ox+box.w*(0.28+0.16*i), sy=box.oy+box.h*0.18, d=(i%2?1:-1);
      pctx.beginPath(); pctx.moveTo(sxp, sy);
      pctx.lineTo(sxp+6*d, sy+box.h*0.26);
      pctx.lineTo(sxp-4*d, sy+box.h*0.5);
      pctx.lineTo(sxp+7*d, sy+box.h*0.72);
      pctx.stroke();
    }
    pctx.lineWidth=1;
  }

  // draw a pixel treasure chest. open: 0 (shut) .. 1 (lid flung up)
  function drawChest(cx, cy, open, glow){
    var s=3, w=14*s, h=9*s, x=cx-w/2, y=cy-h/2;
    if(glow>0){ pctx.fillStyle='rgba(255,255,255,'+(glow*0.5)+')'; pctx.beginPath(); pctx.arc(cx,cy,w*0.9,0,7); pctx.fill(); }
    pctx.fillStyle='#000'; pctx.fillRect(x-2,y-2,w+4,h+4);
    pctx.fillStyle='#fff'; pctx.fillRect(x,y,w,h);                 // body
    pctx.fillStyle='#000'; pctx.fillRect(x+2,y+2,w-4,h-4);
    pctx.fillStyle='#fff'; pctx.fillRect(cx-2,y,4,h);             // lock band
    pctx.fillRect(cx-3,cy-1,6,6);                                  // lock
    // lid (hinged at top, flings open)
    pctx.save(); pctx.translate(x, y); pctx.rotate(-open*1.1);
    pctx.fillStyle='#000'; pctx.fillRect(-2,-5*s-2,w+4,5*s+2);
    pctx.fillStyle='#fff'; pctx.fillRect(0,-5*s,w,5*s);
    pctx.fillStyle='#000'; pctx.fillRect(2,-5*s+2,w-4,5*s-3);
    pctx.restore();
    if(open>0.4){ // light pouring out
      pctx.fillStyle='rgba(255,255,255,'+(0.18*open)+')';
      pctx.beginPath(); pctx.moveTo(cx,y); pctx.lineTo(cx-w*0.7, y-h*1.6); pctx.lineTo(cx+w*0.7, y-h*1.6); pctx.closePath(); pctx.fill();
    }
  }

  function blitMap(map, ox, oy, unit, eatenFrac){

  }

  function drawSprite(form, offY, sq, xc, flip){

    var unit=Math.max(2,Math.floor((ch*PET_SCALE)/H));
    var sx=unit, sy=unit;
    if(sq){ sy=unit*sq; sx=unit*(1+(1-sq)*0.6); }

    if(xc==null) xc=cw/2;
    var ox=xc-totalW/2, oy=floorY-totalH+offY;
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++){

      if(rows[y][src]==='#') pctx.fillRect(Math.round(ox+x*sx),Math.round(oy+y*sy),Math.ceil(sx),Math.ceil(sy));
    }
    return { ox:ox, oy:oy, w:totalW, h:totalH, unit:unit, floorY:floorY };
  }

  // a wavy "smell" squiggle rising from (baseX, baseY)
  function drawSmell(baseX, baseY, height, amp, phase, alpha){
    pctx.fillStyle='#fff';
    for(var y=0; y<height; y+=3){
      var prog=y/height;
      pctx.globalAlpha = alpha*(1-prog*0.7);
      var wob=Math.sin((y*0.5) + phase + animT*0.006)*amp*(0.4+prog);

  function drawPoops(box){

      drawSmell(cx-4, topY, hgt, amp, p.slot*1.7,      alpha);
      drawSmell(cx,   topY+2, hgt+3, amp, p.slot*1.7+2, alpha);
      drawSmell(cx+4, topY, hgt, amp, p.slot*1.7+4,    alpha);
      // the poop itself
      pctx.globalAlpha = overdue ? (0.5+0.5*Math.abs(Math.sin(animT*0.006))) : 1;

  }

  function bdCactus(x,gy,s){ var h=18*s; pctx.fillRect(Math.round(x-2),Math.round(gy-h),4,h);

    pctx.fillRect(Math.round(x+2+3),Math.round(gy-h*0.55),3,h*0.3); pctx.fillRect(Math.round(x+2),Math.round(gy-h*0.55),5,3); }
  function bdTower(x,gy,s){ var w=12*s,h=34*s; pctx.fillRect(Math.round(x-w/2),Math.round(gy-h),w,h);
    for(var c=0;c<3;c++) pctx.fillRect(Math.round(x-w/2+c*w/2.4),Math.round(gy-h-4),3,4);   // crenellations
    pctx.fillStyle='#000'; pctx.fillRect(Math.round(x-2),Math.round(gy-h*0.6),4,5); pctx.fillStyle='#fff'; }
  function bdReed(x,gy,s){ for(var r=0;r<3;r++) pctx.fillRect(Math.round(x+r*3-3),Math.round(gy-(8+r%2*4)*s),1,(8+r%2*4)*s); }
  function bdMtn(x,gy,s){ pyr(x,gy,26*s,30*s,true); pctx.fillStyle='#000'; pyr(x+2,gy-22*s,5*s,6*s,true); pctx.fillStyle='#fff'; }
  function bdSpire(x,gy,s){ pyr(x,gy,5*s,40*s,true); }
  function drawBackdrop(biome, scroll){
    var gy=Math.round(ch*0.82), W=cw, near=scroll, far=scroll*0.4;
    // ground line
    pctx.fillStyle='rgba(255,255,255,0.45)'; pctx.fillRect(0,gy,W,1);
    // far/sky layer
    pctx.globalAlpha=0.32; pctx.fillStyle='#fff';
    if(biome===4){ for(var m=-1;m<4;m++){ var mx=((m*120 - far*0.5)%(W+240)+W+240)%(W+240)-120; bdMtn(mx,gy,1+bHash(m+1)*0.5); } }
    if(biome===5){ for(var st=0;st<22;st++){ var s2=bHash(st*3+1); var sx=((st*70 - far*0.6)%(W+140)+W+140)%(W+140)-70; pctx.fillRect(Math.round(sx),Math.round(8+s2*60),2,2); } }
    if(biome!==3 && biome!==5){ for(var c=0;c<4;c++){ var cs=0.7+bHash(c*5+2)*0.8; var cx2=((c*110 - far)%(W+220)+W+220)%(W+220)-110; bdCloud(cx2, 12+bHash(c+9)*30, cs); } }
    if(biome===3){ for(var sl=0;sl<7;sl++){ var sx2=((sl*55 - far*0.7)%(W+110)+W+110)%(W+110)-55; pyr(sx2, 0, 6+bHash(sl)*5, 10+bHash(sl+3)*10, false); } }
    if(biome===6){ // lightning flashes occasionally
      pctx.globalAlpha=(Math.floor(animT/90)%17===0)?0.8:0.0;
      var lx=W*0.6; pctx.fillRect(lx,0,2,18); pctx.fillRect(lx-5,16,9,2); pctx.fillRect(lx-4,18,2,16); }
    pctx.globalAlpha=1;
    // near/ground layer (biome props)
    var spacing=78, type;
    for(var i=-1;i<Math.ceil(W/spacing)+2;i++){
      var slot=i, hx=bHash(slot*7+biome*13);
      var bx=((slot*spacing - near)%(W+spacing*2)+(W+spacing*2))%(W+spacing*2)-spacing;
      var s=0.85+hx*0.5;
      if(biome===0){ if(hx>0.55) bdTree(bx,gy,s*0.8); else { pctx.fillRect(Math.round(bx-4),gy-3,2,3); pctx.fillRect(Math.round(bx),gy-5,2,5); pctx.fillRect(Math.round(bx+4),gy-3,2,3); } }
      else if(biome===1){ bdTree(bx,gy,s); }
      else if(biome===2){ if(hx>0.5) bdReed(bx,gy,s); else pctx.fillRect(Math.round(bx-6),gy-2,12,2); }
      else if(biome===3){ pyr(bx,gy,5+hx*5,7+hx*8,true); }   // stalagmites
      else if(biome===4){ if(hx>0.6){ pctx.fillStyle='#fff'; pyr(bx,gy,7,11,true);} else pctx.fillRect(Math.round(bx-5),gy-3,10,3); }
      else if(biome===5){ if(hx>0.45) bdSpire(bx,gy,s*0.7); else { pctx.fillRect(Math.round(bx-6),gy-8*s,12,7); } }   // spires + floating rock
      else if(biome===6){ if(hx>0.4) bdTower(bx,gy,s); else { pctx.fillRect(Math.round(bx-5),gy-12*s,10,12*s); } }
    }
  }

  // dramatic combat FX (boss specials) drawn over the scene
  function drawFx(f, petX, eneX, gy){
    var fx=f.fx; if(!fx) return; var p=1-Math.max(0,fx.t)/fx.dur;   // 0..1 progress
    pctx.fillStyle='#fff';
    if(fx.type==='laser'){
      // charging dot -> beam sweeping from boss to pet
      var by=gy-22;
      if(p<0.4){ var r=2+Math.sin(animT*0.05)*2; pctx.fillRect(Math.round(eneX-r), Math.round(by-r), r*2, r*2); }
      else { var w=(eneX-petX); var th=Math.max(2, 10*(1-Math.abs(p-0.7)/0.3));
        if(Math.floor(animT/40)%2===0){ pctx.fillRect(Math.round(petX), Math.round(by-th/2), Math.round(w), th); }
        // muzzle flare
        for(var s=0;s<5;s++){ var a=Math.random()*6.28, d=Math.random()*10; pctx.fillRect(Math.round(petX+Math.cos(a)*d), Math.round(by+Math.sin(a)*d),2,2); } }
    } else if(fx.type==='meteor'){
      // a big rock falls from the top onto the pet, then impact burst
      if(p<0.7){ var my=(-30)+(gy-30)*(p/0.7), mr=6+p*4;
        for(var yy=-mr;yy<mr;yy++) for(var xx=-mr;xx<mr;xx++){ if(xx*xx+yy*yy<=mr*mr) pctx.fillRect(Math.round(petX+xx),Math.round(my+yy),1,1); }
        // trail
        pctx.globalAlpha=0.4; pctx.fillRect(Math.round(petX-2), Math.round(my-mr-10), 4, 10); pctx.globalAlpha=1;
      } else { var br=(p-0.7)/0.3*30;   // shockwave ring
        pctx.globalAlpha=1-(p-0.7)/0.3;
        for(var k=0;k<14;k++){ var ang=k/14*6.28; pctx.fillRect(Math.round(petX+Math.cos(ang)*br), Math.round(gy-3+Math.sin(ang)*br*0.4),2,2); }
        pctx.globalAlpha=1; }
    } else if(fx.type==='quake'){
      // rising debris around the pet
      for(var q=0;q<10;q++){ var qx=petX-20+q*4, qh=Math.abs(Math.sin(p*3.14+q))*14; pctx.fillRect(Math.round(qx), Math.round(gy-qh), 2, qh); }
    } else if(fx.type==='nova'){
      var nr=p*46; pctx.globalAlpha=1-p; pctx.lineWidth=2; pctx.strokeStyle='#fff';
      pctx.beginPath(); pctx.arc(eneX, gy-16, nr, 0, 6.28); pctx.stroke(); pctx.globalAlpha=1;
    }
  }

  // player spell-cast visuals (monochrome). p = 0..1 progress; bolts launch from in front of the pet.
  function drawCastFx(f, petX, eneX, gy){
    var c=f.castFx; if(!c) return; var p=1-Math.max(0,c.t)/c.dur;
    var cy=gy-20, ox=petX+10;
    pctx.save(); pctx.fillStyle='#fff'; pctx.strokeStyle='#fff';
    if(c.kind==='bolt'){
      if(p<0.82){ var bx=ox+(eneX-ox)*(p/0.82);
        for(var t=0;t<5;t++){ var tx=bx-t*6, rr=3-t*0.5; pctx.globalAlpha=1-t*0.18; pctx.fillRect(Math.round(tx-rr),Math.round(cy-rr),Math.round(rr*2),Math.round(rr*2)); } pctx.globalAlpha=1;
      } else { var bp=(p-0.82)/0.18; pctx.globalAlpha=1-bp;
        for(var s=0;s<8;s++){ var a=s/8*6.28, d=bp*16; pctx.fillRect(Math.round(eneX+Math.cos(a)*d),Math.round(cy+Math.sin(a)*d),2,2); } pctx.globalAlpha=1; }
    } else if(c.kind==='holy'){
      if(p<0.55){ var hpp=p/0.55, top=cy-52, by=top+(cy-top)*hpp; pctx.globalAlpha=0.55+0.45*Math.abs(Math.sin(animT*0.1));

      } else { var fp=(p-0.55)/0.45; pctx.globalAlpha=1-fp;
        for(var r2=0;r2<10;r2++){ var aa=r2/10*6.28, dd=fp*20; pctx.fillRect(Math.round(eneX+Math.cos(aa)*dd),Math.round(cy+Math.sin(aa)*dd*0.7),2,2); }
        pctx.fillRect(Math.round(eneX-1), Math.round(cy-26), 2, 26); pctx.globalAlpha=1; }
    } else if(c.kind==='nuke'){
      if(p<0.2){ pctx.globalAlpha=(0.2-p)/0.2*0.7; pctx.fillRect(0,0,cw,ch); pctx.globalAlpha=1; }
      if(p<0.6){ var w=Math.max(4,16*Math.sin(p/0.6*3.14)); pctx.globalAlpha=0.85; pctx.fillRect(Math.round(eneX-w/2),0,Math.round(w),gy); pctx.globalAlpha=1; }
      else { var np=(p-0.6)/0.4; pctx.globalAlpha=1-np;
        for(var n=0;n<16;n++){ var na=n/16*6.28, nd=np*42; pctx.fillRect(Math.round(eneX+Math.cos(na)*nd),Math.round(cy+Math.sin(na)*nd*0.8),3,3); } pctx.globalAlpha=1; }
    } else if(c.kind==='volley' || c.kind==='storm'){
      for(var b=0;b<3;b++){ var lp=(p-b*0.18)/0.5; if(lp<0||lp>1) continue;

          for(var seg=0;seg<8;seg++){ var ny=py+gy/8, jx=lx+((seg%2)?4:-4); pctx.fillRect(Math.round(jx),Math.round(py),2,Math.round(ny-py)); py=ny; } pctx.globalAlpha=1;
        } else { var vx=ox+(eneX-ox)*Math.min(1,lp); pctx.fillRect(Math.round(vx-2),Math.round(cy-2-(b-1)*5),4,4); } }
    } else if(c.kind==='reap'){
      pctx.lineWidth=3; pctx.globalAlpha=p<0.7?1:(1-(p-0.7)/0.3); var ang=-1.2+p*2.4;
      pctx.beginPath(); pctx.arc(eneX,cy,22,ang-0.5,ang+0.5); pctx.stroke(); pctx.globalAlpha=1; pctx.lineWidth=1;
    } else if(c.kind==='drain'){
      var n2=10; for(var d2=0;d2<n2;d2++){ var ph=(d2/n2+p)%1, dx=eneX+(ox-eneX)*ph; pctx.globalAlpha=0.3+0.7*(1-ph); pctx.fillRect(Math.round(dx-1),Math.round(cy-1),3,3); } pctx.globalAlpha=1;
    } else if(c.kind==='flames'){
      for(var fl=0;fl<7;fl++){ var fx2=eneX-12+fl*4, h=Math.abs(Math.sin(p*3.14+fl*0.7))*(10+Math.random()*8); pctx.globalAlpha=0.6+Math.random()*0.4; pctx.fillRect(Math.round(fx2),Math.round(cy+6-h),2,Math.round(h)); } pctx.globalAlpha=1;
    } else if(c.kind==='hex'){
      if(p<0.5){ var hx=ox+(eneX-ox)*(p/0.5); pctx.beginPath(); pctx.arc(hx,cy,3,0,6.28); pctx.stroke(); }
      else { var hp2=(p-0.5)/0.5, rr2=6+hp2*14; pctx.globalAlpha=1-hp2; pctx.beginPath(); pctx.arc(eneX,cy,rr2,0,6.28); pctx.stroke();
        pctx.fillRect(Math.round(eneX-rr2),Math.round(cy-1),Math.round(rr2*2),2); pctx.fillRect(Math.round(eneX-1),Math.round(cy-rr2),2,Math.round(rr2*2)); pctx.globalAlpha=1; }
    } else if(c.kind==='blast'){
      if(p<0.45){ var ax=ox+(eneX-ox)*(p/0.45); pctx.fillRect(Math.round(ax-3),Math.round(cy-3),6,6); }
      else { var ep=(p-0.45)/0.55, R=(c.big?44:30)*ep; pctx.globalAlpha=1-ep;
        for(var x2=0;x2<18;x2++){ var xa=x2/18*6.28, xd=R*(0.6+Math.random()*0.4); pctx.fillRect(Math.round(eneX+Math.cos(xa)*xd),Math.round(cy+Math.sin(xa)*xd*0.85),3,3); } pctx.globalAlpha=1; }
    } else if(c.kind==='heal'){
      for(var hl=0;hl<6;hl++){ var hph=(p+hl/6)%1, hy=cy+10-hph*36, hx2=petX-12+hl*4; pctx.globalAlpha=1-hph;
        pctx.fillRect(Math.round(hx2-2),Math.round(hy),5,1); pctx.fillRect(Math.round(hx2),Math.round(hy-2),1,5); } pctx.globalAlpha=1;
    } else if(c.kind==='regen'){
      var rp=Math.abs(Math.sin(p*3.14)); pctx.globalAlpha=0.5*rp; pctx.beginPath(); pctx.arc(petX,cy,18+rp*4,0,6.28); pctx.stroke(); pctx.globalAlpha=1;
      for(var mo=0;mo<4;mo++){ var mph=(p+mo/4)%1; pctx.globalAlpha=1-mph; pctx.fillRect(Math.round(petX-10+mo*6),Math.round(cy+8-mph*24),2,2); } pctx.globalAlpha=1;
    } else if(c.kind==='ward'){
      var wp=Math.min(1,p/0.5), wa=p<0.5?wp:1-(p-0.5)/0.5; pctx.globalAlpha=0.4+0.5*wa; pctx.lineWidth=2;
      pctx.beginPath(); for(var v=0;v<7;v++){ var va=v/6*6.28-1.57, vx2=petX+Math.cos(va)*20, vy2=cy+Math.sin(va)*20; if(v===0) pctx.moveTo(vx2,vy2); else pctx.lineTo(vx2,vy2); } pctx.stroke();
      pctx.globalAlpha=1; pctx.lineWidth=1;
    }
    pctx.restore();
  }

  // legendary item proc visuals (monochrome). p = 0..1 progress.
  function drawProcFx(f, petX, eneX, gy){
    var c=f.proc; if(!c) return; var p=1-Math.max(0,c.t)/c.dur, cy=gy-20;
    pctx.save(); pctx.fillStyle='#fff'; pctx.strokeStyle='#fff';
    if(c.kind==='swordqi'){
      // a crescent energy wave rips across the ground toward the foe
      var qx=petX+10+(eneX-(petX+10))*Math.min(1,p/0.85);
      pctx.lineWidth=3; pctx.globalAlpha=p<0.85?1:(1-(p-0.85)/0.15);
      pctx.beginPath(); pctx.arc(qx, gy-6, 15, -2.0, -0.3); pctx.stroke();
      pctx.beginPath(); pctx.arc(qx-4, gy-6, 9, -2.0, -0.3); pctx.stroke();
      for(var s=0;s<4;s++){ var tx=qx-9-s*6; pctx.fillRect(Math.round(tx),Math.round(gy-3),2,2); }

      var nn=Math.min(6,c.n||1);
      for(var d=0;d<nn;d++){ var lp=(p-d*0.09)/0.6; if(lp<0||lp>1) continue;

        pctx.beginPath(); pctx.arc(ax, ay, 10, 0, 6.28); pctx.stroke();
        for(var w=0;w<8;w++){ var wa=w/8*6.28; pctx.fillRect(Math.round(ax+Math.cos(wa)*15),Math.round(ay+Math.sin(wa)*8),2,2); }
        pctx.globalAlpha=1; pctx.lineWidth=1;
      } else { var sp=(p-0.5)/0.5, by=ay+(cy-ay)*Math.min(1,sp/0.5); pctx.globalAlpha=1-sp*0.3;
        pctx.fillRect(Math.round(ax-3), Math.round(ay), 6, Math.round(by-ay));
        if(sp>0.5){ var bp=(sp-0.5)/0.5; pctx.globalAlpha=1-bp; for(var r=0;r<12;r++){ var ra=r/12*6.28, rd=bp*28; pctx.fillRect(Math.round(eneX+Math.cos(ra)*rd),Math.round(cy+Math.sin(ra)*rd*0.8),3,3); } }
        pctx.globalAlpha=1; }

      // a spear of light forms above and drops onto the foe
      var top=cy-52, sy=top+(cy-top)*Math.min(1,p/0.6);
      pctx.globalAlpha=p<0.72?1:(1-(p-0.72)/0.28);
      pctx.fillRect(Math.round(eneX-1), Math.round(top), 2, Math.max(0,Math.round(sy-top)));
      pctx.beginPath(); pctx.moveTo(eneX, sy+7); pctx.lineTo(eneX-4, sy-2); pctx.lineTo(eneX+4, sy-2); pctx.closePath(); pctx.fill();
      if(p>0.6){ var ip=(p-0.6)/0.4; pctx.globalAlpha=1-ip; for(var k=0;k<8;k++){ var ka=k/8*6.28, kd=ip*18; pctx.fillRect(Math.round(eneX+Math.cos(ka)*kd),Math.round(cy+Math.sin(ka)*kd),2,2); } }

      if(p<0.5){ var py=0, lx=eneX; pctx.globalAlpha=Math.floor(animT/40)%2?1:0.45;
        for(var seg=0;seg<7;seg++){ var ny=py+cy/7, jx=lx+((seg%2)?5:-5); pctx.fillRect(Math.round(jx),Math.round(py),2,Math.round(ny-py)); py=ny; lx=jx; }

    pctx.restore();
  }

  function drawFight(){
    var f=S.fight; if(!f) return;
    var scroll = (f.travelX||0)*0.5 + (f.scroll||0)*0.015;
    drawBackdrop(f.biome, scroll);
    var gy=Math.round(ch*0.82);
    function drawActBar(cx, frac){
      frac=Math.max(0,Math.min(1,frac)); var w=30, h=4, x=Math.round(cx-w/2), y=gy+6;
      pctx.fillStyle='rgba(255,255,255,0.16)'; pctx.fillRect(x,y,w,h);                 // track
      pctx.fillStyle=(frac>=0.92)?'#fff':'rgba(255,255,255,0.7)'; pctx.fillRect(x,y,Math.round(w*frac),h);  // fill (flashes full)
      pctx.strokeStyle='rgba(255,255,255,0.45)'; pctx.lineWidth=1; pctx.strokeRect(x+0.5,y+0.5,w-1,h-1);     // outline
    }
    // one cooldown ring per equipped spell slot: empty outline -> pie sweep -> solid (ready/flash)
    function drawCdRing(cx, cy, frac, has){
      var r=4; pctx.lineWidth=1;
      pctx.strokeStyle='rgba(255,255,255,'+(has?0.5:0.22)+')'; pctx.beginPath(); pctx.arc(cx,cy,r,0,6.2832); pctx.stroke();
      if(!has) return;
      if(frac>=1){ pctx.fillStyle=(Math.floor(animT/120)%2===0)?'#fff':'rgba(255,255,255,0.8)'; pctx.beginPath(); pctx.arc(cx,cy,r-1,0,6.2832); pctx.fill(); }
      else if(frac>0){ pctx.fillStyle='rgba(255,255,255,0.78)'; pctx.beginPath(); pctx.moveTo(cx,cy); pctx.arc(cx,cy,r-1,-1.5708,-1.5708+frac*6.2832); pctx.closePath(); pctx.fill(); }
    }
    var bob=Math.sin(animT*0.02)*2;
    var petRows=SPR[S.form]||SPR.springer;
    var petFlash=f.flashPet>0, blinkP=petFlash && (Math.floor(animT/55)%2===0);
    var petX=cw*0.30 + Math.max(0,f.lunge||0)*22;

    // ── EVENT scenes (positive/negative): bars stay put (top-left), text fills the blank middle ──
    if(f.state==='event' || f.state==='eventbanner'){
      var ev=f.event||{};
      if(!blinkP) drawCreature(petRows, cw*0.5, bob-(petFlash?3:0), 0.5, false);   // pet on the ground
      // vitals exactly where they sit in combat (don't shove them around)
      pctx.fillStyle='#fff'; pctx.textAlign='center'; pctx.font='8px "Pixel",monospace';
      pctx.fillText((ev.kind==='neg'?'\u2620 ':'\u2726 ')+'EVENT', cw*0.5, 11);
      drawBar(cw*0.06, 28, cw*0.37, (S.stats.health||0)/maxHP());

      var midY=ch*0.40;

  // ── activity animations (train + play) ──
  function activityMotion(anim,t){
    var o={ offY:Math.sin(t*2.2)*2, sq:1, shakeX:0, flip:null };
    switch(anim){
      case 'lift':     var lp=Math.abs(Math.sin(t*3.4)); o.offY=-lp*7; o.sq=0.82+lp*0.18; break;
      case 'dash':     o.shakeX=Math.sin(t*3.0)*(cw*0.27); o.offY=-Math.abs(Math.sin(t*20))*3; o.sq=0.96; o.flip=Math.cos(t*3.0)<0; break;
      case 'endure':   var ep=(t%1.5)/1.5;
                       if(ep<0.42){ o.sq=1; o.offY=0; }
                       else if(ep<0.56){ o.sq=0.5; o.offY=7; }          // squished flat under the rock
                       else { o.sq=1.04; o.offY=-3-(ep-0.56)*5; }       // push back up
                       break;
      case 'study':    o.offY=Math.sin(t*2)*1.5; o.sq=0.99; break;
      case 'meditate': o.offY=-7+Math.sin(t*2)*2; o.sq=0.97; break;
      case 'forage':   o.shakeX=Math.sin(t*3)*7; o.offY=-Math.abs(Math.sin(t*6))*5; break;
      case 'wrestle':  o.shakeX=Math.sin(t*16)*4; o.offY=Math.sin(t*8)*2; o.sq=0.93; break;
      case 'tag':      o.shakeX=Math.sin(t*14)*5; o.offY=-Math.abs(Math.sin(t*7))*5; break;
      case 'fetch':    o.shakeX=Math.sin(t*6)*8; o.offY=-Math.abs(Math.sin(t*6))*5; break;
      case 'puzzle':   o.offY=Math.sin(t*2.6)*2; break;
      case 'sing':     o.offY=Math.sin(t*4)*3; o.sq=0.96; break;
      case 'explore':  o.offY=Math.sin(t*3)*2; o.shakeX=Math.sin(t*1.5)*3; break;

  function drawActivity(anim,box,t){

        pctx.fillRect(Math.round(dcx-bw/2), Math.round(dy), Math.round(bw), 3);          // bar
        pctx.fillRect(Math.round(dcx-bw/2-5), Math.round(dy-5), 5, 13);                  // left weight
        pctx.fillRect(Math.round(dcx+bw/2),    Math.round(dy-5), 5, 13);                  // right weight

    if(goblet){
      var gp=Math.min(1,(260-react.t)/260*2.4);               // rises fast, then holds aloft
      var gby=box.oy - 6 - gp*26 + Math.sin(t*2)*1.4, gcx=box.ox+box.w/2;
      pctx.save();                                            // radiant burst behind it
      pctx.globalAlpha=0.22+0.18*Math.abs(Math.sin(t*4)); pctx.fillStyle='#fff';
      for(var rr=0;rr<8;rr++){ var a=t*1.5+rr*0.785; pctx.fillRect(Math.round(gcx+Math.cos(a)*17-1), Math.round(gby+6+Math.sin(a)*17-1),2,2); }
      pctx.globalAlpha=1; pctx.restore();
      drawGoblet(gcx, gby);
      pctx.fillStyle='#fff';                                  // twinkles
      for(var ss=0;ss<3;ss++){ var sa=t*2+ss*2.1, sx=gcx+Math.cos(sa)*13, sy=gby+6+Math.sin(sa)*9; pctx.fillRect(Math.round(sx),Math.round(sy-2),1,5); pctx.fillRect(Math.round(sx-2),Math.round(sy),5,1); }
    }

    if((S.sinceExplore||0)>TRAIN_FREE && S.stage!=='egg' && !S.dead){
      pctx.fillStyle='rgba(255,255,255,'+(0.55+0.2*Math.abs(Math.sin(t*3)))+')'; pctx.textAlign='center'; pctx.font='7px "Pixel",monospace';
      pctx.fillText('\u2726 yearns for adventure', cw*0.5, 10); pctx.textAlign='left';
    }

    // ── boss-drop chest reveal (a big moment) ──
    if(S.pendingReward && !S.dead && S.stage!=='egg' && !S.fight && !invMakeRoom){
      rewardT += dtMs;
      var rt=rewardT, rit=itemById(S.pendingReward), rcol=(rit&&RARITY_COL[rit.rarity])||'#fff';
      pctx.fillStyle='rgba(0,0,0,0.82)'; pctx.fillRect(0,0,cw,ch);   // dim the world
      var ccx=cw*0.5, ccy=ch*0.42;
      if(rt<950){ // rattle + glow building
        var shake=Math.sin(rt*0.05)*Math.min(4,rt/200);
        drawChest(ccx+shake, ccy, 0, Math.min(1,rt/950)*0.5);
        pctx.fillStyle='#fff'; pctx.textAlign='center'; pctx.font='8px "Pixel",monospace';
        pctx.fillText('a chest!', ccx, ccy+44); pctx.textAlign='left';
      } else if(rt<1300){ // burst open
        var op=(rt-950)/350;
        if((rt|0)%2===0){ pctx.fillStyle='rgba(255,255,255,'+(1-op)*0.8+')'; pctx.fillRect(0,0,cw,ch); }
        drawChest(ccx, ccy, op, 0.6);
      } else { // revealed
        drawChest(ccx, ccy-4, 1, 0.25);
        for(var sp=0;sp<5;sp++){ var sa=t*1.6+sp*1.3, sr=20+Math.abs(Math.sin(t*2+sp))*10;
          var sx=ccx+Math.cos(sa)*sr, sy=ccy-10+Math.sin(sa)*sr*0.6; pctx.fillStyle=rcol;
          pctx.fillRect(Math.round(sx),Math.round(sy-2),1,5); pctx.fillRect(Math.round(sx-2),Math.round(sy),5,1); }
        pctx.textAlign='center';
        pctx.fillStyle=rcol; pctx.font='12px "Pixel",monospace'; pctx.fillText((rit&&rit.name)||'?', ccx, ccy+34);
        pctx.fillStyle=rcol; pctx.font='7px "Pixel",monospace'; pctx.fillText(((rit&&rit.rarity)||'').toUpperCase()+' ITEM', ccx, ccy+48);
        pctx.fillStyle='#cfd6df'; pctx.font='7px "Pixel",monospace';
        wrapText((rit&&rit.desc)||'', ccx, ccy+62, cw*0.8, 10);
        pctx.fillStyle='rgba(255,255,255,'+(0.5+0.3*Math.abs(Math.sin(t*3)))+')';
        pctx.fillText('tap to claim', ccx, ch-12);
        pctx.textAlign='left';
      }
      setBars(); requestAnimationFrame(frame); return;   // chest owns the screen
    } else if(!S.pendingReward){ rewardT=0; }

    if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }

    setBars();
    requestAnimationFrame(frame);
  }

  // offline catch-up removed: cycles are deliberate (segment-spend only) and there is no real-time
  // action clock, so being away changes nothing. the egg still incubates live while the app is open.

  setInterval(save,5000);
  document.addEventListener('visibilitychange',function(){ if(document.hidden) save(); else { render(); } });
  window.addEventListener('beforeunload',save);

  sizeCanvas(); render(); save(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
