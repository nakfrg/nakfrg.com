  :root { --line:#fff; --dim:rgba(255,255,255,0.4); --faint:rgba(255,255,255,0.14); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%; background:#000; color:#fff;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    image-rendering: pixelated;
  }
  body { display:flex; flex-direction:column; align-items:center; padding:14px 12px 28px; }
  .pix { font-family:'Pixel', ui-monospace, monospace; -webkit-font-smoothing:none; font-smooth:never; }

  /* ── thick pixel buttons ── */
  .pixbtn {
    font-family:'Pixel', monospace; font-size:10px; line-height:1; letter-spacing:0;
    color:#fff; text-decoration:none; background:#000; cursor:pointer; text-transform:uppercase;
    padding:11px 12px 13px; border:0; position:relative;
    /* blocky stepped border made of solid box-shadows (thick pixels) */
    box-shadow:
      0 -4px 0 0 #fff, 0 4px 0 0 #fff, -4px 0 0 0 #fff, 4px 0 0 0 #fff,
      0 0 0 4px #fff,
      0 7px 0 0 rgba(255,255,255,0.25);  /* drop shadow block */
    transition: transform .04s;
  }
  .pixbtn:hover, .pixbtn:focus-visible { background:#fff; color:#000; outline:none; }
  .pixbtn:active { transform: translateY(3px);
    box-shadow: 0 -4px 0 0 #fff,0 4px 0 0 #fff,-4px 0 0 0 #fff,4px 0 0 0 #fff,0 0 0 4px #fff; }
  .pixbtn[disabled] { opacity:.28; pointer-events:none; }
  .pixbtn.alert { animation: pulse .7s steps(2) infinite; }
  @keyframes pulse { 50% { background:#fff; color:#000; } }

  #nav { display:flex; gap:14px; justify-content:center; margin-bottom:18px; }

  #app { width:100%; max-width:360px; }
  .title { text-align:center; font-size:15px; letter-spacing:1px; margin-bottom:12px; }

  #screen { position:relative; width:100%; height:250px; background:#000; overflow:hidden;
    box-shadow: 0 0 0 4px #fff; margin: 4px 0 18px; }
  #pet { display:block; width:100%; height:100%; image-rendering:pixelated; }
  #stageTag { position:absolute; top:7px; left:9px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  #ageTag   { position:absolute; top:7px; right:9px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  #nameTag  { position:absolute; bottom:8px; left:0; right:0; text-align:center; font-size:12px; }

  #stats { margin:18px 0 4px; }
  .stat { display:flex; align-items:center; gap:8px; margin:7px 0; }
  .stat .lab { width:62px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  .track { flex:1; height:14px; position:relative; box-shadow:0 0 0 3px #fff; background:#000; }
  .seg { position:absolute; top:0; bottom:0; left:0; background:#fff; width:50%;
         transition:width .25s steps(10); }
  .stat.low .seg { animation: blinkfill .6s steps(2) infinite; }
  @keyframes blinkfill { 50% { opacity:.25; } }

  #growthRow { display:flex; align-items:center; gap:8px; margin:14px 0 16px; }
  #growthRow .lab { width:62px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  #growthTrack { flex:1; height:8px; position:relative; box-shadow:0 0 0 3px var(--faint); }
  #growthFill { position:absolute; inset:0; width:0%; background:var(--dim); transition:width .3s steps(8); }

  #actions, #foodPicker { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin: 6px 0 6px; }
  #foodPicker { display:none; grid-template-columns: 1fr 1fr auto; }
  #healWrap { margin:6px 0; display:none; }
  #healWrap .pixbtn { width:100%; }

  #msg  { min-height:14px; text-align:center; font-size:11px; color:var(--dim); margin:14px 0 4px; }
  #hint { text-align:center; font-size:10px; line-height:1.6; color:var(--faint); margin-bottom:14px; min-height:30px; }

  #footer { display:flex; justify-content:center; gap:18px; align-items:center; margin-top:4px; }
  .linkbtn { background:none; border:none; color:var(--dim); cursor:pointer; padding:6px;
             font:10px/1 ui-monospace, monospace; letter-spacing:1px; text-transform:uppercase; }
  .linkbtn:hover { color:#fff; }

  .secret { position:fixed; right:10px; bottom:8px; font:11px/1 ui-monospace, monospace;
            color:rgba(255,255,255,0.05); text-decoration:none; transition:color .3s; z-index:5; }
  .secret:hover { color:rgba(255,255,255,0.5); }
</style>
</head>
<body>
  <nav id="nav">
    <a class="pixbtn" href="https://capycalc.nakfrg.com/">capycalc</a>
    <a class="pixbtn" href="breaker.html">breaker</a>
  </nav>

  <div id="app">
    <div class="title pix">TAMAFROGGI</div>

    <div id="screen">
      <span id="stageTag" class="pix">BABY</span>
      <span id="ageTag" class="pix">0M</span>
      <canvas id="pet"></canvas>
      <span id="nameTag" class="pix">PADPOLE</span>
    </div>

    <div id="stats">
      <div class="stat" data-k="full">  <span class="lab pix">FULL</span>  <div class="track"><div class="seg"></div></div></div>
      <div class="stat" data-k="happy"> <span class="lab pix">HAPPY</span> <div class="track"><div class="seg"></div></div></div>
      <div class="stat" data-k="energy"><span class="lab pix">ENERGY</span><div class="track"><div class="seg"></div></div></div>
      <div class="stat" data-k="clean"> <span class="lab pix">CLEAN</span> <div class="track"><div class="seg"></div></div></div>
    </div>

    <div id="growthRow">
      <span class="lab pix">GROWTH</span>
      <div id="growthTrack"><div id="growthFill"></div></div>
    </div>

    <div id="actions">
      <button class="pixbtn" data-act="feed">Feed</button>
      <button class="pixbtn" data-act="play">Play</button>
      <button class="pixbtn" data-act="clean">Clean</button>
      <button class="pixbtn" data-act="rest">Rest</button>
    </div>

    <div id="foodPicker">
      <button class="pixbtn" data-food="meat">Meat</button>
      <button class="pixbtn" data-food="veggie">Veg</button>
      <button class="pixbtn" data-food="cancel">X</button>
    </div>

    <div id="healWrap">
      <button class="pixbtn alert" data-act="heal">Heal</button>
    </div>

    <div id="msg"></div>
    <div id="hint"></div>

    <div id="footer">
      <button class="linkbtn" id="newBtn">&#8634; new padpole</button>
      <button class="linkbtn" id="muteBtn">&#9834; sound</button>
    </div>
  </div>

  <a class="secret" href="https://capycalc.nakfrg.com/" title="?">&middot;</a>

<script>
(function () {
  "use strict";

  // ── sprites: '#' white, ' ' empty ──
  var SPR = {
    padpole:["                ","     ######     ","   ##########   ","  ###  ##  ###  ","  ## #    # ##  ","  ##  ####  ## #","  ##########  ##","   ########  ## ","    ######  ##  ","      ##  ###   ","        ###     ","                ","                "],
    hoplet:["                ","    ##    ##    ","   #  #  #  #   ","   # ## ## #    ","    ##    ##    ","    ########    ","   ##########   ","  ############  ","  ###      ###  ","  ##  ####  ##  ","   #  #  #  #   ","      #  #      ","                "],
    chubbin:["                ","    ##    ##    ","   #  #  #  #   ","  ##############"," ## ##    ## ## "," ##  #    #  ## "," ############## "," ##  ####  ## # "," ###      ### # ","  ############  ","  ##        ##  ","  #          #  ","                "],
    dewdrop:["                ","     ######     ","   ##########   ","  ### #### ###  ","  ## #    # ##  ","  ## #    # ##  ","  ### #### ###  ","  ############  ","  ##  ####  ##  ","   ##########   ","  ##  #  #  ##  ","  #   #  #   #  ","                "],
    springer:["      ####      ","     #    #     ","    # ## # #    ","    #      #    ","     ##  ##     ","   ##########   ","  ###      ###  "," ###  ####  ### ","###  ##  ##  ###","##   ##  ##   ##"," ##        ##   ","  ###    ###    ","    ##  ##      "],
    dartling:["                ","    ##    ##    ","   #  #  #  #   ","   # ###### #   ","    ##    ##    ","   ### ## ###   ","  ## #    # ##  ","  # ##    ## #  ","  ###  ##  ###  ","   #  #  #  #   ","   ## #  # ##   ","    #      #    ","                "],
    bullhorn:["    ##      ##  ","   #  #    #  # ","  ## ## #### ## ","  #  #      #  #"," ###############"," ##           ##"," # ########### #"," ##           ##","  ############# ","   ###      ### ","    ##########  ","     ########   ","      ######    "],
    toadsage:["                ","   ##########   ","  ############  ","  ### #### ###  ","  ## #    # ##  ","  #          #  ","  # ######## #  ","  ############  ","  # ## ## ## #  ","  ############  ","   ##########   ","   ##      ##   ","                "],
    canopy:["    ##    ##    ","   #  #  #  #   ","   # #    # #   ","    ## #### ##  ","   ##########   ","  ### #### ###  "," ############## ","##  ########  ##","#    ######    #","##  ##    ##  ##"," # #        # # ","## #        # ##","#            # #"],
    lotus:["       ##       ","   #   ##   #   ","  # #  ##  # #  ","  #  ######  #  "," ## ##    ## ## "," #  # #### #  # "," ## ##    ## ## ","  #  ######  #  ","   ########     ","  ############  "," ############## ","  #  #    #  #  ","   ###    ###   "]
  };
  var FORM_NAMES = { padpole:"PADPOLE",hoplet:"HOPLET",chubbin:"CHUBBIN",dewdrop:"DEWDROP",
    springer:"SPRINGER",dartling:"DARTLING",bullhorn:"BULLHORN",toadsage:"TOADSAGE",canopy:"CANOPY",lotus:"LOTUS" };

  // food + poop pixel art
  var MEAT = ["  #####  "," ####### ","#########","#########"," ####### ","   ###   ","   ###   "];
  var VEG  = ["  #   #  "," ### ### ","#########"," ####### ","   ###   ","   ###   ","   ###   "];
  var POOP = ["  ##  "," #  # "," #### ","######"];

  // ── tuning ──
  var BABY_DUR  = 3600;   // 1h: baby -> junior
  var ADULT_AGE = 7200;   // 2h: junior -> adult
  var DECAY = { full:100/2700, happy:100/2400, energy:100/5400, clean:100/3600 }; // per second
  var POOP_MAX = 4;
  var POOP_DIRTY = 100/3000;     // extra clean drain per poop per second
  var POOP_SICK_TIME = 300;      // a poop left this long makes the frog sick (5 min)
  var NEGLECT_MAX = 3*24*3600;   // sick this long -> hops back to the pond (~3 days)
  var MAX_CATCHUP = 3*24*3600 + 3600;
  var FEED_FULL = 30;            // total fullness per meal (3 bites)
  var SAVE_KEY = 'tamafroggi_save_v2';

  function poopInterval(){ return 110 + Math.random()*90; } // ~2-3 min

  // ── DOM ──
  var $ = function(s){ return document.querySelector(s); };
  var petCanvas=$('#pet'), pctx=petCanvas.getContext('2d');
  var stageTag=$('#stageTag'), ageTag=$('#ageTag'), nameTag=$('#nameTag');
  var growthFill=$('#growthFill'), msgEl=$('#msg'), hintEl=$('#hint');
  var actionsEl=$('#actions'), pickerEl=$('#foodPicker'), healWrap=$('#healWrap');

  // ── state ──
  function fresh(){
    return { v:2, stage:'baby', form:'padpole',
      stats:{ full:70, happy:70, energy:70, clean:70 },
      age:0, care:{ feed:0, play:0, clean:0, rest:0 }, diet:{ meat:0, veggie:0 },
      poops:[], poopTimer: poopInterval(),
      sick:false, sickT:0, lastSeen:Date.now(), born:Date.now() };
  }
  var S = loadSave() || fresh();
  if (!S.diet) S.diet = { meat:0, veggie:0 };
  if (!S.poops) S.poops = [];

  function loadSave(){
    try { var raw=localStorage.getItem(SAVE_KEY); if(!raw) return null;
      var s=JSON.parse(raw); if(!s||s.v!==2||!SPR[s.form]) return null; return s; } catch(e){ return null; }
  }
  function save(){ try{ S.lastSeen=Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){} }

  // ── audio ──
  var muted=false; try{ muted=localStorage.getItem('tamafroggi_mute')==='1'; }catch(e){}
  var actx=null;
  function blip(f,d,t,v){ if(muted) return; try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    var o=actx.createOscillator(), g=actx.createGain(); o.type=t||'square'; o.frequency.value=f;
    g.gain.value=v==null?0.05:v; o.connect(g); g.connect(actx.destination);
    var n=actx.currentTime; g.gain.setValueAtTime(g.gain.value,n);
    g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.08)); o.start(n); o.stop(n+(d||0.08)); }catch(e){} }
  $('#muteBtn').addEventListener('click',function(){ muted=!muted;
    try{ localStorage.setItem('tamafroggi_mute',muted?'1':'0'); }catch(e){}
    $('#muteBtn').innerHTML = (muted?'&#9834; muted':'&#9834; sound'); });
  $('#muteBtn').innerHTML = (muted?'&#9834; muted':'&#9834; sound');

  // ── sim ──
  function clamp(v){ return v<0?0:v>100?100:v; }
  function avgStat(){ var s=S.stats; return (s.full+s.happy+s.energy+s.clean)/4; }
  function poopOverdue(){ for(var i=0;i<S.poops.length;i++) if(S.poops[i].age>POOP_SICK_TIME) return true; return false; }

  function freeSlot(){
    var used={}; for(var i=0;i<S.poops.length;i++) used[S.poops[i].slot]=1;
    for(var k=0;k<POOP_MAX;k++) if(!used[k]) return k; return 0;
  }
  function spawnPoop(){ if(S.poops.length>=POOP_MAX) return; S.poops.push({ slot:freeSlot(), age:0 }); }

  function simulate(dt){
    S.age += dt;
    var st=S.stats;
    var cleanDrain = DECAY.clean*dt + S.poops.length*POOP_DIRTY*dt;
    st.full=clamp(st.full-DECAY.full*dt);
    st.happy=clamp(st.happy-DECAY.happy*dt);
    st.energy=clamp(st.energy-DECAY.energy*dt);
    st.clean=clamp(st.clean-cleanDrain);

    // poop
    for(var i=0;i<S.poops.length;i++) S.poops[i].age+=dt;
    if(S.poops.length<POOP_MAX){
      S.poopTimer-=dt;
      var guard=0;
      while(S.poopTimer<=0 && S.poops.length<POOP_MAX && guard++<POOP_MAX){
        spawnPoop(); S.poopTimer+=poopInterval();
      }
      if(S.poopTimer<0) S.poopTimer=poopInterval();
    }

    // sickness
    var anyZero = st.full<=0||st.happy<=0||st.energy<=0||st.clean<=0;
    var dirty = poopOverdue();
    if(anyZero||dirty){ S.sick=true; S.sickT+=dt; }
    else if(S.sick && st.full>25&&st.happy>25&&st.energy>25&&st.clean>25){ S.sick=false; S.sickT=0; }
    if(!S.sick) S.sickT=Math.max(0,S.sickT-dt*0.5);
    if(S.sickT>=NEGLECT_MAX){ runAway(); return; }

    checkEvolve();
  }

  function checkEvolve(){
    if(S.stage==='baby' && S.age>=BABY_DUR){
      var c=S.care;
      var f = (c.play>=c.feed && c.play>=c.clean) ? 'hoplet' : (c.feed>=c.clean) ? 'chubbin' : 'dewdrop';
      evolveTo('junior', f);
    }
    if(S.stage==='junior' && S.age>=ADULT_AGE){
      var meaty = S.diet.meat>=S.diet.veggie, a;
      if(S.form==='hoplet')      a = meaty?'springer':'dartling';
      else if(S.form==='chubbin')a = meaty?'bullhorn':'toadsage';
      else                       a = meaty?'canopy':'lotus';
      evolveTo('adult', a);
    }
  }

  var flashT=0;
  function evolveTo(stage,form){
    S.stage=stage; S.form=form; flashT=22;
    blip(660,0.12,'triangle',0.07); setTimeout(function(){ blip(880,0.14,'triangle',0.07); },130);
    setMessage(FORM_NAMES[form]+'! it evolved'); save();
  }
  function runAway(){ setMessage('your frog hopped back to the pond...'); S=fresh(); save(); }

  // ── care actions ──
  var react=null;          // transient anim state
  var eating=null;         // { type, biteFrac, biteTimer, bitesLeft }
  function startEat(type){
    if(eating) return;
    eating = { type:type, biteFrac:0, biteTimer:520, bitesLeft:3 };
    blip(420,0.05);
  }
  function bite(){
    S.stats.full = clamp(S.stats.full + FEED_FULL/3);
    eating.bitesLeft--; eating.biteFrac = (3-eating.bitesLeft)/3;
    react = { type:'eat', t:10 };
    blip(460,0.05);
    if(eating.bitesLeft<=0){
      S.diet[eating.type]++; S.care.feed++;
      // digestion: a poop comes sooner
      S.poopTimer = Math.min(S.poopTimer, 30 + Math.random()*40);
      setMessage(eating.type==='meat' ? 'chomp - tasty meat' : 'crunch - fresh greens');
      eating=null; save();
    }
  }

  function act(kind){
    if(actx && actx.state==='suspended') actx.resume();
    var s=S.stats;
    if(kind==='feed'){ showPicker(true); return; }
    if(kind==='heal'){
      s.full=clamp(s.full+12); s.happy=clamp(s.happy+12); s.energy=clamp(s.energy+12); s.clean=clamp(s.clean+15);
      react={type:'clean',t:30}; blip(520,0.1,'sine'); setMessage('feeling a little better'); save(); return;
    }
    if(kind==='play'){
      if(s.energy<8){ react={type:'tired',t:30}; setMessage('too sleepy - rest first'); blip(180,0.12,'sawtooth'); return; }
      s.happy=clamp(s.happy+26); s.energy=clamp(s.energy-14); s.full=clamp(s.full-8);
      S.care.play++; react={type:'play',t:50}; blip(620,0.05); setMessage('hop hop! so happy'); save();
    } else if(kind==='clean'){
      startWash(); s.clean=clamp(s.clean+34); s.happy=clamp(s.happy+4);
      S.care.clean++; blip(700,0.05,'sine'); setMessage('splish - scrubbing the screen'); save();
    } else if(kind==='rest'){
      s.energy=clamp(s.energy+30); s.happy=clamp(s.happy+2);
      S.care.rest++; react={type:'rest',t:70}; blip(300,0.12,'sine'); setMessage('zzz... recharged'); save();
    }
  }

  function showPicker(on){
    pickerEl.style.display = on ? 'grid' : 'none';
    actionsEl.style.display = on ? 'none' : 'grid';
  }

  var msgT=0;
  function setMessage(t){ msgEl.textContent=t; msgT=160; }

  document.querySelectorAll('[data-act]').forEach(function(b){
    b.addEventListener('click',function(){ act(b.getAttribute('data-act')); });
  });
  document.querySelectorAll('[data-food]').forEach(function(b){
    b.addEventListener('click',function(){
      var f=b.getAttribute('data-food'); showPicker(false);
      if(f==='cancel') return; startEat(f);
    });
  });
  $('#newBtn').addEventListener('click',function(){
    if(confirm('Start over with a fresh padpole? Your current frog is lost.')){
      S=fresh(); save(); showPicker(false); setMessage('a new padpole appears'); }
  });

  // ── wash animation ──
  var wash=null; // { x }
  function startWash(){ wash={ x:0 }; }

  // ── render ──
  var dpr=1, cw=0, ch=0;
  function sizeCanvas(){ dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
    var r=petCanvas.getBoundingClientRect(); cw=r.width; ch=r.height;
    petCanvas.width=Math.round(cw*dpr); petCanvas.height=Math.round(ch*dpr); }
  window.addEventListener('resize',sizeCanvas);

  function setBars(){
    document.querySelectorAll('.stat').forEach(function(el){
      var k=el.getAttribute('data-k'), v=S.stats[k];
      el.querySelector('.seg').style.width=v+'%';
      el.classList.toggle('low', v<=18);
    });
    var prog;
    if(S.stage==='baby') prog=S.age/BABY_DUR;
    else if(S.stage==='junior') prog=(S.age-BABY_DUR)/(ADULT_AGE-BABY_DUR);
    else prog=1;
    growthFill.style.width = Math.max(0,Math.min(100,prog*100))+'%';
  }
  function fmtAge(sec){ var m=Math.floor(sec/60); if(m<60) return m+'M';
    var h=Math.floor(m/60); if(h<24) return h+'H'+(m%60)+'M'; return Math.floor(h/24)+'D'; }

  var HINTS = {
    padpole:'PADPOLE - what you do most in the first hour sets the junior:  PLAY -> Hoplet . FEED -> Chubbin . CLEAN -> Dewdrop',
    hoplet:'HOPLET - diet decides the adult:  mostly MEAT -> Springer . mostly VEGGIES -> Dartling',
    chubbin:'CHUBBIN - diet decides the adult:  mostly MEAT -> Bullhorn . mostly VEGGIES -> Toadsage',
    dewdrop:'DEWDROP - diet decides the adult:  mostly MEAT -> Canopy . mostly VEGGIES -> Lotus',
    springer:'SPRINGER - the mighty meat-fed jumper. fully grown.',
    dartling:'DARTLING - the flashy greens-fed dart frog. fully grown.',
    bullhorn:'BULLHORN - the booming meat-fed bullfrog. fully grown.',
    toadsage:'TOADSAGE - the wise greens-fed toad. fully grown.',
    canopy:'CANOPY - the nimble meat-fed tree frog. fully grown.',
    lotus:'LOTUS - the serene greens-fed pond mystic. fully grown.'
  };

  function render(){
    stageTag.textContent = S.stage.toUpperCase() + (S.sick?' SICK':'');
    ageTag.textContent = fmtAge(S.age);
    nameTag.textContent = FORM_NAMES[S.form];
    hintEl.textContent = HINTS[S.form]||'';
    healWrap.style.display = S.sick ? 'block' : 'none';
    setBars();
  }

  function blitMap(map, ox, oy, unit, eatenFrac){
    var H=map.length, W=map[0].length;
    var cut = eatenFrac ? Math.floor(W*(1-eatenFrac)) : W; // bites eat from the right
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<cut;x++)
      if(map[y][x]==='#') pctx.fillRect(Math.round(ox+x*unit),Math.round(oy+y*unit),Math.ceil(unit),Math.ceil(unit));
  }

  function drawSprite(form, offY, sq){
    var rows=SPR[form], H=rows.length, W=rows[0].length;
    var unit=Math.max(2,Math.floor((ch*0.62)/H));
    var sx=unit, sy=unit;
    if(sq){ sy=unit*sq; sx=unit*(1+(1-sq)*0.6); }
    var totalW=W*sx, totalH=H*sy, floorY=ch*0.80;
    var ox=(cw-totalW)/2, oy=floorY-totalH+offY;
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++)
      if(rows[y][x]==='#') pctx.fillRect(Math.round(ox+x*sx),Math.round(oy+y*sy),Math.ceil(sx),Math.ceil(sy));
    return { ox:ox, oy:oy, w:totalW, h:totalH, unit:unit, floorY:floorY };
  }

  function drawPoops(box){
    var floorY=box.floorY, unit=2;
    var slotX=[ box.ox+box.w+6, box.ox+box.w+24, box.ox+box.w+42, box.ox+box.w+60 ];
    pctx.fillStyle='#fff';
    for(var i=0;i<S.poops.length;i++){
      var p=S.poops[i], bx=slotX[p.slot]||(box.ox+box.w+6);
      var by=floorY-POOP.length*unit;
      var overdue = p.age>POOP_SICK_TIME;
      pctx.globalAlpha = overdue ? (0.5+0.5*Math.abs(Math.sin(animT*0.006))) : 1;
      blitMap(POOP, bx, by, unit, 0);
    }
    pctx.globalAlpha=1;
  }

  function drawFood(box){
    if(!eating) return;
    var map = eating.type==='meat'?MEAT:VEG, unit=3, mapW=map[0].length;
    var fx = box.ox - mapW*unit - 8, fy = box.floorY-map.length*unit;
    blitMap(map, fx, fy, unit, eating.biteFrac);
    // tongue flick toward the food on each bite
    if(react && react.type==='eat'){
      pctx.strokeStyle='#fff'; pctx.lineWidth=1;
      var sy=box.oy+box.h*0.45;
      pctx.beginPath(); pctx.moveTo(box.ox+2, sy); pctx.lineTo(fx+mapW*unit, fy+map.length*unit*0.4); pctx.stroke();
    }
  }

  function drawZzz(box){
    pctx.fillStyle='rgba(255,255,255,0.7)';
    var bx=box.ox+box.w+2, by=box.oy+8, ph=(animT*0.04)%3;
    pctx.fillRect(bx, by-ph*3, 3,3);
    pctx.fillRect(bx+6, by-9-ph*3, 3,3);
    pctx.fillRect(bx+12, by-18-ph*3, 3,3);
  }

  var animT=0, last=performance.now(), simAcc=0;
  function frame(now){
    var dtMs=Math.min(120, now-last); last=now; animT+=dtMs;

    simAcc+=dtMs; while(simAcc>=1000){ simulate(1); simAcc-=1000; }

    // eating
    if(eating){ eating.biteTimer-=dtMs; if(eating.biteTimer<=0){ eating.biteTimer=520; bite(); } }
    if(react){ react.t-=dtMs/16; if(react.t<=0) react=null; }
    if(msgT>0){ msgT-=dtMs/16; if(msgT<=0) msgEl.textContent=''; }

    pctx.setTransform(dpr,0,0,dpr,0,0);
    pctx.clearRect(0,0,cw,ch); pctx.fillStyle='#000'; pctx.fillRect(0,0,cw,ch);

    // floor line
    pctx.strokeStyle='rgba(255,255,255,0.5)'; pctx.lineWidth=1;
    var fy=Math.round(ch*0.80)+0.5;
    pctx.beginPath(); pctx.moveTo(cw*0.10,fy); pctx.lineTo(cw*0.90,fy); pctx.stroke();

    var t=animT/1000, offY=Math.sin(t*2.2)*2, sq=1;
    var resting=react&&react.type==='rest', playing=react&&react.type==='play', tired=react&&react.type==='tired';
    if(eating){ sq=0.95; offY=Math.sin(t*9)*1.2; }
    else if(playing){ var ph=(react.t%16)/16; offY=-Math.abs(Math.sin(ph*Math.PI))*14; sq=0.9; }
    else if(resting){ offY=2; sq=0.86; }
    else if(S.sick){ offY=Math.sin(t*8)*2; sq=0.95; }
    else { var c=(animT%3200)/3200;
      if(c>0.85){ offY-=Math.abs(Math.sin(((c-0.85)/0.15)*Math.PI))*8; sq=0.92; }
      else if(Math.sin(t*2.2)>0.97) sq=0.9; }

    var box=drawSprite(S.form, offY, sq);
    drawPoops(box);
    drawFood(box);
    if(resting||tired) drawZzz(box);
    if(S.sick){ pctx.fillStyle='#fff'; pctx.fillRect(box.ox+box.w-2, box.oy+4+(Math.sin(t*6)+1)*2, 2,3); }

    // wash sweep
    if(wash){
      wash.x += dtMs*0.9; // px per ms across the screen
      var wx=wash.x;
      // clear poops the wash has passed
      var slotX=[ box.ox+box.w+6, box.ox+box.w+24, box.ox+box.w+42, box.ox+box.w+60 ];
      S.poops = S.poops.filter(function(p){ return (slotX[p.slot]||0) > wx; });
      // draw wash bar + faint trailing scrub
      pctx.fillStyle='#fff'; pctx.fillRect(wx, 0, 8, ch);
      pctx.fillStyle='rgba(255,255,255,0.12)'; pctx.fillRect(0,0,wx,ch);
      if(wx>cw+8){ wash=null; S.poopTimer=poopInterval(); save(); }
    }

    if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }

    setBars();
    requestAnimationFrame(frame);
  }

  // ── offline catch-up ──
  function catchUp(){
    var elapsed=Math.max(0,(Date.now()-(S.lastSeen||Date.now()))/1000);
    if(elapsed<1) return;
    var capped=Math.min(elapsed,MAX_CATCHUP);
    simulate(capped);
    if(elapsed>capped){ S.age+=(elapsed-capped); checkEvolve(); }
    S.lastSeen=Date.now();
  }

  setInterval(save,5000);
  document.addEventListener('visibilitychange',function(){ if(document.hidden) save(); else { catchUp(); render(); } });
  window.addEventListener('beforeunload',save);

  catchUp(); sizeCanvas(); render(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
