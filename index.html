  :root { --line:#fff; --dim:rgba(255,255,255,0.4); --faint:rgba(255,255,255,0.14); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%; background:#000; color:#fff;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    image-rendering: pixelated;
  }
  body { display:flex; flex-direction:column; align-items:center; padding:10px 12px 16px; }
  .pix { font-family:'Pixel', ui-monospace, monospace; -webkit-font-smoothing:none; font-smooth:never; }

  /* ── thick pixel buttons ── */
  .pixbtn {
    font-family:'Pixel', monospace; font-size:10px; line-height:1; letter-spacing:0;
    color:#fff; text-decoration:none; background:#000; cursor:pointer; text-transform:uppercase;
    padding:11px 12px 13px; border:0; position:relative;
    /* blocky stepped border made of solid box-shadows (thick pixels) */
    box-shadow:
      0 -4px 0 0 #fff, 0 4px 0 0 #fff, -4px 0 0 0 #fff, 4px 0 0 0 #fff,
      0 0 0 4px #fff,
      0 7px 0 0 rgba(255,255,255,0.25);  /* drop shadow block */
    transition: transform .04s;
  }
  .pixbtn:hover, .pixbtn:focus-visible { background:#fff; color:#000; outline:none; }
  .pixbtn:active { transform: translateY(3px);
    box-shadow: 0 -4px 0 0 #fff,0 4px 0 0 #fff,-4px 0 0 0 #fff,4px 0 0 0 #fff,0 0 0 4px #fff; }
  .pixbtn[disabled] { opacity:.28; pointer-events:none; }
  .pixbtn.alert { animation: pulse .7s steps(2) infinite; }
  @keyframes pulse { 50% { background:#fff; color:#000; } }

  #nav { display:flex; gap:14px; justify-content:center; margin-bottom:10px; }

  #app { width:100%; max-width:380px; }
  .title { text-align:center; font-size:14px; letter-spacing:1px; margin-bottom:8px; }

  #screen { position:relative; width:100%; height:208px; background:#000; overflow:hidden;
    box-shadow: 0 0 0 3px #fff; margin: 2px 0 12px; }
  #pet { display:block; width:100%; height:100%; image-rendering:pixelated; }
  #nameTag  { position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:11px; }

  #stats { margin:6px 0 2px; }
  .stat { display:flex; align-items:center; gap:8px; margin:5px 0; }
  .stat .lab { width:54px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  .track { flex:1; height:11px; position:relative; box-shadow:0 0 0 2px #fff; background:#000; }
  .seg { position:absolute; top:0; bottom:0; left:0; background:#fff; width:50%;
         transition:width .25s steps(10); }
  .stat.low .seg { animation: blinkfill .6s steps(2) infinite; }
  @keyframes blinkfill { 50% { opacity:.25; } }

  #rpgRow { display:flex; flex-wrap:wrap; justify-content:space-between; gap:3px 8px;
            font-size:8px; letter-spacing:1px; color:var(--dim); margin:6px 0 2px; }
  #rpgRow span { white-space:nowrap; }
  #rpgRow b { color:#fff; font-weight:normal; }

  #questRow { display:flex; justify-content:space-between; align-items:center; gap:8px;
              font-size:8px; letter-spacing:1px; color:var(--dim); margin:8px 0 2px; }
  #questRow #questBiome { color:#fff; }
  #questRow #questProg { color:var(--dim); }
  #questRow #questAge { color:#fff; }

  #actions { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin: 10px 0 16px; }
  #actions .pixbtn { padding:11px 3px 13px; font-size:9px; overflow:hidden;
    box-shadow: 0 -3px 0 0 #fff,0 3px 0 0 #fff,-3px 0 0 0 #fff,3px 0 0 0 #fff,0 0 0 3px #fff,0 6px 0 0 rgba(255,255,255,0.22); }
  #actions .pixbtn:active { box-shadow: 0 -3px 0 0 #fff,0 3px 0 0 #fff,-3px 0 0 0 #fff,3px 0 0 0 #fff,0 0 0 3px #fff; }
  #actions .pixbtn .bl { position:relative; z-index:2; }
  #actions .pixbtn .prog { position:absolute; left:0; bottom:0; height:0; width:0%; background:rgba(255,255,255,0.85); z-index:1; transition:width .1s linear; }
  #actions .pixbtn.active { background:#161616; }
  #actions .pixbtn.active .prog { height:6px; }

  #subPicker { display:none; flex-wrap:wrap; gap:9px 8px; margin:10px 0 16px; }
  #subPicker .pixbtn { flex:1 1 28%; padding:10px 3px 12px; font-size:9px;

  function spellReady(sp){ var r=S.rpg; for(var k in sp.req) if((r[k]||0)<sp.req[k]) return false; return true; }

  // ── lifespan / pacing ──

  // ── state ──

      care:{ feed:0, play:0, clean:0, rest:0 }, diet:{ meat:0, veggie:0 },

  if (S.stats){

  function loadSave(){

  }

  // ── audio ──
  var muted=false; try{ muted=localStorage.getItem('tamafroggi_mute')==='1'; }catch(e){}
  var actx=null;
  function blip(f,d,t,v){ if(muted) return; try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    var o=actx.createOscillator(), g=actx.createGain(); o.type=t||'square'; o.frequency.value=f;
    g.gain.value=v==null?0.05:v; o.connect(g); g.connect(actx.destination);
    var n=actx.currentTime; g.gain.setValueAtTime(g.gain.value,n);
    g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.08)); o.start(n); o.stop(n+(d||0.08)); }catch(e){} }
  $('#muteBtn').addEventListener('click',function(){ muted=!muted;
    try{ localStorage.setItem('tamafroggi_mute',muted?'1':'0'); }catch(e){}
    $('#muteBtn').innerHTML = (muted?'&#9834; muted':'&#9834; sound'); });
  $('#muteBtn').innerHTML = (muted?'&#9834; muted':'&#9834; sound');

  // ── sim ──
  function clamp(v){ return v<0?0:v>100?100:v; }
  function hpClamp(v){ var m=maxHP(); return v<0?0:(v>m?m:v); }   // health is an HP pool, not 0-100
  function avgStat(){ var s=S.stats; return (s.full+s.energy+s.health)/3; }
  function poopOverdue(){ for(var i=0;i<S.poops.length;i++) if(S.poops[i].age>POOP_SICK_TIME) return true; return false; }

  function freeSlot(){
    var used={}; for(var i=0;i<S.poops.length;i++) used[S.poops[i].slot]=1;
    for(var k=0;k<POOP_MAX;k++) if(!used[k]) return k; return 0;
  }
  function spawnPoop(){ if(S.poops.length>=POOP_MAX) return; S.poops.push({ slot:freeSlot(), age:0 }); }

  function simulate(dt){
    if(S.dead) return;
    if(S.stage==='egg'){ S.age += dt; checkEvolve(); return; } // egg incubates in real time
    var st=S.stats;

    // poop
    for(var i=0;i<S.poops.length;i++) S.poops[i].age+=dt;
    if(S.poops.length<POOP_MAX){
      S.poopTimer-=dt;
      var guard=0;
      while(S.poopTimer<=0 && S.poops.length<POOP_MAX && guard++<POOP_MAX){
        spawnPoop(); S.poopTimer+=poopInterval();
      }
      if(S.poopTimer<0) S.poopTimer=poopInterval();
    }

    // starvation sickness (full/energy at zero) - chronic neglect can kill
    var anyZero = st.full<=0||st.energy<=0;
    var dirty = poopOverdue();
    var critSick = S.critical && S.critical.kind==='sick';
    if(anyZero||dirty||critSick){ S.sick=true; if(anyZero||dirty) S.sickT+=dt; }
    else if(S.sick && st.full>25&&st.energy>25){ S.sick=false; S.sickT=0; }
    if(!S.sick) S.sickT=Math.max(0,S.sickT-dt*0.5);
    if(S.sickT>=CHRONIC_SICK_DEATH){ die(dirty ? 'living in its own filth' : 'starvation & neglect'); return; }
    if(st.health<=0){ die('its wounds'); return; }
    checkCritical();
    if(S.dead) return;
    checkEvolve();
  }

  function sumMods(){
    var o={ full:0, energy:0, health:0 };
    for(var i=0;i<S.mods.length;i++){ var m=S.mods[i]; o.full+=m.full||0; o.energy+=m.energy||0; o.health+=m.health||0; }
    return o;
  }
  function tickMods(){ for(var i=S.mods.length-1;i>=0;i--){ if(--S.mods[i].cyc<=0) S.mods.splice(i,1); } }

  function applyHpDamage(amt, cause){
    S.stats.health = Math.max(0, S.stats.health - amt);
    if(S.stats.health<=0) die(cause||'its wounds');
  }

  // ── AGE TICK: the steady game clock. ages the pet, decays/regens vitals, fires ambient
  //    events, handles growth + old-age death. Runs independently of what action is active.
  function ageTick(){
    if(S.dead||S.stage==='egg') return;
    var base=DECAY_BY_SPECIES[species()], st=S.stats, mod=sumMods();
    st.full   = clamp(st.full   - base.full   + (mod.full||0));
    st.energy = clamp(st.energy - base.energy + (mod.energy||0));
    var overdue=0; for(var i=0;i<S.poops.length;i++) if(S.poops[i].age>POOP_SICK_TIME) overdue++;
    var regen = hpRegen() - overdue*2 + (mod.health||0);
    st.health = Math.min(maxHP(), Math.max(0, st.health + regen));
    tickMods();
    S.age++;
    if(S.age>=MAX_AGE){ endGame('age'); return; }
    checkEvolve();
    if(S.dead) return;
    if(S.mode!=='explore' && Math.random()<0.45) fireCycleEvent();   // ambient events
    save();
  }

  // ── ACTION: the active task. runs on its own timer (actDur); the button shows progress.
  //    on completion it applies one rep of its effect and repeats.
  var actAcc=0;
  function setMode(mode, actId){
    S.mode=mode; S.modeAct=actId||null; actAcc=0; closeSub(); save(); updateControls();
  }
  function actDur(){
    var m=S.mode;
    if((m==='train'||m==='play') && S.modeAct){
      var a=findAct(m==='train'?TRAIN:PLAY, S.modeAct), base=ACT_DUR[m]||4000;
      if(a) return Math.max(ACT_MIN_MS, base - (S.rpg[a.stat]||0)*ACT_STEP_MS);
    }
    return ACT_DUR[m]||4000;
  }
  function doAction(){     // one completed rep of the current action
    if(S.dead||S.stage==='egg') return;
    var st=S.stats, m=S.mode;
    if(m==='feed'){
      st.full=clamp(st.full+FEED_RATE); S.care.feed++; react={type:'eat',t:18};
      blip(460,0.05);
      if(Math.random()<0.4) S.poopTimer=Math.min(S.poopTimer, 8+Math.random()*20);
      if(st.full>=100) { S.mode='idle'; setMessage(niceName()+' is full.'); }
    }
    else if(m==='rest'){
      st.energy=clamp(st.energy+REST_RATE); S.care.rest++; react={type:'rest',t:24};
      blip(320,0.06,'sine');
      if(st.energy>=100){ S.mode='idle'; setMessage(niceName()+' is well-rested.'); }
    }
    else if(m==='train' || m==='play'){
      var pool=m==='train'?TRAIN:PLAY, a=findAct(pool,S.modeAct);
      if(!a){ S.mode='idle'; return; }
      if(st.energy < a.eCost){ S.mode='rest'; actAcc=0; logEvent(niceName()+' is exhausted \u2014 resting.'); updateControls(); return; }
      st.energy=clamp(st.energy-a.eCost);
      bumpStat(a.stat,a.gain); if(a.sec) bumpStat(a.sec,1);
      react={type:'act', anim:a.anim, t:26}; flashT=Math.max(flashT,8); blip(660,0.05,'triangle');
      if(a.risk && Math.random()<a.risk){
        var dmg=6+Math.floor(Math.random()*8);
        logEvent('\u26A0 '+fillName(MISHAPS[(Math.random()*MISHAPS.length)|0])+deltaStr([['HP',-dmg]]));
        applyHpDamage(dmg,'a training mishap'); blip(200,0.12,'sawtooth');
      }
      checkSpells();
    }
    else if(m==='explore'){
      if(st.energy < 6){ S.mode='rest'; actAcc=0; logEvent(niceName()+' is too tired to explore \u2014 resting.'); updateControls(); return; }
      st.energy=clamp(st.energy-6);
      doExplore();
    }
    if(!S.dead) save();
  }

  // ── exploration + auto-battle ──
  function doExplore(){
    var idx=Math.min(S.progress||0, FINAL_BOSS);
    var en=enemyStats(idx);
    var res=resolveBattle(en);
    S.battle={ idx:idx, win:res.win, t:0, dur:1600, ename:en.name, esprite:en.sprite, boss:en.boss };
    if(res.win){
      // stat rewards (logged so the change is visible)
      var rk1=RPG_KEYS[(Math.random()*RPG_KEYS.length)|0], rk2=RPG_KEYS[(Math.random()*RPG_KEYS.length)|0];
      bumpStat(rk1, 2); bumpStat(rk2, 1);
      var rew = {}; rew[rk1]=(rew[rk1]||0)+2; rew[rk2]=(rew[rk2]||0)+1;
      var rewChanges=[['HP',-res.dmgTaken]]; for(var rkk in rew) rewChanges.push([RPG_NAME[rkk], rew[rkk]]);
      logEvent('\u2694 defeated '+en.name+' in '+res.rounds+' rounds'+deltaStr(rewChanges));
      checkSpells();
      if(idx===FINAL_BOSS){ endGame('win'); return; }
      S.progress=idx+1; S.biome=ENEMIES[Math.min(S.progress,FINAL_BOSS)].b;
      if(en.boss) logEvent('\u2605 cleared the '+BIOMES[en.biome]+'! next: '+BIOMES[Math.min(en.biome+1,6)]+'.');
      blip(820,0.1,'sine');
    } else {
      logEvent('\u2620 fled from '+en.name+deltaStr([['HP',-res.dmgTaken]])+'. train up and try again.');
      blip(200,0.16,'sawtooth');
    }
    save();
  }
  function resolveBattle(en){
    var php=S.stats.health, mx=maxHP(), fleeAt=Math.max(1, Math.round(mx*0.18));
    var ehp=en.hp, rounds=0, taken=0, atk=petATK(), def=petDEF(), crit=petCRIT(), spell=bestSpellDmg().dmg;
    while(rounds<60){
      rounds++;
      var dmg=Math.max(1, atk-en.def); if(Math.random()<crit) dmg=Math.round(dmg*1.8); dmg+=spell;
      ehp-=dmg;
      if(ehp<=0) break;
      var ed=Math.max(1, en.atk-def); php-=ed; taken+=ed;
      if(php<=fleeAt) break;
    }
    S.stats.health = Math.max(1, Math.round(php));
    return { win: ehp<=0, rounds:rounds, dmgTaken:taken };
  }

  function endGame(result){
    if(S.dead) return;
    S.ended = result;   // 'win' | 'age'
    S.dead = true; S.mode='idle'; S.modeAct=null; S.battle=null; S.critical=null; S.sick=false;
    S.deadCause = result==='win' ? 'defeated the Abyssal Tyrant' : 'old age';
    closeSub();
    if(result==='win'){ logEvent('\u2605\u2605 the ABYSSAL TYRANT falls \u2014 YOU WIN! \u2605\u2605');
      blip(700,0.12); setTimeout(function(){blip(900,0.12);},120); setTimeout(function(){blip(1100,0.18);},240); }
    else { logEvent('\u231b '+niceName()+' grew old and passed on, the quest unfinished.');
      blip(200,0.3,'sawtooth',0.07); }
    updateAlert(); render(); save();
  }

  function checkEvolve(){
    if(S.stage==='egg' && S.age>=EGG_DUR){
      var baby = EGG_TO_BABY[S.eggStyle] || 'padpole';
      evolveTo('baby', baby, true);
      S.age=0;   // age clock starts at birth
      return;
    }
    if(S.stage==='baby' && S.age>=AGE_JUNIOR){
      evolveTo('junior', pickJunior());
    }
    if(S.stage==='junior' && S.age>=AGE_ADULT){
      evolveTo('adult', pickAdult());
    }
  }


  var flashT=0;
  function evolveTo(stage,form,hatched){
    S.stage=stage; S.form=form; flashT=22;
    blip(660,0.12,'triangle',0.07); setTimeout(function(){ blip(880,0.14,'triangle',0.07); },130);
    if(hatched){
      setMessage('crack! the egg hatched into '+FORM_NAMES[form]);
      logEvent('the egg hatched into '+niceName()+'! hello!');
    } else {
      setMessage(FORM_NAMES[form]+'! it evolved');
      logEvent('\u2605 evolved into '+niceName()+'!');
    }
    save(); render();
  }
  // ── death ──
  function die(cause){
    if(S.dead) return;
    S.dead=true; S.deadCause=cause||'unknown causes'; S.critical=null; S.sick=false;
    S.busy=null; S.mode='idle'; S.modeAct=null; S.battle=null;
    if(!S.ended) S.ended='dead';
    closeSub();
    setMessage(niceName()+' has died');
    logEvent('\u2020 '+niceName()+' has died \u2014 '+S.deadCause+'.');
    blip(200,0.3,'sawtooth',0.07); setTimeout(function(){ blip(110,0.5,'sawtooth',0.07); },260);
    updateAlert(); render(); save();
  }

  // ── name helpers ──
  function niceName(){ var s=FORM_NAMES[S.form]||'Froggi'; return s.charAt(0)+s.slice(1).toLowerCase(); }
  function fillName(t){ return t.replace(/\{n\}/g, niceName()); }

  // ── event log ──
  function clockNow(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function escHtml(s){ return String(s).replace(/[&<>]/g,function(c){ return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;'; }); }
  function logEvent(msg){
    if(!S.log) S.log=[];
    S.log.unshift({ t:clockNow(), m:msg });
    if(S.log.length>LOG_MAX) S.log.length=LOG_MAX;
    renderLog();
  }
  function renderLog(){
    if(!logEl) return;
    if(!S.log||!S.log.length){ logEl.innerHTML='<div class="logRow logEmpty">...all quiet for now...</div>'; return; }
    var h='';
    for(var i=0;i<S.log.length;i++) h+='<div class="logRow"><span class="logT">'+S.log[i].t+'</span>'+escHtml(S.log[i].m)+'</div>';
    logEl.innerHTML=h;
  }

  // ── alert / critical UI ──
  function updateAlert(){
    if(!alertWrap) return;
    if(S.sick || (S.critical && S.critical.kind==='sick')){
      alertWrap.classList.add('crit');
      alertMsg.textContent = (S.critical && S.critical.kind==='sick') ? 'SICK \u2014 give medicine, fast!' : 'feeling unwell';
      alertBtn.textContent = '\u2695 give medicine';
      if(!(S.critical && S.critical.kind==='sick')) alertTime.textContent='';
    } else { alertWrap.classList.remove('crit'); alertTime.textContent=''; }
    updateControls();
  }

  function resolveCritical(){   // sick-only now (medicine)
    if(!S.critical || S.critical.kind!=='sick') return;
    var c=S.critical, s=S.stats;
    S.sick=false; S.sickT=0;
    s.full=clamp(s.full+10); s.energy=clamp(s.energy+10); s.health=hpClamp(s.health+Math.round(maxHP()*0.15));
    react={type:'clean',t:30};
    setMessage('phew - the medicine worked'); logEvent('\u2713 '+niceName()+' recovered from '+c.cause+'.');
    blip(520,0.12,'sine');
    S.critical=null; updateAlert(); save();
  }

  function checkCritical(){
    if(S.dead||!S.critical) return;
    if(Date.now()>S.critical.deadline){
      if(S.critical.kind==='sick'){ die(S.critical.cause); }
      else { var ev=S.critical.ev; S.critical=null; logEvent('\u23F1 too slow!'); applyQteResult(ev.to); updateAlert(); save(); }
    }
  }

  // format a list of [LABEL, delta] into "  (+12 FULL, -8 HP)"
  function deltaStr(changes){
    if(!changes) return '';
    var p=[]; for(var i=0;i<changes.length;i++){ var c=changes[i]; if(c[1]) p.push((c[1]>0?'+':'')+c[1]+' '+c[0]); }
    return p.length ? '  ('+p.join(', ')+')' : '';
  }
  function applyQteResult(r){
    r=r||{}; var s=S.stats, changes=[];
    if(r.win){ var heal=Math.round(maxHP()*0.08); s.health=hpClamp(s.health+heal); }
    if(r.hp){ s.health=hpClamp(s.health+r.hp); changes.push(['HP',r.hp]); }
    if(r.full){ s.full=clamp(s.full+r.full); changes.push(['FULL',r.full]); }
    if(r.energy){ s.energy=clamp(s.energy+r.energy); changes.push(['ENERGY',r.energy]); }
    if(r.stat){ for(var k in r.stat){ bumpStat(k, r.stat[k]); changes.push([RPG_NAME[k]||k.toUpperCase(), r.stat[k]]); } }
    var icon = r.die ? '\u2620 ' : (r.bad ? '\u2639 ' : ((r.good||r.win) ? '\u2728 ' : '\u2022 '));
    var msg = r.log ? fillName(r.log) : '';
    if(msg || changes.length) logEvent(icon+(msg||niceName())+deltaStr(changes));
    if(r.die){ blip(160,0.3,'sawtooth',0.07); react={type:'tired',t:30}; setMessage(msg||'oh no...'); die(r.die); return; }
    if(r.bad){ blip(200,0.14,'sawtooth'); react={type:'tired',t:30}; }
    else if(r.good||r.win){ blip(740,0.07); setTimeout(function(){blip(960,0.08);},80); react={type:'play',t:30}; }
    else { blip(440,0.05,'triangle'); }
    setMessage(msg||'');
    if(s.health<=0){ die('its injuries'); }
  }
  function resolveQte(r){
    if(!S.critical || S.critical.kind!=='qte') return;
    S.critical=null;
    applyQteResult(r);
    updateAlert(); save();
  }

  // ── random events ──
  function rand(a,b){ return a+Math.random()*(b-a); }

  function applyStatEvent(e){
    var s=S.stats, net=0, changes=[];
    if(e.full){ s.full=clamp(s.full+e.full); net+=e.full; changes.push(['FULL',e.full]); }
    if(e.energy){ s.energy=clamp(s.energy+e.energy); net+=e.energy; changes.push(['ENERGY',e.energy]); }
    if(e.health){ s.health=hpClamp(s.health+e.health); net+=e.health; changes.push(['HP',e.health]); }
    net += (e.happy||0)+(e.clean||0);   // legacy mood flavor: tone only, no vital anymore
    var m=fillName(e.msg); setMessage(m); logEvent(m+deltaStr(changes));
    blip(net>=0?500:200,0.06,'triangle'); save();
  }

  function applyModEvent(e){
    var m=e.mod, mod={ cyc:m.cyc||3 };
    if(m.full) mod.full=m.full; if(m.energy) mod.energy=m.energy; if(m.health) mod.health=m.health;
    S.mods.push(mod);
    var parts=[];
    if(m.full) parts.push((m.full>0?'+':'')+m.full+' FULL');
    if(m.energy) parts.push((m.energy>0?'+':'')+m.energy+' ENERGY');
    if(m.health) parts.push((m.health>0?'+':'')+m.health+' HP');
    var tail = parts.length ? '  ('+parts.join(', ')+'/cycle \u00d7'+mod.cyc+')' : '';
    var t=fillName(e.msg); setMessage(t); logEvent(t+tail);
    blip(440,0.06,'triangle'); save();
  }

  function startSickEvent(){
    var e=SICK_EVENTS[(Math.random()*SICK_EVENTS.length)|0];
    S.sick=true;
    S.critical={ kind:'sick', cause:e.cause, deadline:Date.now()+SICK_DEADLINE };
    var m=fillName(e.msg); setMessage(m); logEvent('\u26A0 '+m);
    blip(160,0.2,'sawtooth',0.07); flashT=22; updateAlert(); save();
  }

  function startQTE(){
    var ev = QTE_EVENTS[(Math.random()*QTE_EVENTS.length)|0];
    var time = ev.time || QTE_DEADLINE;
    S.critical = { kind:'qte', ev:ev, flash:fillName(ev.msg), deadline:Date.now()+time };
    var m=fillName(ev.msg); setMessage(m); logEvent('\u26A0 '+m);

    flashT=22; renderQteButtons(ev); updateAlert(); save();

  // an ambient event may fire on an age tick
  function fireCycleEvent(){
    if(S.dead||S.stage==='egg') return;
    var busy = eating||wash||S.critical;
    var r=Math.random();
    if(!busy && S.age>3 && r<0.07){ startSickEvent(); return; }
    if(!busy && S.age>3 && r<0.13){ startQTE(); return; }
    if(r<0.30){ applyModEvent(MOD_EVENTS[(Math.random()*MOD_EVENTS.length)|0]); return; }
    if(r<0.62){ applyStatEvent(STAT_EVENTS[(Math.random()*STAT_EVENTS.length)|0]); return; }
    logEvent(fillName(IDLE[(Math.random()*IDLE.length)|0]));   // flavor beat
  }

  var ageAcc=0;   // ms into the current age tick

  // ── care actions ──
  var react=null;          // transient anim state
  var eating=null;         // { type, biteFrac, biteTimer, bitesLeft }
  function startEat(type){
    if(eating) return;
    eating = { type:type, biteFrac:0, biteTimer:520, bitesLeft:3 };
    blip(420,0.05);
  }
  function bite(){
    S.stats.full = clamp(S.stats.full + FEED_FULL/3);
    eating.bitesLeft--; eating.biteFrac = (3-eating.bitesLeft)/3;
    react = { type:'eat', t:10 };
    blip(460,0.05);
    if(eating.bitesLeft<=0){
      S.diet[eating.type]++; S.care.feed++;
      // digestion: a poop comes sooner
      S.poopTimer = Math.min(S.poopTimer, 30 + Math.random()*40);
      setMessage(eating.type==='meat' ? 'chomp - tasty meat' : 'crunch - fresh greens');
      logEvent(niceName()+(eating.type==='meat' ? ' devoured a bone-in steak.' : ' munched some fresh greens.'));
      eating=null; save();

  function act(kind){
    if(S.dead){ return; }
    if(S.stage==='egg'){ setMessage("it's still an egg \u2014 give it time to hatch"); return; }
    if(actx && actx.state==='suspended') actx.resume();
    var s=S.stats;
    // tapping the already-active action stops it
    if((kind==='feed'||kind==='rest'||kind==='explore') && S.mode===kind){ setMode('idle'); setMessage(niceName()+' stopped.'); return; }
    if(kind==='feed'){ setMode('feed'); setMessage(niceName()+' is tucking in.'); logEvent(niceName()+' started eating.'); return; }
    if(kind==='rest'){ setMode('rest'); react={type:'rest',t:70}; setMessage('zzz \u2014 recharging energy'); logEvent(niceName()+' settled down to rest.'); return; }
    if(kind==='train'){ openSub('train'); return; }
    if(kind==='play'){ openSub('play'); return; }
    if(kind==='explore'){
      if(S.stage==='baby'){ setMessage('too young to explore \u2014 grow up first'); return; }
      setMode('explore'); setMessage('venturing into the '+BIOMES[curBiome()]+'!');
      logEvent('\u2694 '+niceName()+' set off to explore the '+BIOMES[curBiome()]+'.'); return;
    }
    if(kind==='heal'){
      if(S.critical && S.critical.kind==='sick'){ resolveCritical(); return; }
      s.full=clamp(s.full+12); s.energy=clamp(s.energy+12); s.health=Math.min(maxHP(),s.health+20);
      S.sickT=Math.max(0,S.sickT-180);
      react={type:'clean',t:30}; blip(520,0.1,'sine'); setMessage('feeling a little better');
      logEvent(niceName()+' took some medicine.'); updateAlert(); save(); return;
    }
    if(kind==='clean'){
      startWash();
      S.care.clean++; blip(700,0.05,'sine'); setMessage('splish \u2014 scrubbing the screen');
      logEvent('you cleaned up after '+niceName()+'.'); save();
    }
  }
  function curBiome(){ return ENEMIES[Math.min(S.progress||0,FINAL_BOSS)].b; }

  // ── egg: rhythmic tapping to hatch (mash too fast and it shatters) ──
  var eggTapLast=0, eggCrack=0, eggWobble=0, eggPulse=0;
  function eggTap(){
    if(S.dead || S.stage!=='egg') return;
    if(actx && actx.state==='suspended') actx.resume();
    var now=performance.now();
    var dt = eggTapLast ? (now-eggTapLast) : 9999;
    eggTapLast=now; eggWobble=7;
    if(dt < EGG_TAP_SHATTER){ eggCrack = EGG_CRACK_MAX; }
    else if(dt < EGG_TAP_MIN){ eggCrack += 2; blip(240,0.06,'sawtooth'); }
    else if(dt < 340){ eggCrack += 1; blip(320,0.05,'sawtooth'); }
    else {
      S.age = Math.min(EGG_DUR, S.age + EGG_TAP_BOOST);   // good tap: speed up hatching
      eggCrack = Math.max(0, eggCrack-1);                  // careful spacing lets cracks settle
      eggPulse = 6; blip(560 + (S.age/EGG_DUR)*300, 0.05, 'square');
    }
    if(eggCrack >= EGG_CRACK_MAX){
      flashT=22; logEvent('\u2620 the egg cracked \u2014 you tapped too hard!');
      die('a shell cracked from impatient tapping'); render(); return;
    }
    if(S.age>=EGG_DUR){ checkEvolve(); }   // taps filled the meter -> hatch now
    save(); render();
  }
  function drawEggCracks(box){
    if(!eggCrack || !box) return;
    pctx.strokeStyle='#000'; pctx.lineWidth=2;
    var n=Math.min(EGG_CRACK_MAX, eggCrack);
    for(var i=0;i<n;i++){
      var sxp=box.ox+box.w*(0.28+0.16*i), sy=box.oy+box.h*0.18, d=(i%2?1:-1);
      pctx.beginPath(); pctx.moveTo(sxp, sy);
      pctx.lineTo(sxp+6*d, sy+box.h*0.26);
      pctx.lineTo(sxp-4*d, sy+box.h*0.5);
      pctx.lineTo(sxp+7*d, sy+box.h*0.72);
      pctx.stroke();
    }
    pctx.lineWidth=1;
  }

  function bumpStat(stat,amt){ S.rpg[stat]=Math.max(1,Math.min(999,(S.rpg[stat]||0)+amt)); if(S.stage!=='egg') checkSpells(); }

  // ── control area: actions / submenu / qte / sick ──

  // decides which control block is visible for the current state
  var MODE_LABEL = { feed:'EATING', rest:'RESTING', train:'TRAINING', play:'PLAYING', explore:'EXPLORING', idle:'' };
  var SHOW_DISP = { actions:'grid', subPicker:'flex', busyRow:'flex', qteRow:'block', alertWrap:'block', endScreen:'block', questRow:'flex' };
  function updateControls(){
    function on(el,v){ if(!el) return; el.style.display = v ? (SHOW_DISP[el.id]||'block') : 'none'; }
    var qte = S.critical && S.critical.kind==='qte';

    on(endScreen, dead);
    on(questRow, !egg && !dead);
    on(qteRow, qte && !dead && !egg);
    on(actionsEl, !dead && !egg && !subMode && !qte);
    on(subPicker, !!subMode && !dead && !egg && !qte);
    on(busyRow, activeMode && !subMode && !qte);
    on(alertWrap, sick && !dead && !egg && !qte);

  var msgT=0;

  // tap the egg to hatch faster (mash and it shatters)

  var newBtn=$('#newBtn'), newBtnLabel=newBtn.innerHTML, newConfirmT=0;
  function hatchFresh(){

  // ── wash animation ──
  var wash=null; // { x }
  function startWash(){ wash={ x:0 }; }

  // ── render ──
  var dpr=1, cw=0, ch=0;
  function sizeCanvas(){ dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));

  function blitMap(map, ox, oy, unit, eatenFrac){
    var H=map.length, W=map[0].length;
    var cut = eatenFrac ? Math.floor(W*(1-eatenFrac)) : W; // bites eat from the right
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<cut;x++)
      if(map[y][x]==='#') pctx.fillRect(Math.round(ox+x*unit),Math.round(oy+y*unit),Math.ceil(unit),Math.ceil(unit));
  }

  function drawSprite(form, offY, sq, xc, flip){
    var rows=SPR[form], H=rows.length, W=rows[0].length;
    var unit=Math.max(2,Math.floor((ch*PET_SCALE)/H));
    var sx=unit, sy=unit;
    if(sq){ sy=unit*sq; sx=unit*(1+(1-sq)*0.6); }
    var totalW=W*sx, totalH=H*sy, floorY=ch*0.82;
    if(xc==null) xc=cw/2;
    var ox=xc-totalW/2, oy=floorY-totalH+offY;
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++){
      var src = flip ? (W-1-x) : x;
      if(rows[y][src]==='#') pctx.fillRect(Math.round(ox+x*sx),Math.round(oy+y*sy),Math.ceil(sx),Math.ceil(sy));
    }
    return { ox:ox, oy:oy, w:totalW, h:totalH, unit:unit, floorY:floorY };
  }

  // poops sit spread along the floor, two on each side of the (centered) pet
  function poopSlotX(){ return [ cw*0.13, cw*0.30, cw*0.70, cw*0.87 ]; }

  // a wavy "smell" squiggle rising from (baseX, baseY)
  function drawSmell(baseX, baseY, height, amp, phase, alpha){
    pctx.fillStyle='#fff';
    for(var y=0; y<height; y+=3){
      var prog=y/height;
      pctx.globalAlpha = alpha*(1-prog*0.7);
      var wob=Math.sin((y*0.5) + phase + animT*0.006)*amp*(0.4+prog);
      pctx.fillRect(Math.round(baseX+wob), Math.round(baseY-y), 2,2);
    }
  }
  function drawPoops(box){
    var floorY=box.floorY, unit=2, sx=poopSlotX();
    var pw=POOP[0].length*unit;
    for(var i=0;i<S.poops.length;i++){
      var p=S.poops[i], cx=(sx[p.slot]!=null?sx[p.slot]:sx[0]);
      var bx=Math.round(cx-pw/2), by=floorY-POOP.length*unit;
      var overdue = p.age>POOP_SICK_TIME;
      // smell lines radiating up - always visible, wilder when overdue
      var topY=by-2, amp=overdue?3:2, alpha=overdue?0.5:0.32, hgt=overdue?20:13;
      drawSmell(cx-4, topY, hgt, amp, p.slot*1.7,      alpha);
      drawSmell(cx,   topY+2, hgt+3, amp, p.slot*1.7+2, alpha);
      drawSmell(cx+4, topY, hgt, amp, p.slot*1.7+4,    alpha);
      // the poop itself
      pctx.globalAlpha = overdue ? (0.5+0.5*Math.abs(Math.sin(animT*0.006))) : 1;
      blitMap(POOP, bx, by, unit, 0);
      if(overdue){ // extra bad-stink puffs
        pctx.globalAlpha=0.55;
        var ph=(animT*0.05)%7;
        pctx.fillRect(Math.round(cx-6), Math.round(by-8-ph), 2,2);
        pctx.fillRect(Math.round(cx+6), Math.round(by-13-ph), 2,2);
      }
    }
    pctx.globalAlpha=1;
  }

  function drawGrave(){
    var rows=GRAVE, H=rows.length, W=rows[0].length;
    var unit=Math.max(3,Math.floor((ch*0.5)/H));
    var tw=W*unit, th=H*unit;
    var ox=(cw-tw)/2, oy=ch*0.80-th;
    blitMap(rows, ox, oy, unit, 0);
  }

  // draw an arbitrary sprite grid centered at xc (used for battle scenes)
  function drawCreature(rows, xc, offY, scale, flip){
    var H=rows.length, W=rows[0].length;
    var unit=Math.max(2,Math.floor((ch*(PET_SCALE*(scale||1)))/H));
    var totalW=W*unit, totalH=H*unit, floorY=ch*0.82;
    var ox=xc-totalW/2, oy=floorY-totalH+(offY||0);
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++){ var src=flip?(W-1-x):x;
      if(rows[y][src]==='#') pctx.fillRect(Math.round(ox+x*unit),Math.round(oy+y*unit),Math.ceil(unit),Math.ceil(unit)); }
    return { ox:ox, oy:oy, w:totalW, h:totalH, cx:xc, cy:oy+totalH/2 };
  }
  function drawBattle(){
    var b=S.battle, prog=Math.min(1, b.t/b.dur);
    // lunge: sprites rush toward center, meet ~mid, then recoil
    var lunge = Math.sin(Math.min(prog,0.6)/0.6*Math.PI)*1; // 0..1..0 over first 60%
    var petX = cw*0.30 + lunge*(cw*0.10);
    var eneX = cw*0.70 - lunge*(cw*0.10);
    var bob = Math.sin(animT*0.02)*2;
    var petRows = SPR[S.form]||SPR.springer;
    var eneRows = ENE_SPR[b.esprite] || ENE_SPR.slime0;
    var eScale = b.boss ? 1.25 : 1.0;
    drawCreature(petRows, petX, bob, 1.0, false);
    drawCreature(eneRows, eneX, bob*-1, eScale, true);
    // clash sparks at center on impact beats
    if(prog>0.25 && prog<0.7){
      pctx.fillStyle='#fff';
      var cx=cw*0.5, cy=ch*0.55;
      for(var i=0;i<6;i++){ var a=animT*0.05+i; var rr=6+((animT*0.06+i*4)%10);
        pctx.fillRect(Math.round(cx+Math.cos(a)*rr), Math.round(cy+Math.sin(a)*rr), 2,2); }
    }
    // label + result banner
    pctx.fillStyle='#fff'; pctx.font='8px "Pixel", monospace'; pctx.textAlign='center';
    pctx.fillText('VS '+b.ename, cw*0.5, ch*0.16);
    if(prog>0.62){ pctx.font='10px "Pixel", monospace';
      pctx.fillText(b.win?'WIN!':'FLED!', cw*0.5, ch*0.30); }
    pctx.textAlign='left';
  }

  function fmtMs(ms){ var s=Math.ceil(ms/1000);
    if(s>=60){ var m=Math.floor(s/60); return m+':'+('0'+(s%60)).slice(-2); } return s+'s'; }

  function drawFood(box){
    if(!eating) return;
    var map = eating.type==='meat'?MEAT:VEG, unit=3, mapW=map[0].length;
    var fx = Math.max(2, box.ox - mapW*unit - 8), fy = box.floorY-map.length*unit;
    blitMap(map, fx, fy, unit, eating.biteFrac);
    // tongue flick toward the food on each bite
    if(react && react.type==='eat'){
      pctx.strokeStyle='#fff'; pctx.lineWidth=1;
      var sy=box.oy+box.h*0.45;
      pctx.beginPath(); pctx.moveTo(box.ox+2, sy); pctx.lineTo(fx+mapW*unit, fy+map.length*unit*0.4); pctx.stroke();
    }
  }

  function drawZzz(box){
    pctx.fillStyle='rgba(255,255,255,0.7)';
    var bx=box.ox+box.w+2, by=box.oy+8, ph=(animT*0.04)%3;
    pctx.fillRect(bx, by-ph*3, 3,3);
    pctx.fillRect(bx+6, by-9-ph*3, 3,3);
    pctx.fillRect(bx+12, by-18-ph*3, 3,3);
  }

  // ── activity animations (train + play) ──
  function activityMotion(anim,t){
    var o={ offY:Math.sin(t*2.2)*2, sq:1, shakeX:0 };
    switch(anim){
      case 'lift':     o.offY=-Math.abs(Math.sin(t*5))*10; o.sq=0.84+Math.abs(Math.sin(t*5))*0.16; break;
      case 'dash':     o.shakeX=Math.sin(t*22)*6; o.offY=-Math.abs(Math.sin(t*11))*3; o.sq=0.95; break;
      case 'endure':   o.offY=4+Math.sin(t*30)*1.3; o.sq=0.8; break;
      case 'study':    o.offY=Math.sin(t*1.6)*1.5; break;
      case 'meditate': o.offY=-7+Math.sin(t*2)*2; o.sq=0.97; break;
      case 'forage':   o.offY=-Math.abs(Math.sin(t*4))*6; break;
      case 'wrestle':  o.shakeX=Math.sin(t*16)*4; o.offY=Math.sin(t*8)*2; o.sq=0.93; break;
      case 'tag':      o.shakeX=Math.sin(t*14)*5; o.offY=-Math.abs(Math.sin(t*7))*5; break;
      case 'fetch':    o.shakeX=Math.sin(t*6)*8; o.offY=-Math.abs(Math.sin(t*6))*5; break;
      case 'puzzle':   o.offY=Math.sin(t*2.6)*2; break;
      case 'sing':     o.offY=Math.sin(t*4)*3; o.sq=0.96; break;
      case 'explore':  o.offY=Math.sin(t*3)*2; o.shakeX=Math.sin(t*1.5)*3; break;
    }
    return o;
  }
  function px(x,y,w,h){ pctx.fillRect(Math.round(x),Math.round(y),w||2,h||2); }
  function drawNote(x,y){ pctx.fillStyle='#fff'; px(x,y,2,5); px(x-2,y+4,4,2); }
  function drawActivity(anim,box,t){
    pctx.save();
    var cx=box.ox+box.w/2, top=box.oy, rgt=box.ox+box.w, lft=box.ox;
    pctx.fillStyle='#fff';
    var p=(animT*0.05)%10;
    switch(anim){
      case 'lift':
        pctx.globalAlpha=0.9; // effort marks beside head
        px(lft-6, top+4+Math.sin(t*5)*2, 2,2); px(lft-9, top+1+Math.sin(t*5)*2, 2,2);
        px(rgt+4, top+4-Math.sin(t*5)*2, 2,2); px(rgt+7, top+1-Math.sin(t*5)*2, 2,2);
        break;
      case 'dash': case 'tag': case 'fetch':
        pctx.globalAlpha=0.5; // speed streaks behind
        for(var i=0;i<4;i++){ var sx=(walkDir<0?rgt+2+i*5:lft-4-i*5); px(sx, box.oy+box.h*0.3+i*4, 4,2); }
        break;
      case 'endure': // sweat drops
        pctx.globalAlpha=0.85;
        px(rgt-1, top+6+p, 2,3); px(lft+2, top+10+((p+4)%10), 2,3);
        break;
      case 'study': case 'puzzle': // thought dots + ?
        pctx.globalAlpha=0.9;
        px(rgt+2, top-2, 2,2); px(rgt+5, top-6, 3,3);
        pctx.fillRect(rgt+7, top-15, 4,2); pctx.fillRect(rgt+9, top-13, 2,4); pctx.fillRect(rgt+9, top-7, 2,2);
        break;
      case 'meditate': // pulsing aura ring + spirit dots
        pctx.globalAlpha=0.35+0.25*Math.abs(Math.sin(t*2));
        pctx.lineWidth=2; pctx.strokeStyle='#fff';
        var rad=box.w*0.7+Math.sin(t*2)*4;
        pctx.beginPath(); pctx.arc(cx, box.oy+box.h*0.5, rad, 0, Math.PI*2); pctx.stroke();
        pctx.globalAlpha=0.8;
        for(var k=0;k<3;k++){ var a=t*1.2+k*2.1; px(cx+Math.cos(a)*rad, box.oy+box.h*0.5+Math.sin(a)*rad, 3,3); }
        break;
      case 'forage': case 'explore': // search sparkles near ground
        pctx.globalAlpha=0.85;
        var sxp=(walkDir<0?lft-6:rgt+4);
        px(sxp, box.floorY-6, 2,2); px(sxp+(walkDir<0?-3:3), box.floorY-11, 3,3);
        pctx.globalAlpha=0.5; px(sxp+(walkDir<0?-6:6), box.floorY-4-((p)%6), 2,2);
        break;
      case 'sing': // music notes floating up
        drawNote(rgt+3, top-2-((animT*0.03)%14));
        drawNote(rgt+9, top+2-((animT*0.03+7)%14));
        break;
      case 'wrestle': // impact bursts
        pctx.globalAlpha=0.8;
        var bx=(walkDir<0?lft-5:rgt+3);
        px(bx, box.oy+box.h*0.4, 2,2); px(bx+(walkDir<0?-3:3), box.oy+box.h*0.4-3, 2,2);
        px(bx+(walkDir<0?-3:3), box.oy+box.h*0.4+3, 2,2);
        break;
    }
    pctx.globalAlpha=1; pctx.restore();
  }

  var animT=0, last=performance.now(), simAcc=0;
  // pet roaming state (cosmetic, not persisted)
  var walkX=null, walkDir=1, hopTimer=0, hopping=false, hopPhase=0, trudgePause=0;
  function frame(now){
    var dtMs=Math.min(120, now-last); last=now; animT+=dtMs;

    simAcc+=dtMs; while(simAcc>=1000){ simulate(1); simAcc-=1000; }

    // AGE clock (steady) + ACTION timer (per-action). egg phase ages via simulate above.
    if(!S.dead && S.stage!=='egg'){
      ageAcc+=dtMs;
      var ag=0;
      while(ageAcc>=AGE_TICK_MS && ag++<8){ ageAcc-=AGE_TICK_MS; ageTick(); if(S.dead) break; }
      // active action runs on its own timer; the button fills as a progress bar
      if(!S.dead && S.mode && S.mode!=='idle'){
        actAcc+=dtMs;
        var ac=0;
        while(actAcc>=actDur() && ac++<8){ actAcc-=actDur(); doAction(); if(S.dead||S.mode==='idle') break; }
      } else { actAcc=0; }
      // battle animation timer
      if(S.battle){ S.battle.t+=dtMs; if(S.battle.t>=S.battle.dur) S.battle=null; }
      checkCritical();
      // live countdowns
      if(S.critical){
        var rem=Math.max(0,S.critical.deadline-Date.now());
        if(S.critical.kind==='qte'){ if(qteTime) qteTime.textContent='react in '+fmtMs(rem); }
        else { alertTime.textContent='medicine in '+fmtMs(rem); }
      } else if(S.sick){ alertTime.textContent='give it some medicine'; }
    }

    // eating
    if(eating){ eating.biteTimer-=dtMs; if(eating.biteTimer<=0){ eating.biteTimer=520; bite(); } }
    if(react){ react.t-=dtMs/16; if(react.t<=0) react=null; }
    if(msgT>0){ msgT-=dtMs/16; if(msgT<=0 && msgEl) msgEl.textContent=''; }

    pctx.setTransform(dpr,0,0,dpr,0,0);
    pctx.clearRect(0,0,cw,ch); pctx.fillStyle='#000'; pctx.fillRect(0,0,cw,ch);

    // floor line
    pctx.strokeStyle='rgba(255,255,255,0.5)'; pctx.lineWidth=1;
    var fy=Math.round(ch*0.82)+0.5;
    pctx.beginPath(); pctx.moveTo(cw*0.06,fy); pctx.lineTo(cw*0.94,fy); pctx.stroke();

    // dead: show a grave and stop the pet animation
    if(S.dead){ drawGrave(); setBars(); requestAnimationFrame(frame); return; }

    // egg: rock gently; tapping speeds the hatch, mashing cracks it
    if(S.stage==='egg'){
      var et=animT/1000, togo=Math.max(0, EGG_DUR - S.age);
      var soon = togo<8;
      var bob = Math.sin(et*2)*2;
      if(eggWobble>0) eggWobble-=dtMs/16;
      if(eggPulse>0) eggPulse-=dtMs/16;
      var shake = (eggWobble>0 ? Math.sin(animT*0.09)*Math.min(6,eggWobble) : 0)
                + (soon ? Math.sin(animT*0.05)*2 : 0);
      var sq = 1 + (eggPulse>0 ? Math.min(0.12, eggPulse*0.02) : 0);
      pctx.save(); pctx.translate(shake,0);
      var ebox = drawSprite(S.form, bob, sq);
      drawEggCracks(ebox);
      pctx.restore();
      pctx.fillStyle='rgba(255,255,255,0.82)'; pctx.font='8px "Pixel",monospace'; pctx.textAlign='center';
      pctx.fillText(eggCrack>=2 ? 'careful \u2014 it\u2019s cracking!' : 'TAP THE EGG TO HATCH \u00b7 steady rhythm, don\u2019t mash', cw*0.5, ch*0.93);
      pctx.textAlign='left';
      if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }
      setBars();
      requestAnimationFrame(frame); return;
    }

    // active battle: show the clash instead of roaming
    if(S.battle){
      drawBattle();
      if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }
      setBars();
      requestAnimationFrame(frame); return;
    }

    // ── walking pet ──
    var t=animT/1000;
    var unit0=Math.max(2,Math.floor((ch*PET_SCALE)/13));
    var halfW=(16*unit0)/2, marg=8;
    var left=marg+halfW, right=cw-marg-halfW;
    if(walkX==null) walkX=cw/2;
    walkX=Math.min(right,Math.max(left,walkX));

    var offY=Math.sin(t*2.2)*2, sq=1, shakeX=0;
    var resting=react&&react.type==='rest', playing=react&&react.type==='play', tired=react&&react.type==='tired';
    var modeAnim = ((S.mode==='train'||S.mode==='play') && S.modeAct) ? ((findAct(S.mode==='train'?TRAIN:PLAY,S.modeAct)||{}).anim) : null;
    var curAnim = (react && react.type==='act' ? react.anim : null) || modeAnim;

    if(curAnim){                                  // training / playing flourish, in place
      var m=activityMotion(curAnim,t); offY=m.offY; sq=m.sq; shakeX=m.shakeX;
    }
    else if(eating){ sq=0.95; offY=Math.sin(t*9)*1.2; }       // stand still & eat
    else if(playing){ var ph=(react.t%16)/16; offY=-Math.abs(Math.sin(ph*Math.PI))*12; sq=0.9; }
    else if(resting){ offY=2; sq=0.86; }                      // stand still & rest
    else if(S.sick){ offY=Math.sin(t*8)*2; sq=0.95; }         // shiver in place
    else {
      // roam, with a different gait per species
      var sp=species();
      if(sp==='mossy'){                 // plant: slow, smooth glide + float
        walkX += walkDir*0.030*dtMs; offY=Math.sin(t*1.6)*2.5;
      } else if(sp==='stony'){          // stone: heavy trudge with pauses + waddle
        if(trudgePause>0){ trudgePause-=dtMs; offY=Math.sin(t*3)*1; }
        else { walkX += walkDir*0.020*dtMs; offY=Math.abs(Math.sin(t*5))*2.5;
               if(Math.random()<0.004) trudgePause=400+Math.random()*700; }
      } else {                          // dewy (default): discrete hops
        hopTimer-=dtMs;
        if(!hopping && hopTimer<=0){ hopping=true; hopPhase=0; }
        if(hopping){ hopPhase+=dtMs; var hp=hopPhase/280;
          if(hp>=1){ hopping=false; hopTimer=420+Math.random()*360; }
          else { walkX += walkDir*0.10*dtMs; offY=-Math.sin(hp*Math.PI)*12; sq=0.9; } }
      }
      if(walkX<=left){ walkX=left; walkDir=1; }
      else if(walkX>=right){ walkX=right; walkDir=-1; }
    }

    pctx.save(); pctx.translate(shakeX,0);
    var box=drawSprite(S.form, offY, sq, walkX, walkDir<0);
    if(curAnim) drawActivity(curAnim, box, t);
    pctx.restore();
    drawPoops(box);
    drawFood(box);
    if(resting||tired) drawZzz(box);
    if(S.sick){ pctx.fillStyle='#fff'; pctx.fillRect(box.ox+box.w-2, box.oy+4+(Math.sin(t*6)+1)*2, 2,3); }

    // wash sweep
    if(wash){
      wash.x += dtMs*0.9; // px per ms across the screen
      var wx=wash.x;
      // clear poops the wash has passed
      var slotX=poopSlotX();
      S.poops = S.poops.filter(function(p){ return (slotX[p.slot]||0) > wx - 10; });
      // draw wash bar + faint trailing scrub
      pctx.fillStyle='#fff'; pctx.fillRect(wx, 0, 8, ch);
      pctx.fillStyle='rgba(255,255,255,0.12)'; pctx.fillRect(0,0,wx,ch);
      if(wx>cw+8){ wash=null; S.poopTimer=poopInterval(); save(); }
    }

    if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }

    setBars();
    requestAnimationFrame(frame);
  }

  // ── offline catch-up ──
  function catchUp(){
    if(S.dead) return;
    var elapsed=Math.max(0,(Date.now()-(S.lastSeen||Date.now()))/1000);
    if(elapsed<1) return;
    var capped=Math.min(elapsed,MAX_CATCHUP);
    if(S.stage==='egg'){
      simulate(capped);   // egg keeps incubating while away (and may hatch)
    } else {
      var base=DECAY_BY_SPECIES[species()], ticks=Math.floor(capped/CYCLE_SEC), st=S.stats;
      st.full  =clamp(st.full   - base.full*ticks);
      st.energy=clamp(st.energy - base.energy*ticks);
      st.health=Math.min(maxHP(), st.health + hpRegen()*ticks);   // HP regenerates while away
      S.age=(S.age||0)+ticks;
      if(S.age>=MAX_AGE){ endGame('age'); return; }
      simulate(capped);   // poop + sickness accrue (no events; modes paused while away)
      if(S.dead) return;
      checkEvolve();
    }
    S.lastSeen=Date.now();
  }

  setInterval(save,5000);
  document.addEventListener('visibilitychange',function(){ if(document.hidden) save(); else { catchUp(); render(); } });
  window.addEventListener('beforeunload',save);

  catchUp(); sizeCanvas(); render(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
