  :root { --line:#fff; --dim:rgba(255,255,255,0.4); --faint:rgba(255,255,255,0.14); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%; background:#000; color:#fff;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    image-rendering: pixelated;
  }
  body { display:flex; flex-direction:column; align-items:center; padding:10px 12px 16px; }
  .pix { font-family:'Pixel', ui-monospace, monospace; -webkit-font-smoothing:none; font-smooth:never; }

  /* ── thick pixel buttons ── */
  .pixbtn {
    font-family:'Pixel', monospace; font-size:10px; line-height:1; letter-spacing:0;
    color:#fff; text-decoration:none; background:#000; cursor:pointer; text-transform:uppercase;
    padding:11px 12px 13px; border:0; position:relative;
    /* blocky stepped border made of solid box-shadows (thick pixels) */
    box-shadow:
      0 -4px 0 0 #fff, 0 4px 0 0 #fff, -4px 0 0 0 #fff, 4px 0 0 0 #fff,
      0 0 0 4px #fff,
      0 7px 0 0 rgba(255,255,255,0.25);  /* drop shadow block */
    transition: transform .04s;
  }
  @media (hover:hover) and (pointer:fine){
    .pixbtn:hover { background:#fff; color:#000; outline:none; }
  }
  .pixbtn:focus { outline:none; }
  .pixbtn.locked { opacity:0.3; cursor:not-allowed; }
  .pixbtn.locked:hover { background:#000; color:#fff; }
  .pixbtn:active { transform: translateY(3px);
    box-shadow: 0 -4px 0 0 #fff,0 4px 0 0 #fff,-4px 0 0 0 #fff,4px 0 0 0 #fff,0 0 0 4px #fff; }
  .pixbtn[disabled] { opacity:.28; pointer-events:none; }
  .pixbtn.alert { animation: pulse .7s steps(2) infinite; }
  @keyframes pulse { 50% { background:#fff; color:#000; } }

  #nav { display:flex; gap:14px; justify-content:center; margin-bottom:10px; }

  #app { width:100%; max-width:380px; }
  .title { text-align:center; font-size:14px; letter-spacing:1px; margin-bottom:8px; }

  #screen { position:relative; width:100%; height:280px; background:#000; overflow:hidden;
    box-shadow: 0 0 0 3px #fff; margin: 2px 0 12px; }
  #pet { display:block; width:100%; height:100%; image-rendering:pixelated; }
  #nameTag  { position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:11px; }

  #stats { margin:6px 0 2px; }
  .stat { display:flex; align-items:center; gap:8px; margin:5px 0; }
  .stat .lab { width:54px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  .track { flex:1; height:11px; position:relative; box-shadow:0 0 0 2px #fff; background:#000; }
  .seg { position:absolute; top:0; bottom:0; left:0; background:#fff; width:50%;
         transition:width .25s steps(10); }
  .track .val { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:7px; letter-spacing:1px; color:#fff; mix-blend-mode:difference; pointer-events:none; }
  .stat.low .seg { animation: blinkfill .6s steps(2) infinite; }
  @keyframes blinkfill { 50% { opacity:.25; } }

  #rpgRow { display:flex; flex-wrap:wrap; justify-content:space-between; gap:3px 8px;
            font-size:8px; letter-spacing:1px; color:var(--dim); margin:6px 0 2px; }
  #rpgRow span { white-space:nowrap; }
  #rpgRow b { color:#fff; font-weight:normal; }

  #questRow { display:flex; justify-content:space-between; align-items:center; gap:8px;
              font-size:8px; letter-spacing:1px; color:var(--dim); margin:8px 0 4px; }
  #questRow #questBiome { color:#fff; }
  #questRow #questProg { color:var(--dim); }
  #questRow #questAge { color:#fff; }

  #cycleRow { display:flex; align-items:center; gap:8px; margin:6px 0 2px; }
  #cycleRow .lab { width:54px; font-size:7px; letter-spacing:1px; color:var(--dim); }
  #cycleSegs { flex:1; display:flex; gap:5px; }
  #cycleSegs .cseg { flex:1; height:10px; box-shadow:0 0 0 2px var(--faint); background:#000; }
  #cycleSegs .cseg.on { background:#fff; box-shadow:0 0 0 2px var(--faint); }
  #cycleAge { font-size:7px; letter-spacing:1px; color:var(--dim); white-space:nowrap; }
  #cycleRow.paused .lab { color:#fff; }

  // ── stat-driven evolution ──
  // At each growth (time-based), the pet's rpg stats decide the next form.
  // Each form lists minimum stats (req). Rare forms need specific high builds and are
  // checked first; if several match a tier, one is chosen at random. A fallback covers
  // any spread that meets nothing.
  var JUNIORS = [   // baby -> junior, by which stat-group leads
    { form:'hoplet',  group:'phys' },   // STR+DEX+END
    { form:'dewdrop', group:'mind' },   // INT+SPI
    { form:'chubbin', group:'wild' }    // LCK / balanced
  ];
  var ADULTS = [
    // apex: the pinnacle - every stat high (checked before everything)
    { form:'godfrog',   apex:true, req:{ str:22, dex:22, end:22, int:22, spi:22, lck:22 } },
    // rare: need two strong stats - checked before commons
    { form:'titan',     rare:true, req:{ str:18, end:18 } },
    { form:'trickster', rare:true, req:{ dex:18, lck:16 } },
    { form:'oracle',    rare:true, req:{ int:18, spi:18 } },
    // common: one leading stat, broad coverage
    { form:'bullhorn',  req:{ str:10 } },
    { form:'dartling',  req:{ dex:10 } },
    { form:'canopy',    req:{ end:10 } },
    { form:'toadsage',  req:{ int:10 } },
    { form:'lotus',     req:{ spi:10 } },
    { form:'clover',    req:{ lck:10 } }
  ];
  var ADULT_FALLBACK = 'springer';   // balanced / no clear build
  function meetsReq(req){ var r=S.rpg; for(var k in req) if((r[k]||0) < req[k]) return false; return true; }
  function pickAdult(){
    var apex=[], rare=[], common=[];
    for(var i=0;i<ADULTS.length;i++){ var a=ADULTS[i];
      if(meetsReq(a.req)){ if(a.apex) apex.push(a.form); else if(a.rare) rare.push(a.form); else common.push(a.form); } }
    var pool = apex.length ? apex : (rare.length ? rare : (common.length ? common : [ADULT_FALLBACK]));
    return pool[(Math.random()*pool.length)|0];
  }
  function pickJunior(){
    var r=S.rpg;
    var phys=(r.str||0)+(r.dex||0)+(r.end||0), mind=(r.int||0)+(r.spi||0), wild=(r.lck||0)*2.2;
    if(wild>=phys && wild>=mind) return 'chubbin';
    return (phys>=mind) ? 'hoplet' : 'dewdrop';
  }

  // ════════ COMBAT: biomes, 32 enemies, spells ════════
  var BIOMES = ["Plains","Forest","Lake","Cavern","Peaks","Abyss","Citadel"];
  var N_BIOMES = 7, N_STAGES = 6, N_TOTAL = N_BIOMES*N_STAGES;   // 42 stages
  var ARCHE = ['slime','bug','bird','beast','fish','golem','wisp','dragon'];
  var ARCHE_NAME = { slime:'Slime', bug:'Beetle', bird:'Lark', beast:'Pup', fish:'Eel', golem:'Golem', wisp:'Wisp', dragon:'Drake' };
  var BIOME_ADJ = ['Field','Bramble','Marsh','Cave','Storm','Ash','Void'];
  // each stage is a gauntlet of COMBAT encounters; count grows +5 per stage: 10,15,20,25,30,35.
  // positive/negative events are interspersed between them (see buildEncounters).
  function battlesFor(stage){ return [10,15,20,25,30,35][stage]; }
  function stageIndex(biome,stage){ return biome*N_STAGES + stage; }
  function isFinalEncounter(biome,stage,battle){ return biome===N_BIOMES-1 && stage===N_STAGES-1 && battle===battlesFor(stage)-1; }

  // enemy stats scale with difficulty tier (biome*6 + stage) plus a small within-stage ramp.
  // tuned so early biomes still take several hits and an under-levelled pet walls (must train more).
  var ENEMY_HP0=90, ENEMY_HP_GROW=1.066, ENEMY_ATK0=10, ENEMY_ATK_GROW=1.090, ENEMY_DEF0=2, ENEMY_DEF_GROW=1.050;
  function enemyAt(biome, stage, battle){
    var nb=battlesFor(stage), di=stageIndex(biome,stage), lvl=di + battle*0.10;
    var arche=ARCHE[(biome*7 + stage*3 + battle*5) % ARCHE.length];
    var sprite=arche + Math.min(3, Math.floor(biome/2));
    var boss=(stage===N_STAGES-1) && (battle===nb-1);
    var hp =Math.round(ENEMY_HP0  * Math.pow(ENEMY_HP_GROW,  lvl));
    var atk=Math.round(ENEMY_ATK0 * Math.pow(ENEMY_ATK_GROW, lvl));
    var def=Math.round(ENEMY_DEF0 * Math.pow(ENEMY_DEF_GROW, lvl));
    var crit=Math.min(0.35, 0.02 + lvl*0.006);
    if(boss){ hp=Math.round(hp*3.2); atk=Math.round(atk*1.25); crit+=0.05; }
    var name=BIOME_ADJ[biome]+' '+ARCHE_NAME[arche];
    if(isFinalEncounter(biome,stage,battle)){ hp=6000; atk=410; def=80; crit=0.15; name='ABYSSAL TYRANT'; boss=true; }
    return { hp:hp, maxHp:hp, atk:atk, def:def, crit:crit, name:name, sprite:sprite, boss:boss, lvl:lvl };
  }
  function biomeUnlocked(b){ return stageIndex(b,0) <= (S.stageProg||0); }
  function stageUnlocked(b,s){ return stageIndex(b,s) <= (S.stageProg||0); }

  // ── encounter list for a stage: combat gauntlet with positive/negative events woven in ──
  // at least one positive per ~4-5 combats; an occasional negative. boss = last combat of stage 6.
  function buildEncounters(biome, stage){
    var combats=battlesFor(stage), bossStage=(stage===N_STAGES-1), arr=[], c=0, sincePos=0, sinceNeg=0;
    while(c<combats){
      if(sincePos>=4){ arr.push({t:'pos'}); sincePos=0; continue; }       // positive every 4 combats
      if(sinceNeg>=7){ arr.push({t:'neg'}); sinceNeg=0; continue; }       // negative every 7 combats
      arr.push({t:'combat', n:c, boss:(bossStage && c===combats-1)});
      c++; sincePos++; sinceNeg++;
    }
    return arr;
  }

  // ── temporary, stage-only buffs (roguelike). live on S.fight.buffs; discarded when the stage ends ──
  function freshBuffs(){ return { atk:1, hp:1, def:1, crit:0, dodge:0, mana:1, haste:0 }; }
  function bfMul(k){ var f=S.fight; return (f&&f.buffs&&f.buffs[k]!=null)?f.buffs[k]:1; }
  function bfAdd(k){ var f=S.fight; return (f&&f.buffs&&f.buffs[k]!=null)?f.buffs[k]:0; }
  function healPet(frac){ S.stats.health=Math.min(maxHP(), S.stats.health+Math.round(maxHP()*frac)); }
  function hurtPetFrac(frac){ S.stats.health=Math.max(1, Math.round(S.stats.health*(1-frac))); }
  // capture what an event actually did (HP/mana deltas + which stage-buffs changed) into a readable list
  function describeEffect(bHP, bMana, bBuffs){
    var parts=[], f=S.fight; if(!f) return parts; var b=f.buffs;
    var dHP=Math.round((S.stats.health||0) - bHP); if(dHP) parts.push((dHP>0?'+':'')+dHP+' HP');
    var dM=Math.round((S.mana||0) - bMana);       if(dM)  parts.push((dM>0?'+':'')+dM+' mana');
    function mul(k,lbl){ if(b[k]!==bBuffs[k]){ var p=Math.round((b[k]/bBuffs[k]-1)*100); if(p) parts.push(lbl+' '+(p>0?'+':'')+p+'%'); } }
    function add(k,lbl){ if(b[k]!==bBuffs[k]){ var p=Math.round((b[k]-bBuffs[k])*100); if(p) parts.push(lbl+' '+(p>0?'+':'')+p+'%'); } }
    mul('atk','ATK'); mul('hp','Max HP'); mul('def','DEF'); mul('mana','Max Mana');
    add('crit','Crit'); add('dodge','Dodge'); add('haste','Atk Spd');
    return parts;
  }

      if(f.approachT<=0){ f.state='fight'; f.eneEnter=1; }
      return;
    }
    if(f.state==='won' || f.state==='lost'){ f.stateT-=dt; if(f.stateT<=0) endFight(); return; }
    if(f.state==='interlude'){ f.stateT-=dt; if(f.stateT<=0) goNext(); return; }
    if(f.state==='eventbanner'){ f.stateT-=dt; if(f.stateT<=0){ f.event=null; goNext(); } return; }
    if(f.state==='event'){ return; }   // waiting for the player's choice (overlay open)
    var e=f.enemy; if(!e) return;
    // our attack (cadence scales with DEX; crit chance=LUCK, crit dmg=DEX)
    f.petTick+=dt;
    if(f.petTick>=petAtkInterval()){
      f.petTick-=petAtkInterval();
      var dmg=Math.max(1, petATK()-e.def), crit=Math.random()<petCritChance();
      if(crit) dmg=Math.round(dmg*petCritMult());
      e.hp-=dmg; f.flashEne=9; f.lunge=1;
      var ls=equipEffect('lifesteal'); if(ls>0){ S.stats.health=Math.min(maxHP(),S.stats.health+Math.round(dmg*ls)); }
      combatLog((crit?'\u2726':'\u00b7')+' '+niceName()+' \u2192 '+dmg+(crit?' CRIT':''));
      blip(crit?900:680,0.04,'square');
      if(e.hp<=0){ winBattle(); return; }
      if(++f.actions>=MAX_COMBAT_ACTIONS){ combatLog('\u231b the fight drags on \u2014 you retreat to recover.'); loseBattle(false); return; }
    }
    // spell (one per round; cycles the loadout; costs mana; small in-combat regen)
    if(S.loadout && S.loadout.length){
      f.spellTick+=dt;
      if(f.spellTick>=SPELL_TICK_MS){
        f.spellTick-=SPELL_TICK_MS;
        S.mana=Math.min(maxMana(), (S.mana||0)+manaRegenRound());
        // damage/heal over time from spells
        if(f.burn && f.burn.rounds>0){ e.hp-=f.burn.dmg; f.flashEne=6; f.burn.rounds--; combatLog('\u2235 burn \u2192 '+f.burn.dmg); if(f.burn.rounds<=0) f.burn=null; if(e.hp<=0){ winBattle(); return; } }
        if(f.regen && f.regen.rounds>0){ var rb=S.stats.health; S.stats.health=Math.min(maxHP(),S.stats.health+f.regen.amt); f.regen.rounds--; if(S.stats.health-rb>0) combatLog('\u2235 regen +'+(S.stats.health-rb)); if(f.regen.rounds<=0) f.regen=null; }
        castNextSpell();
        if(f.state!=='fight') return;
      }
    }
    // boss special attack (dramatic; every ~5s)
    if(e.boss){
      f.specialTick=(f.specialTick||0)+dt;
      if(f.specialTick>=5000){ f.specialTick=0; bossSpecial(f); if(f.state!=='fight') return; }
    }
    // enemy normal attack
    f.eneTick+=dt;
    if(f.eneTick>=ENE_ATK_BASE){ f.eneTick-=ENE_ATK_BASE; enemyStrike(1, false); if(f.state!=='fight') return; }
  }

  function endFight(){
    var f=S.fight; if(!f) return;
    if(f.state==='won'){
      var isFinal=isFinalEncounter(f.biome,f.stage,f.combatsTotal-1);
      var frontier=(stageIndex(f.biome,f.stage)===(S.stageProg||0));
      var di=stageIndex(f.biome,f.stage), base=2+Math.floor(di/6), mult=frontier?1:0.5;
      var picks=2+Math.floor(f.stage/2), gained={};   // longer stages reward a touch more
      for(var i=0;i<picks;i++){ var k=RPG_KEYS[(Math.random()*RPG_KEYS.length)|0], amt=Math.max(1,Math.round(base*mult)); bumpStat(k,amt); gained[k]=(gained[k]||0)+amt; }
      var gt=[]; for(var gk in gained) gt.push([RPG_NAME[gk],gained[gk]]);
      logEvent('\u2605 cleared '+BIOMES[f.biome]+' Stage '+(f.stage+1)+deltaStr(gt));
      if(frontier) S.stageProg=Math.min(N_TOTAL, (S.stageProg||0)+1);
      checkSpells();
      S.fight=null; S.mode='idle';
      if(isFinal){ endGame('win'); return; }
      blip(820,0.1,'sine'); save(); updateControls(); render();
    } else {
      var died=f.died; S.fight=null; S.mode='idle';
      if(died){ die('slain in the '+BIOMES[f.biome]); }
      else { logEvent('\u2620 '+niceName()+' retreated from Stage '+(f.stage+1)+'. heal up and return.'); blip(200,0.16,'sawtooth'); save(); updateControls(); render(); }
    }
  }

  function endGame(result){
    if(S.dead) return;
    S.ended = result;   // 'win' | 'age'
    S.dead = true; S.mode='idle'; S.modeAct=null; S.fight=null; S.critical=null; S.sick=false;
    S.deadCause = result==='win' ? 'defeated the Abyssal Tyrant' : 'old age';
    closeSub();
    if(result==='win'){ logEvent('\u2605\u2605 the ABYSSAL TYRANT falls \u2014 YOU WIN! \u2605\u2605');
      blip(700,0.12); setTimeout(function(){blip(900,0.12);},120); setTimeout(function(){blip(1100,0.18);},240); }
    else { logEvent('\u231b '+niceName()+' grew old and passed on, the quest unfinished.');
      blip(200,0.3,'sawtooth',0.07); }
    updateAlert(); render(); save();
  }

  function checkEvolve(){
    if(S.stage==='egg' && S.age>=EGG_DUR){
      var baby = EGG_TO_BABY[S.eggStyle] || 'padpole';
      evolveTo('baby', baby, true);
      S.age=0;   // age clock starts at birth
      return;
    }
    if(S.stage==='baby' && S.age>=AGE_JUNIOR){
      evolveTo('junior', pickJunior());
    }
    if(S.stage==='junior' && S.age>=AGE_ADULT){
      evolveTo('adult', pickAdult());
    }
  }


  var flashT=0;
  function evolveTo(stage,form,hatched){
    S.stage=stage; S.form=form; flashT=22;
    blip(660,0.12,'triangle',0.07); setTimeout(function(){ blip(880,0.14,'triangle',0.07); },130);
    // apply this form's permanent stat bonus (skip for the egg->baby hatch)
    var bonus = (!hatched && FORM_BONUS[form]) ? FORM_BONUS[form] : null, bparts=[];
    if(bonus){
      if(!S.formBonus) S.formBonus={};
      for(var k in bonus){ S.rpg[k]=(S.rpg[k]||0)+bonus[k]; S.formBonus[k]=(S.formBonus[k]||0)+bonus[k]; bparts.push('+'+bonus[k]+' '+RPG_NAME[k]); }
      S.lastEvoBonus={ form:form, gains:bonus };
      // evolving is a milestone \u2014 top up to the (now larger) HP/mana pools
      S.stats.health=maxHP(); S.mana=maxMana();
      if(typeof checkSpells==='function') checkSpells();   // new stats may unlock spells
    }
    if(hatched){
      setMessage('crack! the egg hatched into '+FORM_NAMES[form]);
      logEvent('the egg hatched into '+niceName()+'! hello!');
    } else {
      setMessage(FORM_NAMES[form]+'! it evolved');
      logEvent('\u2605 evolved into '+niceName()+(bparts.length?' \u2014 gained '+bparts.join(', ')+'!':'!'));
    }
    if(typeof updateControls==='function') updateControls();
    save(); render();
  }
  // ── death ──

  // ── name helpers ──
  function niceName(){ var s=FORM_NAMES[S.form]||'Froggi'; return s.charAt(0)+s.slice(1).toLowerCase(); }
  function fillName(t){ return t.replace(/\{n\}/g, niceName()); }

  // ── event log ──
  function clockNow(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function escHtml(s){ return String(s).replace(/[&<>]/g,function(c){ return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;'; }); }
  function logEvent(msg){
    if(!S.log) S.log=[];
    S.log.unshift({ t:clockNow(), m:msg });
    if(S.log.length>LOG_MAX) S.log.length=LOG_MAX;
    renderLog();

  function renderLog(){
    if(!logEl) return;
    var title=document.querySelector('.logTitle');
    // during a battle, the log section becomes the combat feed (keeps art clear)
    if(S.fight && S.fight.log){
      if(title) title.textContent='BATTLE';
      logEl.classList.add('fight');
      var f=S.fight, lines=f.log;
      if(!lines.length){ logEl.innerHTML='<div class="logRow logEmpty">\u2694 engaging\u2026</div>'; }
      else {
        var hb='';

    }

    var h='';
    for(var i=S.log.length-1;i>=0;i--) h+='<div class="logRow"><span class="logT">'+S.log[i].t+'</span>'+escHtml(S.log[i].m)+'</div>';

  // ── alert / critical UI ──

  function resolveCritical(){   // sick-only now (medicine)
    if(!S.critical || S.critical.kind!=='sick') return;
    var c=S.critical, s=S.stats;
    S.sick=false; S.sickT=0;

  function checkCritical(){
    if(S.dead||!S.critical) return;
    if(Date.now()>S.critical.deadline){
      if(S.critical.kind==='sick'){ die(S.critical.cause); }
      else { var ev=S.critical.ev; S.critical=null; logEvent('\u23F1 too slow!'); applyQteResult(ev.to); updateAlert(); save(); }
    }
  }

  // format a list of [LABEL, delta] into "  (+12 FULL, -8 HP)"
  function deltaStr(changes){
    if(!changes) return '';
    var p=[]; for(var i=0;i<changes.length;i++){ var c=changes[i]; if(c[1]) p.push((c[1]>0?'+':'')+c[1]+' '+c[0]); }
    return p.length ? '  ('+p.join(', ')+')' : '';
  }
  function applyQteResult(r){
    r=r||{}; var s=S.stats, changes=[];
    if(r.win){ var heal=Math.round(maxHP()*0.08); s.health=hpClamp(s.health+heal); }
    if(r.hp){ s.health=hpClamp(s.health+r.hp); changes.push(['HP',r.hp]); }
    var enD=(r.full||0)+(r.energy||0); if(enD){ s.energy=clamp((s.energy||0)+enD); changes.push(['ENERGY',enD]); }
    if(r.mana){ S.mana=Math.min(maxMana(),(S.mana||0)+r.mana); changes.push(['MANA',r.mana]); }
    if(r.stat){ for(var k in r.stat){ bumpStat(k, r.stat[k]); changes.push([RPG_NAME[k]||k.toUpperCase(), r.stat[k]]); } }
    var icon = r.die ? '\u2620 ' : (r.bad ? '\u2639 ' : ((r.good||r.win) ? '\u2728 ' : '\u2022 '));
    var msg = r.log ? fillName(r.log) : '';
    if(msg || changes.length) logEvent(icon+(msg||niceName())+deltaStr(changes));
    if(r.die){ blip(160,0.3,'sawtooth',0.07); react={type:'tired',t:30}; setMessage(msg||'oh no...'); die(r.die); return; }
    if(r.bad){ blip(200,0.14,'sawtooth'); react={type:'tired',t:30}; }
    else if(r.good||r.win){ blip(740,0.07); setTimeout(function(){blip(960,0.08);},80); react={type:'play',t:30}; }
    else { blip(440,0.05,'triangle'); }
    setMessage(msg||'');
    if(s.health<=0){ die('its injuries'); }
  }
  function resolveQte(r){
    if(!S.critical || S.critical.kind!=='qte') return;
    S.critical=null;
    applyQteResult(r);
    updateAlert(); save();
  }
  function renderQteButtons(ev){
    if(!qteBtns) return;
    qteBtns.innerHTML='';
    ev.opts.forEach(function(opt){
      var b=document.createElement('button'); b.className='pixbtn alert'; b.textContent=opt.b;
      b.addEventListener('click',function(){
        if(S.dead || !S.critical || S.critical.kind!=='qte') return;
        if(actx && actx.state==='suspended') actx.resume();
        resolveQte(opt.r);
      });
      qteBtns.appendChild(b);
    });
  }


  // ── random events ──
  function rand(a,b){ return a+Math.random()*(b-a); }

  function applyStatEvent(e){
    var s=S.stats, net=0, changes=[];
    var enD=(e.full||0)+(e.energy||0);   // food/energy events -> energy stat
    if(enD){ s.energy=clamp((s.energy||0)+enD); net+=enD; changes.push(['ENERGY',enD]); }
    if(e.health){ s.health=hpClamp(s.health+e.health); net+=e.health; changes.push(['HP',e.health]); }
    if(e.mana){ S.mana=Math.min(maxMana(),Math.max(0,(S.mana||0)+e.mana)); net+=e.mana; changes.push(['MANA',e.mana]); }
    var m=fillName(e.msg); setMessage(m); logEvent(m+deltaStr(changes));
    blip(net>=0?500:200,0.06,'triangle'); save();
  }

  function applyModEvent(e){
    var m=e.mod, mod={ cyc:m.cyc||3 };
    if(m.health) mod.health=m.health;
    var enD=(m.full||0)+(m.energy||0); if(enD) mod.energy=enD;
    if(m.mana) mod.mana=m.mana;
    S.mods.push(mod);
    var parts=[];
    if(mod.energy) parts.push((mod.energy>0?'+':'')+mod.energy+' ENERGY');
    if(mod.mana) parts.push((mod.mana>0?'+':'')+mod.mana+' MANA');
    if(m.health) parts.push((m.health>0?'+':'')+m.health+' HP');
    var tail = parts.length ? '  ('+parts.join(', ')+'/cycle \u00d7'+mod.cyc+')' : '';
    var t=fillName(e.msg); setMessage(t); logEvent(t+tail);
    blip(440,0.06,'triangle'); save();
  }

  function startSickEvent(){
    var e=SICK_EVENTS[(Math.random()*SICK_EVENTS.length)|0];
    S.sick=true;
    S.critical={ kind:'sick', cause:e.cause, deadline:Date.now()+SICK_DEADLINE };
    var m=fillName(e.msg); setMessage(m); logEvent('\u26A0 '+m);
    blip(160,0.2,'sawtooth',0.07); flashT=22; updateAlert(); save();
  }

  function startQTE(){
    var ev = QTE_EVENTS[(Math.random()*QTE_EVENTS.length)|0];
    var time = ev.time || QTE_DEADLINE;
    S.critical = { kind:'qte', ev:ev, flash:fillName(ev.msg), deadline:Date.now()+time };
    var m=fillName(ev.msg); setMessage(m); logEvent('\u26A0 '+m);
    blip(900,0.08,'square',0.08); setTimeout(function(){ blip(900,0.08,'square',0.08); },150);
    flashT=22; renderQteButtons(ev); updateAlert(); save();
  }

  // an ambient event may fire on an age tick
  function fireCycleEvent(){
    if(S.dead||S.stage==='egg'||S.fight) return;
    var busy = S.critical;
    var r=Math.random();
    if(!busy && S.age>3 && r<0.07){ startSickEvent(); return; }
    if(!busy && S.age>3 && r<0.13){ startQTE(); return; }
    if(r<0.30){ applyModEvent(MOD_EVENTS[(Math.random()*MOD_EVENTS.length)|0]); return; }
    if(r<0.62){ applyStatEvent(STAT_EVENTS[(Math.random()*STAT_EVENTS.length)|0]); return; }
    logEvent(fillName(IDLE[(Math.random()*IDLE.length)|0]));   // flavor beat
  }

  var ageAcc=0;   // ms into the current age tick
  function resetEventTimers(){ ageAcc=0; actAcc=0; S.mods=[]; }

  var react=null;          // transient anim state

  function act(kind){
    if(S.dead){ return; }
    if(S.stage==='egg'){ setMessage("it's still an egg \u2014 give it time to hatch"); return; }
    if(actx && actx.state==='suspended') actx.resume();
    var s=S.stats;
    // picker selections (buttons morphed into drills / rest options)
    if(kind && kind.indexOf('t:')===0){ trainOnce(kind.slice(2)); pickerMode='none'; renderActions(true); return; }
    if(kind==='r:heal'){ restOnce('heal'); pickerMode='none'; renderActions(true); return; }
    if(kind==='r:energy'){ restOnce('energy'); pickerMode='none'; renderActions(true); return; }
    if(kind==='back'){ pickerMode='none'; renderActions(true); return; }
    // open a picker on the buttons
    if(kind==='train'){ pickerMode='train'; renderActions(true); return; }
    if(kind==='rest'){ pickerMode='rest'; renderActions(true); return; }
    // overlay panels (toggle closed if already open)
    var openK = overlayEl.classList.contains('open') ? ovKind : null;
    var closes = (kind==='explore' && (openK==='biomes'||openK==='stages')) ||
                 (kind==='spells' && openK==='spells') || (kind==='status' && openK==='status') ||
                 (kind==='inventory' && openK==='inventory');
    if(closes){ closeOverlay(); return; }
    if(kind==='explore'){
      if(S.stage==='baby'){ setMessage('too young to explore \u2014 grow up first'); return; }
      openBiomes(); return;
    }
    if(kind==='spells'){ openSpells(); return; }
    if(kind==='status'){ openStatus(); return; }
    if(kind==='inventory'){ openInventory(); return; }
    if(kind==='heal'){
      if(S.critical && S.critical.kind==='sick'){ resolveCritical(); return; }
      s.health=Math.min(maxHP(),s.health+20); s.energy=clamp((s.energy||0)+12);
      S.sickT=Math.max(0,S.sickT-180);
      react={type:'rest',t:30}; blip(520,0.1,'sine'); setMessage('feeling a little better');
      logEvent(niceName()+' took some medicine.'); updateAlert(); save(); return;
    }
  }

  // ── egg: rhythmic tapping to hatch (mash too fast and it shatters) ──
  var eggTapLast=0, eggCrack=0, eggWobble=0, eggPulse=0;
  function eggTap(){
    if(S.dead || S.stage!=='egg') return;
    if(actx && actx.state==='suspended') actx.resume();
    var now=performance.now();
    var dt = eggTapLast ? (now-eggTapLast) : 9999;
    eggTapLast=now; eggWobble=7;
    if(dt < EGG_TAP_SHATTER){ eggCrack = EGG_CRACK_MAX; }
    else if(dt < EGG_TAP_MIN){ eggCrack += 2; blip(240,0.06,'sawtooth'); }
    else if(dt < 340){ eggCrack += 1; blip(320,0.05,'sawtooth'); }
    else {
      S.age = Math.min(EGG_DUR, S.age + EGG_TAP_BOOST);   // good tap: speed up hatching
      eggCrack = Math.max(0, eggCrack-1);                  // careful spacing lets cracks settle
      eggPulse = 6; blip(560 + (S.age/EGG_DUR)*300, 0.05, 'square');
    }
    if(eggCrack >= EGG_CRACK_MAX){
      flashT=22; logEvent('\u2620 the egg cracked \u2014 you tapped too hard!');
      die('a shell cracked from impatient tapping'); render(); return;
    }
    if(S.age>=EGG_DUR){ checkEvolve(); }   // taps filled the meter -> hatch now
    save(); render();
  }
  function drawEggCracks(box){
    if(!eggCrack || !box) return;
    pctx.strokeStyle='#000'; pctx.lineWidth=2;
    var n=Math.min(EGG_CRACK_MAX, eggCrack);
    for(var i=0;i<n;i++){
      var sxp=box.ox+box.w*(0.28+0.16*i), sy=box.oy+box.h*0.18, d=(i%2?1:-1);
      pctx.beginPath(); pctx.moveTo(sxp, sy);
      pctx.lineTo(sxp+6*d, sy+box.h*0.26);
      pctx.lineTo(sxp-4*d, sy+box.h*0.5);
      pctx.lineTo(sxp+7*d, sy+box.h*0.72);
      pctx.stroke();
    }
    pctx.lineWidth=1;
  }

  function bumpStat(stat,amt){ S.rpg[stat]=Math.max(1,Math.min(999,(S.rpg[stat]||0)+amt)); if(S.stage!=='egg') checkSpells(); }

  // ── control area: actions / submenu / qte / sick ──
  var subMode=null;   // 'play' | 'train' | null

    b.addEventListener('click',onclick); return b;
  }
  function ovActionRow(label, sub, onclick){

    row.addEventListener('click', onclick); return row;

    TRAIN.forEach(function(a){
      ovBody.appendChild(ovActionRow(a.label+'  +'+a.gain+' '+RPG_NAME[a.stat], 'costs '+a.eCost+' energy \u00b7 1 segment', function(){

  function closeSub(){ subMode=null; if(subPicker) subPicker.innerHTML=''; }
  function openRest(){
    openOverlay('REST  ('+(S.seg||0)+'/'+SEGMENTS+')','rest');

  function blitMap(map, ox, oy, unit, eatenFrac){
    var H=map.length, W=map[0].length;
    var cut = eatenFrac ? Math.floor(W*(1-eatenFrac)) : W; // bites eat from the right
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<cut;x++)
      if(map[y][x]==='#') pctx.fillRect(Math.round(ox+x*unit),Math.round(oy+y*unit),Math.ceil(unit),Math.ceil(unit));
  }

  function drawSprite(form, offY, sq, xc, flip){
    var rows=SPR[form], H=rows.length, W=rows[0].length;
    var unit=Math.max(2,Math.floor((ch*PET_SCALE)/H));
    var sx=unit, sy=unit;
    if(sq){ sy=unit*sq; sx=unit*(1+(1-sq)*0.6); }
    var totalW=W*sx, totalH=H*sy, floorY=ch*0.82;
    if(xc==null) xc=cw/2;
    var ox=xc-totalW/2, oy=floorY-totalH+offY;
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++){
      var src = flip ? (W-1-x) : x;
      if(rows[y][src]==='#') pctx.fillRect(Math.round(ox+x*sx),Math.round(oy+y*sy),Math.ceil(sx),Math.ceil(sy));
    }
    return { ox:ox, oy:oy, w:totalW, h:totalH, unit:unit, floorY:floorY };
  }

  // poops sit spread along the floor, two on each side of the (centered) pet
  function poopSlotX(){ return [ cw*0.13, cw*0.30, cw*0.70, cw*0.87 ]; }

  // a wavy "smell" squiggle rising from (baseX, baseY)
  function drawSmell(baseX, baseY, height, amp, phase, alpha){
    pctx.fillStyle='#fff';
    for(var y=0; y<height; y+=3){
      var prog=y/height;
      pctx.globalAlpha = alpha*(1-prog*0.7);
      var wob=Math.sin((y*0.5) + phase + animT*0.006)*amp*(0.4+prog);
      pctx.fillRect(Math.round(baseX+wob), Math.round(baseY-y), 2,2);
    }
  }
  function drawPoops(box){
    var floorY=box.floorY, unit=2, sx=poopSlotX();
    var pw=POOP[0].length*unit;
    for(var i=0;i<S.poops.length;i++){
      var p=S.poops[i], cx=(sx[p.slot]!=null?sx[p.slot]:sx[0]);
      var bx=Math.round(cx-pw/2), by=floorY-POOP.length*unit;
      var overdue = p.age>POOP_SICK_TIME;
      // smell lines radiating up - always visible, wilder when overdue
      var topY=by-2, amp=overdue?3:2, alpha=overdue?0.5:0.32, hgt=overdue?20:13;
      drawSmell(cx-4, topY, hgt, amp, p.slot*1.7,      alpha);
      drawSmell(cx,   topY+2, hgt+3, amp, p.slot*1.7+2, alpha);
      drawSmell(cx+4, topY, hgt, amp, p.slot*1.7+4,    alpha);
      // the poop itself
      pctx.globalAlpha = overdue ? (0.5+0.5*Math.abs(Math.sin(animT*0.006))) : 1;
      blitMap(POOP, bx, by, unit, 0);
      if(overdue){ // extra bad-stink puffs
        pctx.globalAlpha=0.55;
        var ph=(animT*0.05)%7;
        pctx.fillRect(Math.round(cx-6), Math.round(by-8-ph), 2,2);
        pctx.fillRect(Math.round(cx+6), Math.round(by-13-ph), 2,2);
      }
    }
    pctx.globalAlpha=1;
  }

  function drawGrave(){
    var rows=GRAVE, H=rows.length, W=rows[0].length;
    var unit=Math.max(3,Math.floor((ch*0.5)/H));
    var tw=W*unit, th=H*unit;
    var ox=(cw-tw)/2, oy=ch*0.80-th;
    blitMap(rows, ox, oy, unit, 0);
  }

  // draw an arbitrary sprite grid centered at xc (used for battle scenes)
  function drawCreature(rows, xc, offY, scale, flip){
    var H=rows.length, W=rows[0].length;
    var unit=Math.max(2,Math.floor((ch*(PET_SCALE*(scale||1)))/H));
    var totalW=W*unit, totalH=H*unit, floorY=ch*0.82;
    var ox=xc-totalW/2, oy=floorY-totalH+(offY||0);
    pctx.fillStyle='#fff';
    for(var y=0;y<H;y++) for(var x=0;x<W;x++){ var src=flip?(W-1-x):x;
      if(rows[y][src]==='#') pctx.fillRect(Math.round(ox+x*unit),Math.round(oy+y*unit),Math.ceil(unit),Math.ceil(unit)); }
    return { ox:ox, oy:oy, w:totalW, h:totalH, cx:xc, cy:oy+totalH/2 };
  }
  function drawBar(x,y,w,frac,dim){
    frac=Math.max(0,Math.min(1,frac));
    pctx.strokeStyle='rgba(255,255,255,0.55)'; pctx.lineWidth=1;
    pctx.strokeRect(Math.round(x)+0.5, Math.round(y)+0.5, Math.round(w), 5);
    pctx.fillStyle=dim?'rgba(255,255,255,0.45)':'#fff';
    pctx.fillRect(Math.round(x), Math.round(y), Math.round(w*frac), 6);
  }
  // ── biome backdrops: parallax 1-bit silhouettes (trees, cactus, towers, clouds, lightning…) ──
  function bHash(n){ n=(n*2654435761)>>>0; n^=n>>>13; n=(n*1597334677)>>>0; return (n>>>0)/4294967295; }
  function pyr(cx,baseY,halfW,h,up){ var step=2, rows=Math.max(2,Math.round(h/step));
    for(var i=0;i<rows;i++){ var fr=i/rows, hw=halfW*(1-fr), yy=up?baseY-i*step:baseY+i*step;
      pctx.fillRect(Math.round(cx-hw),Math.round(yy),Math.max(1,Math.round(hw*2)),step+1); } }
  function bdCloud(x,y,s){ x=Math.round(x); y=Math.round(y); var w=16*s;
    pctx.fillRect(x,y,w,4); pctx.fillRect(x+4,y-3,w-8,4); pctx.fillRect(x+2,y+3,w-2,3); }
  function bdTree(x,gy,s){ pctx.fillRect(Math.round(x-1),Math.round(gy-7*s),3,7*s);   // pine
    pyr(x,gy-6*s,8*s,9*s,true); pyr(x,gy-12*s,6*s,8*s,true); pyr(x,gy-18*s,4*s,6*s,true); }
  function bdCactus(x,gy,s){ var h=18*s; pctx.fillRect(Math.round(x-2),Math.round(gy-h),4,h);
    pctx.fillRect(Math.round(x-2-5),Math.round(gy-h*0.7),3,h*0.4); pctx.fillRect(Math.round(x-2-5),Math.round(gy-h*0.7),5,3);
    pctx.fillRect(Math.round(x+2+3),Math.round(gy-h*0.55),3,h*0.3); pctx.fillRect(Math.round(x+2),Math.round(gy-h*0.55),5,3); }
  function bdTower(x,gy,s){ var w=12*s,h=34*s; pctx.fillRect(Math.round(x-w/2),Math.round(gy-h),w,h);
    for(var c=0;c<3;c++) pctx.fillRect(Math.round(x-w/2+c*w/2.4),Math.round(gy-h-4),3,4);   // crenellations
    pctx.fillStyle='#000'; pctx.fillRect(Math.round(x-2),Math.round(gy-h*0.6),4,5); pctx.fillStyle='#fff'; }
  function bdReed(x,gy,s){ for(var r=0;r<3;r++) pctx.fillRect(Math.round(x+r*3-3),Math.round(gy-(8+r%2*4)*s),1,(8+r%2*4)*s); }
  function bdMtn(x,gy,s){ pyr(x,gy,26*s,30*s,true); pctx.fillStyle='#000'; pyr(x+2,gy-22*s,5*s,6*s,true); pctx.fillStyle='#fff'; }
  function bdSpire(x,gy,s){ pyr(x,gy,5*s,40*s,true); }
  function drawBackdrop(biome, scroll){
    var gy=Math.round(ch*0.82), W=cw, near=scroll, far=scroll*0.4;
    // ground line
    pctx.fillStyle='rgba(255,255,255,0.45)'; pctx.fillRect(0,gy,W,1);
    // far/sky layer
    pctx.globalAlpha=0.32; pctx.fillStyle='#fff';
    if(biome===4){ for(var m=-1;m<4;m++){ var mx=((m*120 - far*0.5)%(W+240)+W+240)%(W+240)-120; bdMtn(mx,gy,1+bHash(m+1)*0.5); } }
    if(biome===5){ for(var st=0;st<22;st++){ var s2=bHash(st*3+1); var sx=((st*70 - far*0.6)%(W+140)+W+140)%(W+140)-70; pctx.fillRect(Math.round(sx),Math.round(8+s2*60),2,2); } }
    if(biome!==3 && biome!==5){ for(var c=0;c<4;c++){ var cs=0.7+bHash(c*5+2)*0.8; var cx2=((c*110 - far)%(W+220)+W+220)%(W+220)-110; bdCloud(cx2, 12+bHash(c+9)*30, cs); } }
    if(biome===3){ for(var sl=0;sl<7;sl++){ var sx2=((sl*55 - far*0.7)%(W+110)+W+110)%(W+110)-55; pyr(sx2, 0, 6+bHash(sl)*5, 10+bHash(sl+3)*10, false); } }
    if(biome===6){ // lightning flashes occasionally
      pctx.globalAlpha=(Math.floor(animT/90)%17===0)?0.8:0.0;
      var lx=W*0.6; pctx.fillRect(lx,0,2,18); pctx.fillRect(lx-5,16,9,2); pctx.fillRect(lx-4,18,2,16); }
    pctx.globalAlpha=1;
    // near/ground layer (biome props)
    var spacing=78, type;
    for(var i=-1;i<Math.ceil(W/spacing)+2;i++){
      var slot=i, hx=bHash(slot*7+biome*13);
      var bx=((slot*spacing - near)%(W+spacing*2)+(W+spacing*2))%(W+spacing*2)-spacing;
      var s=0.85+hx*0.5;
      if(biome===0){ if(hx>0.55) bdTree(bx,gy,s*0.8); else { pctx.fillRect(Math.round(bx-4),gy-3,2,3); pctx.fillRect(Math.round(bx),gy-5,2,5); pctx.fillRect(Math.round(bx+4),gy-3,2,3); } }
      else if(biome===1){ bdTree(bx,gy,s); }
      else if(biome===2){ if(hx>0.5) bdReed(bx,gy,s); else pctx.fillRect(Math.round(bx-6),gy-2,12,2); }
      else if(biome===3){ pyr(bx,gy,5+hx*5,7+hx*8,true); }   // stalagmites
      else if(biome===4){ if(hx>0.6){ pctx.fillStyle='#fff'; pyr(bx,gy,7,11,true);} else pctx.fillRect(Math.round(bx-5),gy-3,10,3); }
      else if(biome===5){ if(hx>0.45) bdSpire(bx,gy,s*0.7); else { pctx.fillRect(Math.round(bx-6),gy-8*s,12,7); } }   // spires + floating rock
      else if(biome===6){ if(hx>0.4) bdTower(bx,gy,s); else { pctx.fillRect(Math.round(bx-5),gy-12*s,10,12*s); } }
    }
  }

  // dramatic combat FX (boss specials) drawn over the scene
  function drawFx(f, petX, eneX, gy){
    var fx=f.fx; if(!fx) return; var p=1-Math.max(0,fx.t)/fx.dur;   // 0..1 progress
    pctx.fillStyle='#fff';
    if(fx.type==='laser'){
      // charging dot -> beam sweeping from boss to pet
      var by=gy-22;
      if(p<0.4){ var r=2+Math.sin(animT*0.05)*2; pctx.fillRect(Math.round(eneX-r), Math.round(by-r), r*2, r*2); }
      else { var w=(eneX-petX); var th=Math.max(2, 10*(1-Math.abs(p-0.7)/0.3));
        if(Math.floor(animT/40)%2===0){ pctx.fillRect(Math.round(petX), Math.round(by-th/2), Math.round(w), th); }
        // muzzle flare
        for(var s=0;s<5;s++){ var a=Math.random()*6.28, d=Math.random()*10; pctx.fillRect(Math.round(petX+Math.cos(a)*d), Math.round(by+Math.sin(a)*d),2,2); } }
    } else if(fx.type==='meteor'){
      // a big rock falls from the top onto the pet, then impact burst
      if(p<0.7){ var my=(-30)+(gy-30)*(p/0.7), mr=6+p*4;
        for(var yy=-mr;yy<mr;yy++) for(var xx=-mr;xx<mr;xx++){ if(xx*xx+yy*yy<=mr*mr) pctx.fillRect(Math.round(petX+xx),Math.round(my+yy),1,1); }
        // trail
        pctx.globalAlpha=0.4; pctx.fillRect(Math.round(petX-2), Math.round(my-mr-10), 4, 10); pctx.globalAlpha=1;
      } else { var br=(p-0.7)/0.3*30;   // shockwave ring
        pctx.globalAlpha=1-(p-0.7)/0.3;
        for(var k=0;k<14;k++){ var ang=k/14*6.28; pctx.fillRect(Math.round(petX+Math.cos(ang)*br), Math.round(gy-3+Math.sin(ang)*br*0.4),2,2); }
        pctx.globalAlpha=1; }
    } else if(fx.type==='quake'){
      // rising debris around the pet
      for(var q=0;q<10;q++){ var qx=petX-20+q*4, qh=Math.abs(Math.sin(p*3.14+q))*14; pctx.fillRect(Math.round(qx), Math.round(gy-qh), 2, qh); }
    } else if(fx.type==='nova'){
      var nr=p*46; pctx.globalAlpha=1-p; pctx.lineWidth=2; pctx.strokeStyle='#fff';
      pctx.beginPath(); pctx.arc(eneX, gy-16, nr, 0, 6.28); pctx.stroke(); pctx.globalAlpha=1;
    }
  }

  function drawFight(){
    var f=S.fight; if(!f) return;
    var scroll = (f.travelX||0)*0.5 + (f.scroll||0)*0.015;
    drawBackdrop(f.biome, scroll);
    var gy=Math.round(ch*0.82);
    var bob=Math.sin(animT*0.02)*2;
    var petRows=SPR[S.form]||SPR.springer;
    var petFlash=f.flashPet>0, blinkP=petFlash && (Math.floor(animT/55)%2===0);
    var petX=cw*0.30 + Math.max(0,f.lunge||0)*22;

    // ── EVENT scenes (positive/negative): show the pet alone + the event text ──
    if(f.state==='event' || f.state==='eventbanner'){
      var ev=f.event||{};
      if(!blinkP) drawCreature(petRows, cw*0.5, bob-(petFlash?3:0), 0.5, false);
      pctx.fillStyle='#fff'; pctx.textAlign='center';
      pctx.font='9px "Pixel",monospace';
      pctx.fillText((ev.kind==='neg'?'\u2620 ':'\u2726 ')+(ev.title||'').toUpperCase(), cw*0.5, 18);
      pctx.font='7px "Pixel",monospace'; pctx.fillStyle='rgba(255,255,255,0.85)';
      wrapText(ev.text||'', cw*0.5, 30, cw*0.84, 9);
      // chosen option + the concrete result (so you see what actually happened)
      if(ev.chosenLabel){ pctx.fillStyle='rgba(255,255,255,0.7)'; pctx.font='7px "Pixel",monospace'; pctx.fillText('\u2192 '+ev.chosenLabel, cw*0.5, ch-42); }
      if(ev.result && ev.result.length){
        pctx.fillStyle='#fff'; pctx.font='9px "Pixel",monospace';
        pctx.fillText(ev.result.join('   '), cw*0.5, ch-28);
      } else if(f.state==='eventbanner'){
        pctx.fillStyle='rgba(255,255,255,0.6)'; pctx.font='7px "Pixel",monospace';
        pctx.fillText('(no effect)', cw*0.5, ch-28);
      }
      drawBar(cw*0.30, ch-14, cw*0.4, (S.stats.health||0)/maxHP());
      pctx.textAlign='left'; return;
    }

    var e=f.enemy; if(!e){ if(!blinkP) drawCreature(petRows, cw*0.5, bob, 0.5, false); return; }
    var approaching = f.state==='approach';
    var lunge=Math.max(0,f.lunge||0), eLunge=Math.max(0,f.eneLunge||0);
    var shake = (f.fx && f.fx.type==='quake') ? Math.sin(animT*0.5)*3 : 0;
    var enter = approaching ? (1-Math.pow(1-Math.min(1,f.eneEnter||0),2)) : 1;
    var pX=cw*0.30 + lunge*22;
    var eneX=cw*0.70 - eLunge*26 + (1-enter)*(cw*0.55);
    var eneFlash=f.flashEne>0;
    var hop = approaching ? -Math.abs(Math.sin(animT*0.022))*9 : bob;
    var eneRows=ENE_SPR[e.sprite]||ENE_SPR.slime0;
    var blinkE=eneFlash && (Math.floor(animT/55)%2===0);
    var eScale = isFinalEncounter(f.biome,f.stage,f.combatNo) ? 1.0 : (e.boss ? 0.82 : 0.5);
    pctx.save(); if(shake) pctx.translate(shake,0);
    if(!blinkP) drawCreature(petRows, pX, hop-(petFlash?3:0), 0.5, false);
    if(enter>0.02 && !blinkE) drawCreature(eneRows, eneX, -bob-(eneFlash?3:0), eScale, true);
    drawFx(f, pX, eneX, gy);
    pctx.restore();
    // header
    pctx.fillStyle='#fff'; pctx.textAlign='center'; pctx.font='8px "Pixel",monospace';
    pctx.fillText('STAGE '+(f.stage+1)+'  \u00b7  FOE '+(f.combatNo+1)+'/'+f.combatsTotal, cw*0.5, 11);
    pctx.fillText((e.boss?'\u2605 ':'')+e.name.toUpperCase(), cw*0.5, 22);
    // bars
    drawBar(cw*0.06, 28, cw*0.37, (S.stats.health||0)/maxHP());
    drawBar(cw*0.06, 38, cw*0.37, (S.mana||0)/maxMana(), true);
    if(!approaching) drawBar(cw*0.57, 28, cw*0.37, Math.max(0,e.hp)/e.maxHp);
    if(f.shield>0){ pctx.font='7px "Pixel",monospace'; pctx.fillText('\u25C7 shield x'+f.shield, cw*0.245, 52); }
    if(approaching){
      pctx.fillStyle='#fff'; pctx.font='9px "Pixel",monospace'; pctx.textAlign='center';
      pctx.fillText(e.boss?'\u2605 A BOSS APPROACHES':'\u2192 traveling\u2026', cw*0.5, ch*0.5);
    } else if(f.state==='won'||f.state==='lost'||f.state==='interlude'){
      pctx.fillStyle='rgba(0,0,0,0.55)'; pctx.fillRect(0, ch*0.44, cw, 24);
      pctx.fillStyle='#fff'; pctx.font='11px "Pixel",monospace'; pctx.textAlign='center';
      var txt = f.state==='won'?'STAGE CLEAR!' : f.state==='lost'?(f.died?'DEFEATED':'RETREAT!') : 'ONWARD\u2026';
      pctx.fillText(txt, cw*0.5, ch*0.44+17);
    }
    pctx.textAlign='left';
  }
  function wrapText(txt, cx, y, maxW, lh){
    var words=String(txt).split(' '), line='', yy=y;
    for(var i=0;i<words.length;i++){ var test=line?line+' '+words[i]:words[i];
      if(pctx.measureText(test).width>maxW && line){ pctx.fillText(line, cx, yy); line=words[i]; yy+=lh; }
      else line=test; }
    if(line) pctx.fillText(line, cx, yy);
  }

  function fmtMs(ms){ var s=Math.ceil(ms/1000);
    if(s>=60){ var m=Math.floor(s/60); return m+':'+('0'+(s%60)).slice(-2); } return s+'s'; }

  function drawZzz(box){
    pctx.fillStyle='rgba(255,255,255,0.7)';
    var bx=box.ox+box.w+2, by=box.oy+8, ph=(animT*0.04)%3;
    pctx.fillRect(bx, by-ph*3, 3,3);
    pctx.fillRect(bx+6, by-9-ph*3, 3,3);
    pctx.fillRect(bx+12, by-18-ph*3, 3,3);
  }

  // ── activity animations (train + play) ──
  function activityMotion(anim,t){
    var o={ offY:Math.sin(t*2.2)*2, sq:1, shakeX:0, flip:null };
    switch(anim){
      case 'lift':     var lp=Math.abs(Math.sin(t*3.4)); o.offY=-lp*7; o.sq=0.82+lp*0.18; break;
      case 'dash':     o.shakeX=Math.sin(t*3.0)*(cw*0.27); o.offY=-Math.abs(Math.sin(t*20))*3; o.sq=0.96; o.flip=Math.cos(t*3.0)<0; break;
      case 'endure':   var ep=(t%1.5)/1.5;
                       if(ep<0.42){ o.sq=1; o.offY=0; }
                       else if(ep<0.56){ o.sq=0.5; o.offY=7; }          // squished flat under the rock
                       else { o.sq=1.04; o.offY=-3-(ep-0.56)*5; }       // push back up
                       break;
      case 'study':    o.offY=Math.sin(t*2)*1.5; o.sq=0.99; break;
      case 'meditate': o.offY=-7+Math.sin(t*2)*2; o.sq=0.97; break;
      case 'forage':   o.shakeX=Math.sin(t*3)*7; o.offY=-Math.abs(Math.sin(t*6))*5; break;
      case 'wrestle':  o.shakeX=Math.sin(t*16)*4; o.offY=Math.sin(t*8)*2; o.sq=0.93; break;
      case 'tag':      o.shakeX=Math.sin(t*14)*5; o.offY=-Math.abs(Math.sin(t*7))*5; break;
      case 'fetch':    o.shakeX=Math.sin(t*6)*8; o.offY=-Math.abs(Math.sin(t*6))*5; break;
      case 'puzzle':   o.offY=Math.sin(t*2.6)*2; break;
      case 'sing':     o.offY=Math.sin(t*4)*3; o.sq=0.96; break;
      case 'explore':  o.offY=Math.sin(t*3)*2; o.shakeX=Math.sin(t*1.5)*3; break;
    }
    return o;
  }
  function px(x,y,w,h){ pctx.fillRect(Math.round(x),Math.round(y),w||2,h||2); }
  function blob(x,y,r){ for(var yy=-r;yy<=r;yy++){ var w=Math.floor(Math.sqrt(Math.max(0,r*r-yy*yy))); if(w>0) pctx.fillRect(Math.round(x-w),Math.round(y+yy),w*2,1); } }
  function drawBush(x,fy){ pctx.fillStyle='#fff'; var by=fy-6; blob(x,by-3,7); blob(x-7,by,5); blob(x+7,by,5); pctx.fillStyle='#000'; px(x-4,by-2,2,2); px(x+3,by,2,2); pctx.fillStyle='#fff'; px(x-1,fy-3,2,3); }
  function drawNote(x,y){ pctx.fillStyle='#fff'; px(x,y,2,5); px(x-2,y+4,4,2); }
  function drawActivity(anim,box,t){
    pctx.save();
    var cx=box.ox+box.w/2, top=box.oy, rgt=box.ox+box.w, lft=box.ox;
    pctx.fillStyle='#fff';
    var p=(animT*0.05)%10;
    switch(anim){
      case 'lift': {  // a dumbbell pressed overhead, moving up and down
        var lp=Math.abs(Math.sin(t*3.4)), bw=box.w*0.95, dy=top-7-lp*9, dcx=cx;
        pctx.fillRect(Math.round(dcx-bw/2), Math.round(dy), Math.round(bw), 3);          // bar
        pctx.fillRect(Math.round(dcx-bw/2-5), Math.round(dy-5), 5, 13);                  // left weight
        pctx.fillRect(Math.round(dcx+bw/2),    Math.round(dy-5), 5, 13);                  // right weight
        pctx.globalAlpha=0.8; px(lft-5, top+3+Math.sin(t*3.4)*2,2,2); px(rgt+4, top+3+Math.sin(t*3.4)*2,2,2);
        break; }
      case 'dash': {  // motion streaks trailing the sweep
        var dir = Math.cos(t*3.0) < 0 ? 1 : -1;   // trail behind the direction of travel
        pctx.globalAlpha=0.5;
        for(var i=0;i<6;i++){ var sx=cx + dir*(box.w*0.55 + i*7); px(sx, box.oy+box.h*0.3+i*3, 6,2); }
        break; }
      case 'endure': {  // a boulder falls, squishes the pet, then gets flung away
        var ep=(t%1.5)/1.5, r=11, rx, ry;
        if(ep<0.42){ rx=cx; ry=(top-46) + (42)*(ep/0.42); }            // falling
        else if(ep<0.56){ rx=cx; ry=top-2; }                           // crushing down
        else { var fp=(ep-0.56)/0.44; rx=cx + fp*70; ry=(top-2) - Math.sin(fp*Math.PI)*46; } // flung up-right
        blob(rx, ry, r); pctx.fillStyle='#000'; px(rx-4,ry-3,2,2); px(rx+2,ry+1,3,2); pctx.fillStyle='#fff';
        if(ep>=0.42 && ep<0.62){ pctx.globalAlpha=0.9; for(var k=0;k<5;k++){ var a=k/5*6.28; px(cx+Math.cos(a)*14, top+Math.sin(a)*6, 2,2);} } // impact burst
        break; }
      case 'study': {  // a floating, very wrong equation
        pctx.font='9px "Pixel",monospace'; pctx.textAlign='center'; pctx.globalAlpha=0.95;
        var phase=Math.floor(t*1.6)%3;
        var eq = phase===0 ? '1 + 2 = 4?' : phase===1 ? '1 + 2 = ??' : '2 + 2 = 5?';
        pctx.fillText(eq, cx, top-9 + Math.sin(t*3)*1.5);
        pctx.textAlign='left';
        break; }
      case 'meditate':
        pctx.globalAlpha=0.35+0.25*Math.abs(Math.sin(t*2));
        pctx.lineWidth=2; pctx.strokeStyle='#fff';
        var rad=box.w*0.7+Math.sin(t*2)*4;
        pctx.beginPath(); pctx.arc(cx, box.oy+box.h*0.5, rad, 0, Math.PI*2); pctx.stroke();
        pctx.globalAlpha=0.8;
        for(var k2=0;k2<3;k2++){ var a2=t*1.2+k2*2.1; px(cx+Math.cos(a2)*rad, box.oy+box.h*0.5+Math.sin(a2)*rad, 3,3); }
        break;
      case 'forage': {  // pet rummages at a bush
        drawBush(rgt+10, box.floorY);
        pctx.globalAlpha=0.7;   // leaves/dirt kicked up
        px(rgt+4, box.floorY-4-((animT*0.06)%7), 2,2);
        px(rgt+9, box.floorY-7-((animT*0.06+4)%7), 2,2);
        break; }
      case 'explore':
        pctx.globalAlpha=0.85;
        var sxp=(walkDir<0?lft-6:rgt+4);
        px(sxp, box.floorY-6, 2,2); px(sxp+(walkDir<0?-3:3), box.floorY-11, 3,3);
        break;
      case 'sing':
        drawNote(rgt+3, top-2-((animT*0.03)%14));
        drawNote(rgt+9, top+2-((animT*0.03+7)%14));
        break;
      case 'wrestle':
        pctx.globalAlpha=0.8;
        var bx=(walkDir<0?lft-5:rgt+3);
        px(bx, box.oy+box.h*0.4, 2,2); px(bx+(walkDir<0?-3:3), box.oy+box.h*0.4-3, 2,2);
        px(bx+(walkDir<0?-3:3), box.oy+box.h*0.4+3, 2,2);
        break;
      case 'tag': case 'fetch':
        pctx.globalAlpha=0.5;
        for(var i2=0;i2<4;i2++){ var sx2=(walkDir<0?rgt+2+i2*5:lft-4-i2*5); px(sx2, box.oy+box.h*0.3+i2*4, 4,2); }
        break;
      case 'puzzle':
        pctx.globalAlpha=0.9;
        px(rgt+2, top-2, 2,2); px(rgt+5, top-6, 3,3);
        pctx.fillRect(rgt+7, top-15, 4,2); pctx.fillRect(rgt+9, top-13, 2,4); pctx.fillRect(rgt+9, top-7, 2,2);
        break;
    }
    pctx.globalAlpha=1; pctx.restore();
  }

  var animT=0, last=performance.now(), simAcc=0, lastLogSig='';
  // pet roaming state (cosmetic, not persisted)
  var walkX=null, walkDir=1, hopTimer=0, hopping=false, hopPhase=0, trudgePause=0;
  function frame(now){
    var dtMs=Math.min(120, now-last); last=now; animT+=dtMs;

    simAcc+=dtMs; while(simAcc>=1000){ simulate(1); simAcc-=1000; }

    // COMBAT: pauses the cycle clock; plays out in real time tick-by-tick
    if(!S.dead && S.fight){
      fightTick(dtMs);
      checkCritical();
      // live combat feed in the LOG section + vitals; only rebuild the feed when it changes
      var sig = S.fight ? (S.fight.log.length+'|'+(S.fight.log[S.fight.log.length-1]||'')) : '';
      if(sig!==lastLogSig){ lastLogSig=sig; renderLog(); }
      setBars();
    }
    // OUT OF STAGE: deterministic now \u2014 no auto age clock, no action timers.
    // age only advances when the player spends segments (train/rest -> completeCycle).
    else if(!S.dead && S.stage!=='egg'){
      checkCritical();
      // live countdowns for sickness reactions
      if(S.critical){
        var rem=Math.max(0,S.critical.deadline-Date.now());
        if(S.critical.kind==='qte'){ if(qteTime) qteTime.textContent='react in '+fmtMs(rem); }
        else { alertTime.textContent='medicine in '+fmtMs(rem); }
      } else if(S.sick){ alertTime.textContent='give it some medicine'; }
    }

    if(react){ react.t-=dtMs/16; if(react.t<=0) react=null; }
    if(msgT>0){ msgT-=dtMs/16; if(msgT<=0 && msgEl) msgEl.textContent=''; }

    pctx.setTransform(dpr,0,0,dpr,0,0);
    pctx.clearRect(0,0,cw,ch); pctx.fillStyle='#000'; pctx.fillRect(0,0,cw,ch);

    // floor line
    pctx.strokeStyle='rgba(255,255,255,0.5)'; pctx.lineWidth=1;
    var fy=Math.round(ch*0.82)+0.5;
    pctx.beginPath(); pctx.moveTo(cw*0.06,fy); pctx.lineTo(cw*0.94,fy); pctx.stroke();

    // dead: show a grave and stop the pet animation
    if(S.dead){ drawGrave(); setBars(); requestAnimationFrame(frame); return; }

    // egg: rock gently; tapping speeds the hatch, mashing cracks it
    if(S.stage==='egg'){
      var et=animT/1000, togo=Math.max(0, EGG_DUR - S.age);
      var soon = togo<8;
      var bob = Math.sin(et*2)*2;
      if(eggWobble>0) eggWobble-=dtMs/16;
      if(eggPulse>0) eggPulse-=dtMs/16;
      var shake = (eggWobble>0 ? Math.sin(animT*0.09)*Math.min(6,eggWobble) : 0)
                + (soon ? Math.sin(animT*0.05)*2 : 0);
      var sq = 1 + (eggPulse>0 ? Math.min(0.12, eggPulse*0.02) : 0);
      pctx.save(); pctx.translate(shake,0);
      var ebox = drawSprite(S.form, bob, sq);
      drawEggCracks(ebox);
      pctx.restore();
      pctx.fillStyle='rgba(255,255,255,0.82)'; pctx.font='8px "Pixel",monospace'; pctx.textAlign='center';
      if(eggCrack>=2) pctx.fillText('careful \u2014 it\u2019s cracking!', cw*0.5, ch*0.93);
      pctx.textAlign='left';
      if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }
      setBars();
      requestAnimationFrame(frame); return;
    }

    // active battle: tick-based fight plays out on screen
    if(S.fight){
      drawFight();
      if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }
      setBars();
      requestAnimationFrame(frame); return;
    }

    // ── walking pet ──
    var t=animT/1000;
    var unit0=Math.max(2,Math.floor((ch*PET_SCALE)/13));
    var halfW=(16*unit0)/2, marg=8;
    var left=marg+halfW, right=cw-marg-halfW;
    if(walkX==null) walkX=cw/2;
    walkX=Math.min(right,Math.max(left,walkX));

    var offY=Math.sin(t*2.2)*2, sq=1, shakeX=0, animFlip=null;
    var resting=react&&react.type==='rest', playing=react&&react.type==='play', tired=react&&react.type==='tired';
    var modeAnim = ((S.mode==='train'||S.mode==='play') && S.modeAct) ? ((findAct(S.mode==='train'?TRAIN:PLAY,S.modeAct)||{}).anim) : null;
    var curAnim = (react && react.type==='act' ? react.anim : null) || modeAnim;

    if(curAnim){                                  // training / playing flourish, in place
      var m=activityMotion(curAnim,t); offY=m.offY; sq=m.sq; shakeX=m.shakeX; animFlip=m.flip;
    }
    else if(playing){ var ph=(react.t%16)/16; offY=-Math.abs(Math.sin(ph*Math.PI))*12; sq=0.9; }
    else if(resting){ offY=2; sq=0.86; }                      // stand still & rest
    else if(S.sick){ offY=Math.sin(t*8)*2; sq=0.95; }         // shiver in place
    else {
      // roam, with a different gait per species
      var sp=species();
      if(sp==='mossy'){                 // plant: slow, smooth glide + float
        walkX += walkDir*0.030*dtMs; offY=Math.sin(t*1.6)*2.5;
      } else if(sp==='stony'){          // stone: heavy trudge with pauses + waddle
        if(trudgePause>0){ trudgePause-=dtMs; offY=Math.sin(t*3)*1; }
        else { walkX += walkDir*0.020*dtMs; offY=Math.abs(Math.sin(t*5))*2.5;
               if(Math.random()<0.004) trudgePause=400+Math.random()*700; }
      } else {                          // dewy (default): discrete hops
        hopTimer-=dtMs;
        if(!hopping && hopTimer<=0){ hopping=true; hopPhase=0; }
        if(hopping){ hopPhase+=dtMs; var hp=hopPhase/280;
          if(hp>=1){ hopping=false; hopTimer=420+Math.random()*360; }
          else { walkX += walkDir*0.10*dtMs; offY=-Math.sin(hp*Math.PI)*12; sq=0.9; } }
      }
      if(walkX<=left){ walkX=left; walkDir=1; }
      else if(walkX>=right){ walkX=right; walkDir=-1; }
    }

    pctx.save(); pctx.translate(shakeX,0);
    var box=drawSprite(S.form, offY, sq, walkX, animFlip!=null ? animFlip : (walkDir<0));
    if(curAnim) drawActivity(curAnim, box, t);
    pctx.restore();
    if(resting||tired) drawZzz(box);
    if(S.sick){ pctx.fillStyle='#fff'; pctx.fillRect(box.ox+box.w-2, box.oy+4+(Math.sin(t*6)+1)*2, 2,3); }

    if(flashT>0){ pctx.fillStyle='rgba(255,255,255,'+(flashT/22*0.6)+')'; pctx.fillRect(0,0,cw,ch); flashT--; }

    setBars();
    requestAnimationFrame(frame);
  }

  // ── offline catch-up: cycles are deliberate now, so being away does NOT age the pet.
  //    the egg still incubates in real time; a living pet just recovers a little while away. ──
  function catchUp(){
    if(S.dead) return;
    var elapsed=Math.max(0,(Date.now()-(S.lastSeen||Date.now()))/1000);
    if(elapsed<1){ S.lastSeen=Date.now(); return; }
    if(S.stage==='egg'){
      simulate(Math.min(elapsed,MAX_CATCHUP));   // egg keeps incubating while away (and may hatch)
    } else {
      var mins=Math.min(elapsed,MAX_CATCHUP)/60, st=S.stats;   // ~1 regen pulse per minute away
      var pulses=Math.floor(mins);
      if(pulses>0){
        st.health=Math.min(maxHP(), (st.health||0) + hpRegen()*pulses);
        st.energy=clamp((st.energy||0) + energyRegen()*pulses);
        S.mana=Math.min(maxMana(), (S.mana||0) + manaRegenTick()*pulses);
      }
      simulate(Math.min(elapsed,MAX_CATCHUP));   // sickness still resolves/accrues while away
      if(S.dead) return;
      checkEvolve();
    }
    S.lastSeen=Date.now();
  }

  setInterval(save,5000);
  document.addEventListener('visibilitychange',function(){ if(document.hidden) save(); else { catchUp(); render(); } });
  window.addEventListener('beforeunload',save);

  catchUp(); sizeCanvas(); render(); save(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
